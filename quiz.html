<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QUIZ - Desafio por Times</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

        :root {
            --neon-purple: #8c42b3;
            --neon-blue: #2d46b9;
            --neon-green: #1ed760;
            --neon-red: #ff4646;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.07);
            --font-display: 'Space Grotesk', sans-serif;
            --font-data: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: white;
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: var(--font-display);
            display: flex; align-items: center; justify-content: center;
        }

        /* Efeito Visual: Scanner de Fundo */
        .scanline {
            width: 100%; height: 100px; z-index: 1;
            background: linear-gradient(to bottom, transparent, rgba(140, 66, 179, 0.05), transparent);
            position: fixed; top: -100px; left: 0;
            animation: scan 8s linear infinite; pointer-events: none;
        }

        @keyframes scan { 0% { top: -100px; } 100% { top: 100%; } }

        .noise { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.06; pointer-events: none; z-index: 0; }
        
        .screen {
            position: absolute; width: 100%; height: 100%;
            display: none; flex-direction: column; padding: 25px;
            align-items: center; justify-content: center; text-align: center;
            z-index: 10;
        }
        .screen.active { display: flex; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        h1 { 
            font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 20px; 
            text-transform: uppercase; text-shadow: 0 0 15px rgba(140, 66, 179, 0.5); 
        }
        
        .card {
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 25px;
            width: 100%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            position: relative; overflow: hidden;
        }

        /* Efeito Visual: Glow Pulsante no Card */
        .card::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--neon-purple), transparent, var(--neon-blue));
            z-index: -1; opacity: 0.15; animation: rotateGlow 5s linear infinite; border-radius: 30px;
        }

        @keyframes rotateGlow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        .btn { 
            background: white; color: black; border: none; padding: 16px; 
            border-radius: 18px; font-family: var(--font-display); font-weight: 800; 
            font-size: 0.9rem; width: 100%; cursor: pointer; text-transform: uppercase; 
            margin-bottom: 12px; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-purple { background: var(--neon-purple); color: white; box-shadow: 0 6px 0 #5e2a7a; }
        .btn-purple:active { transform: translateY(4px); box-shadow: 0 2px 0 #5e2a7a; }

        .btn-option { 
            background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); 
            text-align: left; justify-content: flex-start; font-weight: 400; text-transform: none;
            position: relative; overflow: hidden;
        }

        .btn-option:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }

        .score-board { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 400px; }
        .score-card { flex: 1; background: var(--glass); padding: 10px; border-radius: 15px; border-bottom: 3px solid var(--neon-blue); transition: 0.3s; }
        .score-card.active { border-color: var(--neon-green); background: rgba(30, 215, 96, 0.1); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(30, 215, 96, 0.1); }
        .score-card .team-n { font-size: 0.6rem; font-weight: 900; opacity: 0.6; }
        .score-card .pts { font-size: 1.2rem; font-weight: 900; }

        .timer-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); margin-bottom: 20px; border-radius: 2px; overflow: hidden; }
        .timer-fill { height: 100%; background: var(--neon-purple); width: 100%; transition: width 0.1s linear; box-shadow: 0 0 10px var(--neon-purple); }

        .correct { background: var(--neon-green) !important; color: black !important; font-weight: 900; box-shadow: 0 0 20px rgba(30, 215, 96, 0.4); }
        .wrong { background: var(--neon-red) !important; color: white !important; box-shadow: 0 0 20px rgba(255, 70, 70, 0.4); }
        .disabled { pointer-events: none; opacity: 0.7; }
        
        .turn-indicator { font-size: 0.8rem; font-weight: 900; color: var(--neon-purple); text-transform: uppercase; margin-bottom: 5px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="noise"></div>
<div class="scanline"></div>

<div id="screen-lobby" class="screen active">
    <h1>QUIZ TIMES</h1>
    <div class="card">
        <p style="opacity: 0.6; font-size: 0.8rem;">Jogadores na Sala:</p>
        <div id="player-count" style="font-size: 3rem; font-weight: 900; color: var(--neon-purple);">0</div>
        <p id="player-list-text" style="margin-bottom: 25px; font-size: 0.9rem; font-family: var(--font-data); color: var(--neon-green);">Conectando...</p>
        
        <div id="host-controls" style="display: none;">
            <button class="btn btn-purple" onclick="divideTeams(2)">DIVIDIR EM 2 TIMES</button>
            <button class="btn btn-purple" onclick="divideTeams(3)">DIVIDIR EM 3 TIMES</button>
        </div>
        <p id="waiting-msg">Aguardando o Host...</p>
    </div>
</div>

<div id="screen-quiz" class="screen">
    <div class="score-board" id="hud-score"></div>
    <div class="card">
        <div class="turn-indicator" id="current-turn-msg">VEZ DO TIME...</div>
        <div class="timer-bar"><div class="timer-fill" id="timer"></div></div>
        <div class="question-text" id="q-text" style="font-weight: 700; margin-bottom: 20px;">Carregando...</div>
        <div id="options-grid"></div>
    </div>
</div>

<div id="screen-result" class="screen">
    <h1>FIM DE JOGO</h1>
    <div class="card" id="final-stats"></div>
    <button class="btn btn-purple" style="margin-top: 20px;" onclick="location.reload()">REINICIAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB1buacNarLY8ELWla6yeqTi4L0vTdloSc",
        authDomain: "wrapped-fad94.firebaseapp.com",
        databaseURL: "https://wrapped-fad94-default-rtdb.firebaseio.com",
        projectId: "wrapped-fad94",
        storageBucket: "wrapped-fad94.firebasestorage.app",
        messagingSenderId: "360236097664",
        appId: "1:360236097664:web:76777f529c18623bf1c665"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const urlParams = new URLSearchParams(window.location.search);
    const roomCode = urlParams.get('room');
    const myId = localStorage.getItem('wrapped_uid');

    let amIHost = false;
    let myName = "";
    let localQIndex = -1;
    let timerInt;
    let canClick = false;
    let currentQuestions = [];
    let displayedOptions = []; // Mapeia a ordem embaralhada local para a resposta correta

    const originalQuestions = [
        { q: "Qual a capital da França?", options: ["Londres", "Paris", "Berlim", "Madrid"], correct: 1 },
        { q: "Quanto é 7 x 8?", options: ["54", "56", "62", "48"], correct: 1 },
        { q: "Qual planeta é o Planeta Vermelho?", options: ["Vênus", "Marte", "Saturno", "Urano"], correct: 1 },
        { q: "Qual o maior oceano do mundo?", options: ["Atlântico", "Índico", "Pacífico", "Ártico"], correct: 2 },
        { q: "Quem pintou a Mona Lisa?", options: ["Van Gogh", "Da Vinci", "Picasso", "Dalí"], correct: 1 }
    ];

    if (roomCode) {
        onValue(ref(db, `rooms/${roomCode}`), (snap) => {
            const data = snap.val();
            if (!data) return;

            amIHost = (data.host === myId);
            if (data.players && data.players[myId]) myName = data.players[myId].name;

            if (data.players) {
                const list = Object.values(data.players).map(p => p.name);
                document.getElementById('player-count').innerText = list.length;
                document.getElementById('player-list-text').innerText = list.join(', ');
            }
            document.getElementById('host-controls').style.display = amIHost ? 'block' : 'none';
            document.getElementById('waiting-msg').style.display = amIHost ? 'none' : 'block';

            if (data.status === 'in_quiz' && data.quizGameState) {
                currentQuestions = data.quizGameState.shuffledQuestions || originalQuestions;
                renderQuiz(data.quizGameState);
            } else if (data.status === 'quiz_finished') {
                showFinal(data.quizGameState);
            }
        });
    }

    function renderQuiz(state) {
        document.getElementById('screen-lobby').classList.remove('active');
        document.getElementById('screen-quiz').classList.add('active');

        const team = state.teams[state.currentTeamIndex];
        const isMyTurn = team.players.some(p => p.trim() === myName.trim());
        canClick = isMyTurn && (state.lastAnswer === null || state.lastAnswer === undefined);

        document.getElementById('hud-score').innerHTML = state.teams.map((t, idx) => `
            <div class="score-card ${idx === state.currentTeamIndex ? 'active' : ''}">
                <div class="team-n">${t.name}</div>
                <div class="pts">${t.score} PTS</div>
            </div>
        `).join('');

        document.getElementById('current-turn-msg').innerText = isMyTurn ? "SUA VEZ!" : `VEZ DO ${team.name}`;

        if (localQIndex !== state.currentQuestionIndex) {
            localQIndex = state.currentQuestionIndex;
            const q = currentQuestions[localQIndex];
            document.getElementById('q-text').innerText = q.q;
            
            // Embaralhamento das Opções (Local para cada jogador, mas validado globalmente)
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            
            // Criamos um array de objetos para rastrear o índice original
            displayedOptions = q.options.map((opt, idx) => ({ text: opt, originalIdx: idx }));
            displayedOptions.sort(() => Math.random() - 0.5);

            displayedOptions.forEach((optObj, localIdx) => {
                const b = document.createElement('button');
                b.className = 'btn btn-option';
                b.innerText = optObj.text;
                b.onclick = () => { if (canClick) { canClick = false; handleSelect(optObj.originalIdx); } };
                grid.appendChild(b);
            });
            startTimer(isMyTurn);
        }

        if (state.lastAnswer !== null && state.lastAnswer !== undefined) {
            clearInterval(timerInt);
            const btns = document.querySelectorAll('.btn-option');
            const correctIdx = currentQuestions[state.currentQuestionIndex].correct;
            
            // Colorir com base no índice original armazenado no botão
            displayedOptions.forEach((optObj, i) => {
                const b = btns[i];
                b.classList.add('disabled');
                if (optObj.originalIdx === correctIdx) b.classList.add('correct');
                else if (optObj.originalIdx === state.lastAnswer) b.classList.add('wrong');
            });

            if (amIHost) {
                setTimeout(() => nextRound(state), 2000);
            }
        }
    }

    function startTimer(active) {
        clearInterval(timerInt);
        let time = 100;
        const fill = document.getElementById('timer');
        timerInt = setInterval(() => {
            time -= 1;
            fill.style.width = time + '%';
            if (time <= 0) {
                clearInterval(timerInt);
                if (active && amIHost && canClick) handleSelect(-1);
            }
        }, 100);
    }

    function handleSelect(idx) {
        update(ref(db, `rooms/${roomCode}/quizGameState`), { lastAnswer: idx });
    }

    async function nextRound(state) {
        if (!amIHost) return;
        
        const currentSnap = await get(ref(db, `rooms/${roomCode}/quizGameState`));
        const current = currentSnap.val();
        if (!current || current.lastAnswer === null) return;

        let nextQ = current.currentQuestionIndex + 1;
        let nextT = (current.currentTeamIndex + 1) % current.teams.length;
        let updatedTeams = [...current.teams];

        if (current.lastAnswer === currentQuestions[current.currentQuestionIndex].correct) {
            updatedTeams[current.currentTeamIndex].score += 10;
        }

        if (nextQ >= currentQuestions.length) {
            update(ref(db, `rooms/${roomCode}`), { status: 'quiz_finished', quizGameState: { ...current, teams: updatedTeams } });
        } else {
            update(ref(db, `rooms/${roomCode}/quizGameState`), {
                currentQuestionIndex: nextQ,
                currentTeamIndex: nextT,
                lastAnswer: null,
                teams: updatedTeams
            });
        }
    }

    window.divideTeams = async function(num) {
        const snap = await get(ref(db, `rooms/${roomCode}/players`));
        const players = Object.values(snap.val()).map(p => p.name);
        
        const shuffled = [...originalQuestions].sort(() => Math.random() - 0.5);
        
        let teams = [];
        for (let i = 0; i < num; i++) teams.push({ name: `TIME ${i+1}`, players: [], score: 0 });
        players.sort(() => Math.random() - 0.5).forEach((name, i) => {
            teams[i % num].players.push(name);
        });

        set(ref(db, `rooms/${roomCode}/quizGameState`), {
            teams: teams,
            shuffledQuestions: shuffled,
            currentQuestionIndex: 0,
            currentTeamIndex: 0,
            lastAnswer: null
        });
        update(ref(db, `rooms/${roomCode}`), { status: 'in_quiz' });
    };

    function showFinal(state) {
        document.getElementById('screen-quiz').classList.remove('active');
        document.getElementById('screen-result').classList.add('active');
        const winner = [...state.teams].sort((a,b) => b.score - a.score)[0];
        document.getElementById('final-stats').innerHTML = `
            <h2 style="color:var(--neon-green); margin-bottom:15px; text-shadow: 0 0 10px var(--neon-green);">${winner.name} VENCEU!</h2>
            ${state.teams.map(t => `<div style="display:flex; justify-content:space-between; margin-bottom: 5px; font-family:var(--font-data);"><span>${t.name}</span><span>${t.score} PTS</span></div>`).join('')}
        `;
    }
</script>
</body>
</html>
