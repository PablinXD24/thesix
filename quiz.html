<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QUIZ - Desafio por Times</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

        :root {
            --neon-purple: #8c42b3;
            --neon-blue: #2d46b9;
            --neon-green: #1ed760;
            --neon-red: #ff4646;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.07);
            --font-display: 'Space Grotesk', sans-serif;
            --font-data: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: white;
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: var(--font-display);
            display: flex; align-items: center; justify-content: center;
        }

        .noise { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.06; pointer-events: none; z-index: 0; }
        
        .screen {
            position: absolute; width: 100%; height: 100%;
            display: none; flex-direction: column; padding: 25px;
            align-items: center; justify-content: center; text-align: center;
            z-index: 10;
        }
        .screen.active { display: flex; animation: fadeIn 0.4s cubic-bezier(0.23, 1, 0.32, 1); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 20px; text-transform: uppercase; background: linear-gradient(to right, #fff, var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .card {
            background: var(--glass); backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 25px;
            width: 100%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            position: relative;
        }

        .btn { 
            background: white; color: black; border: none; padding: 16px; 
            border-radius: 18px; font-family: var(--font-display); font-weight: 800; 
            font-size: 0.9rem; width: 100%; cursor: pointer; text-transform: uppercase; 
            margin-bottom: 12px; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-purple { background: var(--neon-purple); color: white; box-shadow: 0 6px 0 #5e2a7a; }
        .btn-option { 
            background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); 
            text-align: left; justify-content: flex-start; font-weight: 400; text-transform: none;
            opacity: 1;
        }

        .score-board { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 400px; }
        .score-card { flex: 1; background: var(--glass); padding: 10px; border-radius: 15px; border-bottom: 3px solid var(--neon-blue); transition: 0.3s; }
        .score-card.active { border-color: var(--neon-green); background: rgba(30, 215, 96, 0.15); transform: translateY(-5px); }

        .timer-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); margin-bottom: 20px; border-radius: 10px; overflow: hidden; }
        .timer-fill { height: 100%; background: var(--neon-purple); width: 100%; transition: width 0.1s linear; }

        /* Estilos de feedback */
        .selected-correct { background: var(--neon-green) !important; color: black !important; font-weight: 900; }
        .selected-wrong { background: var(--neon-red) !important; color: white !important; }
        .disabled { pointer-events: none; }

        .turn-indicator { font-size: 0.8rem; font-weight: 900; color: var(--neon-purple); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="noise"></div>

<div id="screen-lobby" class="screen active">
    <h1>QUIZ TIMES</h1>
    <div class="card">
        <p style="opacity: 0.6; font-size: 0.8rem;">Jogadores na Sala:</p>
        <div id="player-count" style="font-size: 3rem; font-weight: 900; color: var(--neon-purple);">0</div>
        <p id="player-list-text" style="margin-bottom: 25px; font-size: 0.9rem; font-family: var(--font-data); color: var(--neon-green);">Carregando...</p>
        <div id="host-controls" style="display: none;">
            <button class="btn btn-purple" onclick="divideTeams(2)">2 TIMES</button>
            <button class="btn btn-purple" onclick="divideTeams(3)">3 TIMES</button>
        </div>
        <p id="waiting-msg">Aguardando Host...</p>
    </div>
</div>

<div id="screen-quiz" class="screen">
    <div class="score-board" id="hud-score"></div>
    <div class="card">
        <div class="turn-indicator" id="current-turn-msg">...</div>
        <div class="timer-bar"><div class="timer-fill" id="timer"></div></div>
        <div class="question-text" id="q-text" style="font-weight: 700; margin-bottom: 20px;"></div>
        <div id="options-grid"></div>
    </div>
</div>

<div id="screen-result" class="screen">
    <h1>FIM</h1>
    <div class="card" id="final-stats"></div>
    <button class="btn btn-purple" onclick="location.reload()" style="margin-top: 20px;">REINICIAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB1buacNarLY8ELWla6yeqTi4L0vTdloSc",
        authDomain: "wrapped-fad94.firebaseapp.com",
        databaseURL: "https://wrapped-fad94-default-rtdb.firebaseio.com",
        projectId: "wrapped-fad94",
        storageBucket: "wrapped-fad94.firebasestorage.app",
        messagingSenderId: "360236097664",
        appId: "1:360236097664:web:76777f529c18623bf1c665"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const urlParams = new URLSearchParams(window.location.search);
    const roomCode = urlParams.get('room');
    const myId = localStorage.getItem('wrapped_uid');

    let amIHost = false;
    let timerInt;
    let localIndex = -1; // Para controlar se a pergunta mudou

    const questions = [
        { q: "Qual a capital da França?", options: ["Londres", "Paris", "Berlim", "Madrid"], correct: 1 },
        { q: "Quanto é 7 x 8?", options: ["54", "56", "62", "48"], correct: 1 },
        { q: "Qual planeta é o Planeta Vermelho?", options: ["Vênus", "Marte", "Saturno", "Urano"], correct: 1 },
        { q: "Qual o maior oceano?", options: ["Atlântico", "Índico", "Pacífico", "Ártico"], correct: 2 },
        { q: "Quem pintou a Mona Lisa?", options: ["Van Gogh", "Da Vinci", "Picasso", "Dalí"], correct: 1 }
    ];

    if (roomCode) {
        onValue(ref(db, `rooms/${roomCode}`), (snap) => {
            const data = snap.val();
            if (!data) return;

            amIHost = (data.host === myId);
            document.getElementById('host-controls').style.display = amIHost ? 'block' : 'none';
            document.getElementById('waiting-msg').style.display = amIHost ? 'none' : 'block';

            if (data.players) {
                const pNames = Object.values(data.players).map(p => p.name);
                document.getElementById('player-count').innerText = pNames.length;
                document.getElementById('player-list-text').innerText = pNames.join(', ');
            }

            if (data.status === 'in_quiz' && data.quizGameState) {
                syncGame(data.quizGameState);
            } else if (data.status === 'quiz_finished') {
                showFinal(data.quizGameState);
            }
        });
    }

    function syncGame(state) {
        document.getElementById('screen-lobby').classList.remove('active');
        document.getElementById('screen-quiz').classList.add('active');

        // Renderiza o placar
        const hud = document.getElementById('hud-score');
        hud.innerHTML = state.teams.map((t, i) => `
            <div class="score-card ${i === state.currentTeamIndex ? 'active' : ''}">
                <div class="team-n">${t.name}</div>
                <div class="pts">${t.score} PTS</div>
            </div>
        `).join('');

        document.getElementById('current-turn-msg').innerText = `VEZ DO ${state.teams[state.currentTeamIndex].name}`;

        // Se a pergunta mudou localmente
        if (localIndex !== state.currentQuestionIndex) {
            localIndex = state.currentQuestionIndex;
            const q = questions[localIndex];
            document.getElementById('q-text').innerText = q.q;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const b = document.createElement('button');
                b.className = 'btn btn-option';
                b.innerText = opt;
                b.onclick = () => { if(amIHost) submitAnswer(idx); };
                grid.appendChild(b);
            });
            startTimer();
        }

        // Se alguém respondeu (sincroniza o feedback visual)
        if (state.lastAnswer !== null && state.lastAnswer !== undefined) {
            const btns = document.querySelectorAll('.btn-option');
            const correctIdx = questions[state.currentQuestionIndex].correct;
            
            btns.forEach((b, i) => {
                b.classList.add('disabled');
                if (i === correctIdx) b.classList.add('selected-correct');
                else if (i === state.lastAnswer) b.classList.add('selected-wrong');
            });
            clearInterval(timerInt);
        }
    }

    function startTimer() {
        clearInterval(timerInt);
        let time = 100;
        const fill = document.getElementById('timer');
        timerInt = setInterval(() => {
            time -= 1;
            fill.style.width = time + '%';
            if (time <= 0) {
                clearInterval(timerInt);
                if (amIHost) submitAnswer(-1);
            }
        }, 100);
    }

    window.submitAnswer = function(idx) {
        const stateRef = ref(db, `rooms/${roomCode}/quizGameState`);
        update(stateRef, { lastAnswer: idx }).then(() => {
            // Host aguarda 2 segundos e pula
            setTimeout(() => {
                if (amIHost) {
                    get(stateRef).then(snap => {
                        const s = snap.val();
                        let nextQ = s.currentQuestionIndex + 1;
                        let nextT = (s.currentTeamIndex + 1) % s.teams.length;
                        
                        // Atualiza score se acertou
                        if (idx === questions[s.currentQuestionIndex].correct) {
                            s.teams[s.currentTeamIndex].score += 10;
                        }

                        if (nextQ >= questions.length) {
                            update(ref(db, `rooms/${roomCode}`), { status: 'quiz_finished', quizGameState: s });
                        } else {
                            update(stateRef, {
                                currentQuestionIndex: nextQ,
                                currentTeamIndex: nextT,
                                lastAnswer: null,
                                teams: s.teams
                            });
                        }
                    });
                }
            }, 1500);
        });
    };

    window.divideTeams = function(n) {
        get(ref(db, `rooms/${roomCode}/players`)).then(snap => {
            const p = Object.values(snap.val()).map(x => x.name);
            let teams = [];
            for(let i=0; i<n; i++) teams.push({name: `TIME ${i+1}`, score: 0, players: []});
            p.forEach((name, i) => teams[i % n].players.push(name));

            set(ref(db, `rooms/${roomCode}/quizGameState`), {
                teams, currentQuestionIndex: 0, currentTeamIndex: 0, lastAnswer: null
            });
            update(ref(db, `rooms/${roomCode}`), { status: 'in_quiz' });
        });
    };

    function showFinal(state) {
        document.getElementById('screen-quiz').classList.remove('active');
        document.getElementById('screen-result').classList.add('active');
        const winner = [...state.teams].sort((a,b) => b.score - a.score)[0];
        document.getElementById('final-stats').innerHTML = `
            <h2 style="color:var(--neon-green)">${winner.name} VENCEU!</h2>
            ${state.teams.map(t => `<p>${t.name}: ${t.score} PTS</p>`).join('')}
        `;
    }

    // Helper simples para o get()
    function get(r) {
        return new Promise((res) => onValue(r, snap => res(snap), { onlyOnce: true }));
    }
</script>
</body>
</html>
