<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QUIZ - Desafio por Times</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

        :root {
            --neon-purple: #8c42b3;
            --neon-blue: #2d46b9;
            --neon-green: #1ed760;
            --neon-red: #ff4646;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.07);
            --font-display: 'Space Grotesk', sans-serif;
            --font-data: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: white;
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: var(--font-display);
            display: flex; align-items: center; justify-content: center;
        }

        .noise { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.06; pointer-events: none; z-index: 0; }
        
        .screen {
            position: absolute; width: 100%; height: 100%;
            display: none; flex-direction: column; padding: 25px;
            align-items: center; justify-content: center; text-align: center;
            z-index: 10;
        }
        .screen.active { display: flex; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 20px; text-transform: uppercase; }
        
        .card {
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 25px;
            width: 100%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            position: relative;
        }

        .btn { 
            background: white; color: black; border: none; padding: 16px; 
            border-radius: 18px; font-family: var(--font-display); font-weight: 800; 
            font-size: 0.9rem; width: 100%; cursor: pointer; text-transform: uppercase; 
            margin-bottom: 12px; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn:active { transform: scale(0.95); }
        .btn-purple { background: var(--neon-purple); color: white; box-shadow: 0 6px 0 #5e2a7a; }
        .btn-option { 
            background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); 
            text-align: left; justify-content: flex-start; font-weight: 400; text-transform: none;
        }
        .btn-option:hover { background: rgba(255,255,255,0.1); }

        .score-board { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 400px; }
        .score-card { flex: 1; background: var(--glass); padding: 10px; border-radius: 15px; border-bottom: 3px solid var(--neon-blue); }
        .score-card.active { border-color: var(--neon-green); background: rgba(30, 215, 96, 0.1); }
        .score-card .team-n { font-size: 0.6rem; font-weight: 900; opacity: 0.6; }
        .score-card .pts { font-size: 1.2rem; font-weight: 900; color: white; }
        .score-card .team-members { font-size: 0.55rem; font-family: var(--font-data); opacity: 0.8; margin-top: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .question-text { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; line-height: 1.3; }
        .timer-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); margin-bottom: 20px; border-radius: 2px; overflow: hidden; }
        .timer-fill { height: 100%; background: var(--neon-purple); width: 100%; transition: width 1s linear; }

        .correct { background: var(--neon-green) !important; color: black !important; }
        .wrong { background: var(--neon-red) !important; color: white !important; }
        
        .turn-indicator { font-size: 0.8rem; font-weight: 900; color: var(--neon-purple); text-transform: uppercase; margin-bottom: 5px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="noise"></div>

<div id="screen-lobby" class="screen active">
    <h1>QUIZ TIMES</h1>
    <div class="card">
        <p style="opacity: 0.6; font-size: 0.8rem;">Jogadores na sala:</p>
        <div id="player-count" style="font-size: 3rem; font-weight: 900; color: var(--neon-purple);">0</div>
        <p id="player-list-text" style="margin-bottom: 25px; font-size: 0.9rem; font-family: var(--font-data); color: var(--neon-green);">Carregando...</p>
        
        <div id="host-controls">
            <button class="btn btn-purple" onclick="divideTeams(2)">DIVIDIR EM 2 TIMES</button>
            <button class="btn btn-purple" onclick="divideTeams(3)">DIVIDIR EM 3 TIMES</button>
        </div>
        <button class="btn" style="background: transparent; color: white; border: 1px solid rgba(255,255,255,0.2);" onclick="window.location.href='index.html'">VOLTAR AO MENU</button>
    </div>
</div>

<div id="screen-quiz" class="screen">
    <div class="score-board" id="hud-score"></div>
    <div class="card">
        <div class="turn-indicator" id="current-turn-msg">VEZ DO TIME 1</div>
        <div class="timer-bar"><div class="timer-fill" id="timer"></div></div>
        <div class="question-text" id="q-text">Carregando pergunta...</div>
        <div id="options-grid"></div>
    </div>
</div>

<div id="screen-result" class="screen">
    <h1>FIM DE JOGO</h1>
    <div class="card">
        <div id="winner-name" style="font-size: 1.5rem; font-weight: 900; color: var(--neon-green); margin-bottom: 20px;">TIME 1 VENCEU!</div>
        <div id="final-stats"></div>
        <button class="btn btn-purple" style="margin-top: 20px;" onclick="location.reload()">JOGAR NOVAMENTE</button>
    </div>
</div>

<script>
    let players = [];
    
    function loadPlayersFromIndex() {
        const saved = localStorage.getItem('quiz_players');
        if (saved) {
            players = JSON.parse(saved);
        }
        updateLobbyUI();
    }

    function updateLobbyUI() {
        document.getElementById('player-count').innerText = players.length;
        document.getElementById('player-list-text').innerText = players.length > 0 ? players.join(', ') : "Nenhum jogador encontrado.";
    }

    const questions = [
        { q: "Qual a capital da França?", options: ["Londres", "Paris", "Berlim", "Madrid"], correct: 1 },
        { q: "Quanto é 7 x 8?", options: ["54", "56", "62", "48"], correct: 1 },
        { q: "Qual planeta é conhecido como Planeta Vermelho?", options: ["Vênus", "Júpiter", "Marte", "Saturno"], correct: 2 },
        { q: "Qual o maior oceano do mundo?", options: ["Atlântico", "Índico", "Glacial", "Pacífico"], correct: 3 },
        { q: "Quem pintou a Mona Lisa?", options: ["Van Gogh", "Da Vinci", "Picasso", "Dalí"], correct: 1 }
    ];

    let gameState = {
        teams: [],
        currentQuestionIndex: 0,
        currentTeamIndex: 0,
        timer: null
    };

    function divideTeams(num) {
        if(players.length < num) {
            alert(`Você precisa de pelo menos ${num} jogadores para dividir.`);
            return;
        }

        gameState.teams = [];
        for(let i=0; i<num; i++) {
            gameState.teams.push({ name: `TIME ${i+1}`, players: [], score: 0 });
        }

        const shuffled = [...players].sort(() => Math.random() - 0.5);
        shuffled.forEach((p, idx) => {
            gameState.teams[idx % num].players.push(p);
        });

        startQuiz();
    }

    function startQuiz() {
        document.getElementById('screen-lobby').classList.remove('active');
        document.getElementById('screen-quiz').classList.add('active');
        renderHUD();
        loadQuestion();
    }

    function renderHUD() {
        const hud = document.getElementById('hud-score');
        hud.innerHTML = gameState.teams.map((t, idx) => `
            <div class="score-card ${idx === gameState.currentTeamIndex ? 'active' : ''}">
                <div class="team-n">${t.name}</div>
                <div class="pts">${t.score} PTS</div>
                <div class="team-members">${t.players.join(', ')}</div>
            </div>
        `).join('');
        
        document.getElementById('current-turn-msg').innerText = `VEZ DO ${gameState.teams[gameState.currentTeamIndex].name}`;
    }

    function loadQuestion() {
        const q = questions[gameState.currentQuestionIndex];
        document.getElementById('q-text').innerText = q.q;
        
        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        
        q.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-option';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx);
            grid.appendChild(btn);
        });

        startTimer();
    }

    function startTimer() {
        const bar = document.getElementById('timer');
        bar.style.transition = 'none';
        bar.style.width = '100%';
        
        setTimeout(() => {
            bar.style.transition = 'width 10s linear';
            bar.style.width = '0%';
        }, 50);

        clearTimeout(gameState.timer);
        gameState.timer = setTimeout(() => {
            checkAnswer(-1);
        }, 10000);
    }

    function checkAnswer(index) {
        clearTimeout(gameState.timer);
        const q = questions[gameState.currentQuestionIndex];
        const allBtns = document.querySelectorAll('.btn-option');
        
        if(index === q.correct) {
            if(index !== -1) allBtns[index].classList.add('correct');
            gameState.teams[gameState.currentTeamIndex].score += 10;
        } else {
            if(index !== -1) allBtns[index].classList.add('wrong');
            allBtns[q.correct].classList.add('correct');
        }

        setTimeout(() => {
            nextTurn();
        }, 2000);
    }

    function nextTurn() {
        gameState.currentQuestionIndex++;
        gameState.currentTeamIndex = (gameState.currentTeamIndex + 1) % gameState.teams.length;

        if(gameState.currentQuestionIndex >= questions.length) {
            showFinalResult();
        } else {
            renderHUD();
            loadQuestion();
        }
    }

    function showFinalResult() {
        document.getElementById('screen-quiz').classList.remove('active');
        document.getElementById('screen-result').classList.add('active');

        const winner = [...gameState.teams].sort((a, b) => b.score - a.score)[0];
        document.getElementById('winner-name').innerText = `${winner.name} VENCEU!`;

        const stats = document.getElementById('final-stats');
        stats.innerHTML = gameState.teams.map(t => `
            <div style="margin-bottom:15px; font-family:var(--font-data); text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;">
                <div style="display:flex; justify-content:space-between; font-weight: bold;">
                    <span>${t.name}</span>
                    <span style="color: var(--neon-green)">${t.score} PTS</span>
                </div>
                <div style="font-size: 0.7rem; opacity: 0.7;">Membros: ${t.players.join(', ')}</div>
            </div>
        `).join('');
    }

    window.onload = loadPlayersFromIndex;
</script>
</body>
</html>
