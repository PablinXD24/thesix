<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QUIZ - Desafio por Times</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

        :root {
            --neon-purple: #8c42b3;
            --neon-blue: #2d46b9;
            --neon-green: #1ed760;
            --neon-red: #ff4646;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.07);
            --font-display: 'Space Grotesk', sans-serif;
            --font-data: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: white;
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: var(--font-display);
            display: flex; align-items: center; justify-content: center;
        }

        .noise { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.06; pointer-events: none; z-index: 0; }
        
        .screen {
            position: absolute; width: 100%; height: 100%;
            display: none; flex-direction: column; padding: 25px;
            align-items: center; justify-content: center; text-align: center;
            z-index: 10;
        }
        .screen.active { display: flex; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 20px; text-transform: uppercase; }
        
        .card {
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 25px;
            width: 100%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            position: relative;
        }

        .btn { 
            background: white; color: black; border: none; padding: 16px; 
            border-radius: 18px; font-family: var(--font-display); font-weight: 800; 
            font-size: 0.9rem; width: 100%; cursor: pointer; text-transform: uppercase; 
            margin-bottom: 12px; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-purple { background: var(--neon-purple); color: white; box-shadow: 0 6px 0 #5e2a7a; }
        .btn-option { 
            background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); 
            text-align: left; justify-content: flex-start; font-weight: 400; text-transform: none;
        }

        .score-board { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 400px; }
        .score-card { flex: 1; background: var(--glass); padding: 10px; border-radius: 15px; border-bottom: 3px solid var(--neon-blue); transition: 0.3s; }
        .score-card.active { border-color: var(--neon-green); background: rgba(30, 215, 96, 0.1); transform: translateY(-5px); }
        .score-card .team-n { font-size: 0.6rem; font-weight: 900; opacity: 0.6; }
        .score-card .pts { font-size: 1.2rem; font-weight: 900; }

        .timer-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); margin-bottom: 20px; border-radius: 2px; overflow: hidden; }
        .timer-fill { height: 100%; background: var(--neon-purple); width: 100%; transition: width 0.1s linear; }

        .correct { background: var(--neon-green) !important; color: black !important; font-weight: 900; }
        .wrong { background: var(--neon-red) !important; color: white !important; }
        .disabled { pointer-events: none; opacity: 0.7; }
        
        .turn-indicator { font-size: 0.8rem; font-weight: 900; color: var(--neon-purple); text-transform: uppercase; margin-bottom: 5px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="noise"></div>

<div id="screen-lobby" class="screen active">
    <h1>QUIZ TIMES</h1>
    <div class="card">
        <p style="opacity: 0.6; font-size: 0.8rem;">Jogadores na Sala:</p>
        <div id="player-count" style="font-size: 3rem; font-weight: 900; color: var(--neon-purple);">0</div>
        <p id="player-list-text" style="margin-bottom: 25px; font-size: 0.9rem; font-family: var(--font-data); color: var(--neon-green);">Conectando...</p>
        
        <div id="host-controls" style="display: none;">
            <button class="btn btn-purple" onclick="divideTeams(2)">DIVIDIR EM 2 TIMES</button>
            <button class="btn btn-purple" onclick="divideTeams(3)">DIVIDIR EM 3 TIMES</button>
        </div>
        <p id="waiting-msg">Aguardando o Host...</p>
    </div>
</div>

<div id="screen-quiz" class="screen">
    <div class="score-board" id="hud-score"></div>
    <div class="card">
        <div class="turn-indicator" id="current-turn-msg">VEZ DO TIME 1</div>
        <div class="timer-bar"><div class="timer-fill" id="timer"></div></div>
        <div class="question-text" id="q-text" style="font-weight: 700; margin-bottom: 20px;">Carregando...</div>
        <div id="options-grid"></div>
    </div>
</div>

<div id="screen-result" class="screen">
    <h1>FIM DE JOGO</h1>
    <div class="card" id="final-stats"></div>
    <button class="btn btn-purple" style="margin-top: 20px;" onclick="location.reload()">REINICIAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB1buacNarLY8ELWla6yeqTi4L0vTdloSc",
        authDomain: "wrapped-fad94.firebaseapp.com",
        databaseURL: "https://wrapped-fad94-default-rtdb.firebaseio.com",
        projectId: "wrapped-fad94",
        storageBucket: "wrapped-fad94.firebasestorage.app",
        messagingSenderId: "360236097664",
        appId: "1:360236097664:web:76777f529c18623bf1c665"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const urlParams = new URLSearchParams(window.location.search);
    const roomCode = urlParams.get('room');
    const myId = localStorage.getItem('wrapped_uid');

    let amIHost = false;
    let myName = "";
    let localQuestionIndex = -1;
    let timerInterval;

    const questions = [
        { q: "Qual a capital da França?", options: ["Londres", "Paris", "Berlim", "Madrid"], correct: 1 },
        { q: "Quanto é 7 x 8?", options: ["54", "56", "62", "48"], correct: 1 },
        { q: "Qual planeta é o Planeta Vermelho?", options: ["Vênus", "Júpiter", "Marte", "Saturno"], correct: 2 },
        { q: "Qual o maior oceano do mundo?", options: ["Atlântico", "Índico", "Glacial", "Pacífico"], correct: 3 },
        { q: "Quem pintou a Mona Lisa?", options: ["Van Gogh", "Da Vinci", "Picasso", "Dalí"], correct: 1 }
    ];

    if (roomCode) {
        onValue(ref(db, `rooms/${roomCode}`), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            amIHost = (data.host === myId);
            if (data.players && data.players[myId]) myName = data.players[myId].name;

            // Lobby update
            if (data.players) {
                const list = Object.values(data.players).map(p => p.name);
                document.getElementById('player-count').innerText = list.length;
                document.getElementById('player-list-text').innerText = list.join(', ');
            }
            document.getElementById('host-controls').style.display = amIHost ? 'block' : 'none';
            document.getElementById('waiting-msg').style.display = amIHost ? 'none' : 'block';

            // Quiz logic
            if (data.status === 'in_quiz' && data.quizGameState) {
                syncQuiz(data.quizGameState);
            } else if (data.status === 'quiz_finished') {
                showFinal(data.quizGameState);
            }
        });
    }

    function syncQuiz(state) {
        document.getElementById('screen-lobby').classList.remove('active');
        document.getElementById('screen-quiz').classList.add('active');

        const currentTeam = state.teams[state.currentTeamIndex];
        const isMyTurn = currentTeam.players.includes(myName);

        // HUD Score
        document.getElementById('hud-score').innerHTML = state.teams.map((t, idx) => `
            <div class="score-card ${idx === state.currentTeamIndex ? 'active' : ''}">
                <div class="team-n">${t.name}</div>
                <div class="pts">${t.score} PTS</div>
            </div>
        `).join('');

        document.getElementById('current-turn-msg').innerText = isMyTurn ? "SUA VEZ!" : `VEZ DO ${currentTeam.name}`;

        // Carregar pergunta apenas se mudou
        if (localQuestionIndex !== state.currentQuestionIndex) {
            localQuestionIndex = state.currentQuestionIndex;
            const q = questions[localQuestionIndex];
            document.getElementById('q-text').innerText = q.q;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-option';
                btn.innerText = opt;
                btn.onclick = () => { if(isMyTurn) handleAnswer(idx); };
                grid.appendChild(btn);
            });
            startTimer();
        }

        // Feedback visual se houver resposta
        if (state.lastAnswer !== null && state.lastAnswer !== undefined) {
            clearInterval(timerInterval);
            const btns = document.querySelectorAll('.btn-option');
            const correctIdx = questions[state.currentQuestionIndex].correct;
            btns.forEach((b, i) => {
                b.classList.add('disabled');
                if (i === correctIdx) b.classList.add('correct');
                else if (i === state.lastAnswer) b.classList.add('wrong');
            });
        }
    }

    function startTimer() {
        clearInterval(timerInterval);
        let time = 100;
        const bar = document.getElementById('timer');
        timerInterval = setInterval(() => {
            time -= 1;
            bar.style.width = time + '%';
            if (time <= 0) {
                clearInterval(timerInterval);
                const currentTeam = get(ref(db, `rooms/${roomCode}/quizGameState/currentTeamIndex`));
                // O Host processa o timeout para evitar conflitos
                if (amIHost) handleAnswer(-1);
            }
        }, 100);
    }

    window.handleAnswer = function(idx) {
        const roomRef = ref(db, `rooms/${roomCode}/quizGameState`);
        update(roomRef, { lastAnswer: idx });

        // Host gerencia a transição
        if (amIHost) {
            setTimeout(async () => {
                const snap = await get(roomRef);
                const s = snap.val();
                let nextIdx = s.currentQuestionIndex + 1;
                let nextTeam = (s.currentTeamIndex + 1) % s.teams.length;
                
                if (idx === questions[s.currentQuestionIndex].correct) {
                    s.teams[s.currentTeamIndex].score += 10;
                }

                if (nextIdx >= questions.length) {
                    update(ref(db, `rooms/${roomCode}`), { status: 'quiz_finished', quizGameState: s });
                } else {
                    update(roomRef, {
                        currentQuestionIndex: nextIdx,
                        currentTeamIndex: nextTeam,
                        lastAnswer: null,
                        teams: s.teams
                    });
                }
            }, 2000);
        }
    };

    window.divideTeams = async function(num) {
        const snap = await get(ref(db, `rooms/${roomCode}/players`));
        const playersObj = snap.val();
        const names = Object.values(playersObj).map(p => p.name);
        
        let teams = [];
        for (let i = 0; i < num; i++) teams.push({ name: `TIME ${i+1}`, players: [], score: 0 });
        
        names.sort(() => Math.random() - 0.5).forEach((name, i) => {
            teams[i % num].players.push(name);
        });

        update(ref(db, `rooms/${roomCode}`), {
            status: 'in_quiz',
            quizGameState: {
                teams: teams,
                currentQuestionIndex: 0,
                currentTeamIndex: 0,
                lastAnswer: null
            }
        });
    };

    function showFinal(state) {
        document.getElementById('screen-quiz').classList.remove('active');
        document.getElementById('screen-result').classList.add('active');
        const winner = [...state.teams].sort((a,b) => b.score - a.score)[0];
        document.getElementById('final-stats').innerHTML = `
            <h2 style="color:var(--neon-green); margin-bottom:15px;">${winner.name} VENCEU!</h2>
            ${state.teams.map(t => `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${t.name}</span><span>${t.score} PTS</span></div>`).join('')}
        `;
    }
</script>
</body>
</html>
