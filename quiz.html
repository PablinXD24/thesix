        body {
            background-color: var(--bg-dark);

            height: 100vh; width: 100vw; overflow: hidden;
            font-family: var(--font-display);
            display: flex; align-items: center; justify-content: center;
        }

        .noise { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.06; pointer-events: none; z-index: 0; }
        
        .screen {
            position: absolute; width: 100%; height: 100%;
            display: none; flex-direction: column; padding: 20px;
            align-items: center; justify-content: center; text-align: center;
            z-index: 10;
        }
        .screen.active { display: flex; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 20px; text-transform: uppercase; text-shadow: 0 0 15px rgba(140, 66, 179, 0.5); }
        
        .card {
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 25px;
            width: 100%; max-width: 420px; box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            position: relative; overflow: hidden;
        }

        .timer-bar-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 6px;
            background: rgba(255,255,255,0.05); z-index: 20;
        }
        .timer-progress {
            height: 100%; width: 100%;
            background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
            transition: width 0.1s linear, background 0.3s ease;
        }
        .timer-progress.warning {
            background: var(--neon-red);
            box-shadow: 0 0 15px var(--neon-red);
        }

        .timer-bg-number {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: var(--font-data); font-size: 10rem; font-weight: 900;
            color: rgba(255, 255, 255, 0.03); z-index: 1; pointer-events: none;
        }

        .btn { 
            background: white; color: black; border: none; padding: 14px; 
            border-radius: 18px; font-family: var(--font-display); font-weight: 800; 
            font-size: 0.85rem; width: 100%; cursor: pointer; text-transform: uppercase; 
            margin-bottom: 10px; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            position: relative; z-index: 10;
        }
        .btn-purple { background: var(--neon-purple); color: white; box-shadow: 0 4px 0 #5e2a7a; }
        .btn-option { 
            background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); 
            text-align: left; justify-content: flex-start; font-weight: 400; text-transform: none;
        }

        .score-board { display: flex; gap: 8px; margin-bottom: 15px; width: 100%; max-width: 440px; }
        .score-card { flex: 1; background: var(--glass); padding: 10px 5px; border-radius: 15px; border-bottom: 3px solid var(--neon-blue); position: relative; }
        .score-card.active { border-color: var(--neon-green); background: rgba(30, 215, 96, 0.1); }
        .team-n { font-size: 0.6rem; font-weight: 900; opacity: 0.8; color: var(--neon-purple); }
        .pts { font-size: 1rem; font-weight: 900; }
        
        .team-members { font-family: var(--font-data); font-size: 0.5rem; text-align: left; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 5px; }
        .member-tag.active-player { color: var(--neon-green); font-weight: 700; text-decoration: underline; }

        .correct { background: var(--neon-green) !important; color: black !important; font-weight: 900; }
        .wrong { background: var(--neon-red) !important; color: white !important; }
        .disabled { pointer-events: none; opacity: 0.5; }
        .hidden-opt { visibility: hidden; pointer-events: none; }
        
        .powers-container { display: flex; gap: 5px; margin-bottom: 15px; justify-content: center; width: 100%; max-width: 420px; }
        .power-btn { 
            flex: 1; padding: 8px 5px; border-radius: 12px; font-size: 0.65rem; font-weight: 900;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s;
            background: #333; color: #777;
            display: flex; flex-direction: column; align-items: center; gap: 2px;
        }
        .power-btn.available.p-skip { background: var(--neon-blue); color: white; border-color: #4a67ff; }
        .power-btn.available.p-hint { background: var(--neon-gold); color: black; border-color: #fff; }
        .power-btn.available.p-time { background: var(--neon-green); color: black; border-color: #fff; }

        .interaction-panel { margin-top: 15px; display: flex; gap: 8px; justify-content: center; position: relative; z-index: 10; }
        .btn-react { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 8px; border-radius: 10px; cursor: pointer; }
        
        .floating-emoji {
            position: fixed; bottom: -50px; font-size: 2.5rem; z-index: 100;
            pointer-events: none; animation: floatUp 2s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-80vh) translateX(var(--random-x)) rotate(var(--random-rotate)); opacity: 0; }
        }

        .sudden-death { background: linear-gradient(45deg, #ff0000, #550000) !important; animation: shake 0.5s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 10% { transform: translate(-1px, -2px); } }

        .critical-glow { animation: pulse-red 0.5s infinite alternate; }
        @keyframes pulse-red { from { box-shadow: 0 0 10px rgba(255, 70, 70, 0); } to { box-shadow: 0 0 25px rgba(255, 70, 70, 0.3); } }
    </style>
</head>

<div class="noise"></div>

<div id="screen-lobby" class="screen active">
    <h1>QUIZ TIMES</h1>

        <p id="waiting-msg">Aguardando o Host...</p>
    </div>
</div>

<div id="screen-quiz" class="screen">

    <div class="powers-container" id="powers-row">
        <button id="p-skip" class="power-btn p-skip" onclick="usePower('skip')">
            <i class="fas fa-forward"></i> PULAR (-5)
        </button>
        <button id="p-hint" class="power-btn p-hint" onclick="usePower('hint')">
            <i class="fas fa-magic"></i> 50/50 (-5)
        </button>
        <button id="p-time" class="power-btn p-time" onclick="usePower('time')">
            <i class="fas fa-clock"></i> TEMPO (-5)
        </button>
    </div>

    <div class="card" id="quiz-card">
        <div class="timer-bar-container"><div id="timer-progress" class="timer-progress"></div></div>
        <div id="timer-bg-number" class="timer-bg-number">0</div>
        
        <div class="turn-indicator" id="current-turn-msg" style="font-size: 0.8rem; font-weight: 900; color: var(--neon-purple); margin-bottom: 10px; position: relative; z-index: 10;"></div>
        <div class="question-text" id="q-text" style="font-weight: 700; margin-bottom: 20px; font-size: 1.1rem; position: relative; z-index: 10;"></div>
        
        <div id="options-grid"></div>
        <div id="interaction-panel" class="interaction-panel">
            <button class="btn-react" onclick="sendReaction('👏')">👏</button>
            <button class="btn-react" onclick="sendReaction('🔥')">🔥</button>
            <button class="btn-react" onclick="sendReaction('🤔')">🤔</button>
            <button class="btn-react" onclick="sendReaction('😂')">😂</button>
        </div>
    </div>
</div>

<div id="screen-result" class="screen">

    if (roomCode) {
        onValue(ref(db, `rooms/${roomCode}`), (snap) => {
            const data = snap.val();
            if (!data) return;
            amIHost = (data.host === myId);
            if (data.players && data.players[myId]) myName = data.players[myId].name;
            if (data.players) {
                const list = Object.values(data.players).map(p => p.name);
                document.getElementById('player-count').innerText = list.length;
                document.getElementById('player-list-text').innerText = list.join(', ');
            }
            document.getElementById('host-controls').style.display = amIHost ? 'block' : 'none';
            document.getElementById('waiting-msg').style.display = amIHost ? 'none' : 'block';
            if (data.status === 'in_quiz' && data.quizGameState) {
                currentQuestions = data.quizGameState.shuffledQuestions || originalQuestions;
                renderQuiz(data.quizGameState);
            } else if (data.status === 'quiz_finished') {
                showFinal(data.quizGameState);
            }
        });
        onValue(ref(db, `rooms/${roomCode}/reactions`), (snap) => {
            const reaction = snap.val();
            if (reaction) spawnFloatingEmoji(reaction.emoji);
        });
    }

    function renderQuiz(state) {
        document.getElementById('screen-lobby').classList.remove('active');
        document.getElementById('screen-quiz').classList.add('active');
        const isSuddenDeath = state.isSuddenDeath;
        const currentTeamIdx = state.currentTeamIndex;
        const currentTeam = state.teams[currentTeamIdx];
        const activePlayerName = isSuddenDeath ? "QUALQUER UM!" : currentTeam.players[currentTeam.currentPlayerIdx || 0];
        const isMyTurn = isSuddenDeath || (activePlayerName.trim() === myName.trim());
        canClick = isMyTurn && (state.lastAnswer === null || state.lastAnswer === undefined);

        updatePowersUI(currentTeam, isMyTurn && !isSuddenDeath, state.powerUsedInRound);

        if (isSuddenDeath) {
            document.getElementById('quiz-card').classList.add('sudden-death');
            document.getElementById('current-turn-msg').innerText = "🚨 MORTE SÚBITA - QUEM CLICAR GANHA!";
            document.getElementById('powers-row').style.display = 'none';
        } else {
            document.getElementById('current-turn-msg').innerText = isMyTurn ? "🔥 SUA VEZ!" : `TURNO DE: ${activePlayerName}`;
        }

        document.getElementById('hud-score').innerHTML = state.teams.map((t, idx) => {
            const isThisTeamActive = (idx === currentTeamIdx);
            return `
                <div class="score-card ${isThisTeamActive ? 'active' : ''}">
                    <div class="team-n">${t.name} ${t.combo > 1 ? `🔥x${t.combo}` : ''}</div>
                    <div class="pts">${t.score} PTS</div>
                    <div class="team-members">
                        ${t.players.map((p, pIdx) => `<span class="member-tag ${isThisTeamActive && pIdx === (t.currentPlayerIdx || 0) ? 'active-player' : ''}">${p}</span>`).join('')}
                    </div>
                </div>
            `;
        }).join('');

        if (localQIndex !== state.currentQuestionIndex || state.forceReRender) {
            const q = isSuddenDeath ? hardQuestion : currentQuestions[state.currentQuestionIndex];
            localQIndex = state.currentQuestionIndex;
            if (!state.activePowerHint) {
                displayedOptions = q.options.map((opt, idx) => ({ text: opt, originalIdx: idx }));
                displayedOptions.sort(() => Math.random() - 0.5);
            }
            startTimer();
            document.getElementById('q-text').innerText = q.q;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            displayedOptions.forEach((optObj) => {
                const b = document.createElement('button');
                b.className = 'btn btn-option';
                if (state.activePowerHint && state.hiddenIndices && state.hiddenIndices.includes(optObj.originalIdx)) {
                    b.classList.add('hidden-opt');
                }
                b.innerText = optObj.text;
                b.onclick = () => { if (canClick) { canClick = false; handleSelect(optObj.originalIdx); } };
                grid.appendChild(b);
            });
        }

        if (state.lastAnswer !== null && state.lastAnswer !== undefined) {
            clearInterval(timerInt);
            resetVisualTimer();
            const btns = document.querySelectorAll('.btn-option');
            const q = isSuddenDeath ? hardQuestion : currentQuestions[state.currentQuestionIndex];
            const correctIdx = q.correct;
            displayedOptions.forEach((optObj, i) => {
                const b = btns[i];
                if (!b) return;
                b.classList.add('disabled');
                if (optObj.originalIdx === correctIdx) b.classList.add('correct');
                else if (optObj.originalIdx === state.lastAnswer) b.classList.add('wrong');
            });
            if (amIHost) setTimeout(() => nextRound(state), 2500);
        }
    }

    function startTimer() {
        clearInterval(timerInt);
        const card = document.getElementById('quiz-card');
        const bar = document.getElementById('timer-progress');
        const bgNum = document.getElementById('timer-bg-number');
        
        card.classList.remove('critical-glow');
        bar.classList.remove('warning');
        bar.style.width = '100%';
        
        let timeLeft = TOTAL_TIME;
        bgNum.innerText = timeLeft;

        const intervalMs = 100; 
        const totalMs = TOTAL_TIME * 1000;
        let elapsed = 0;

        timerInt = setInterval(() => {
            elapsed += intervalMs;
            let percentage = 100 - (elapsed / totalMs) * 100;
            bar.style.width = Math.max(0, percentage) + '%';
            
            let currentSec = Math.ceil((totalMs - elapsed) / 1000);
            if (currentSec !== timeLeft && currentSec >= 0) {
                timeLeft = currentSec;
                bgNum.innerText = timeLeft;
                if (timeLeft <= 3) {
                    bar.classList.add('warning');
                    card.classList.add('critical-glow');
                }
            }

            if (elapsed >= totalMs) {
                clearInterval(timerInt);
                // MUDANÇA: Se o tempo acabar e ninguém clicou, o Host envia timeout automático (-1)
                if (amIHost && canClick) handleSelect(-1); 
            }
        }, intervalMs);
    }

    function resetVisualTimer() {
        const card = document.getElementById('quiz-card');
        const bar = document.getElementById('timer-progress');
        card.classList.remove('critical-glow');
        bar.style.width = '0%';
    }

    window.usePower = async function(type) {
        const snap = await get(ref(db, `rooms/${roomCode}/quizGameState`));
        const state = snap.val();
        if (state.powerUsedInRound) return;
        const team = state.teams[state.currentTeamIndex];
        if (team.score < 10) return;
        let updateData = {};
        team.score -= 5;
        updateData[`rooms/${roomCode}/quizGameState/powerUsedInRound`] = true;
        if (type === 'skip') {
            updateData[`rooms/${roomCode}/quizGameState/teams`] = state.teams;
            await update(ref(db), updateData);
            nextRound(state, true);
            return;
        } else if (type === 'time') {
            updateData[`rooms/${roomCode}/quizGameState/forceReRender`] = Date.now();
        } else if (type === 'hint') {
            const q = currentQuestions[state.currentQuestionIndex];
            let indices = [0, 1, 2, 3].filter(i => i !== q.correct).sort(() => Math.random() - 0.5);
            updateData[`rooms/${roomCode}/quizGameState/activePowerHint`] = true;
            updateData[`rooms/${roomCode}/quizGameState/hiddenIndices`] = [indices[0], indices[1]];
            updateData[`rooms/${roomCode}/quizGameState/forceReRender`] = Date.now();
        }
        updateData[`rooms/${roomCode}/quizGameState/teams`] = state.teams;
        update(ref(db), updateData);
    };

    window.divideTeams = async function(num) {
        const snap = await get(ref(db, `rooms/${roomCode}/players`));
        const players = Object.values(snap.val()).map(p => p.name);
        const shuffledQ = [...originalQuestions].sort(() => Math.random() - 0.5);
        let teams = [];
        for (let i = 0; i < num; i++) {
            teams.push({ name: `TIME ${i+1}`, players: [], score: 0, combo: 0, currentPlayerIdx: 0 });
        }
        players.sort(() => Math.random() - 0.5).forEach((name, i) => {
            teams[i % num].players.push(name);
        });
        set(ref(db, `rooms/${roomCode}/quizGameState`), {
            teams: teams, shuffledQuestions: shuffledQ, currentQuestionIndex: 0,
            currentTeamIndex: 0, lastAnswer: null, isSuddenDeath: false, powerUsedInRound: false
        });
        update(ref(db, `rooms/${roomCode}`), { status: 'in_quiz' });
    };

    function updatePowersUI(team, myTurn, alreadyUsed) {
        const canAfford = team.score >= 10;
        const btns = ['p-skip', 'p-hint', 'p-time'];
        btns.forEach(id => {
            const el = document.getElementById(id);
            if (myTurn && canAfford && !alreadyUsed) {
                el.classList.add('available'); el.classList.remove('disabled');
            } else {
                el.classList.remove('available'); el.classList.add('disabled');
            }
        });
    }

    function handleSelect(idx) {
        update(ref(db, `rooms/${roomCode}/quizGameState`), { lastAnswer: idx, lastAnswerBy: myName });
    }

    async function nextRound(state, forceSkip = false) {
        if (!amIHost) return;
        const snap = await get(ref(db, `rooms/${roomCode}/quizGameState`));
        const current = snap.val();
        if (current.isSuddenDeath && !forceSkip) {
            update(ref(db, `rooms/${roomCode}`), { status: 'quiz_finished' }); return;
        }
        let nextQ = current.currentQuestionIndex + 1;
        let updatedTeams = [...current.teams];
        const teamIdx = current.currentTeamIndex;
        if (!forceSkip) {
            const isCorrect = (current.lastAnswer === currentQuestions[current.currentQuestionIndex].correct);
            
            if (current.lastAnswer === -1) {
                // PENALIDADE POR TEMPO ESGOTADO
                updatedTeams[teamIdx].score = Math.max(0, updatedTeams[teamIdx].score - 5);
                updatedTeams[teamIdx].combo = 0;
            } else if (isCorrect) {
                let pts = 10;
                updatedTeams[teamIdx].combo = (updatedTeams[teamIdx].combo || 0) + 1;
                if (updatedTeams[teamIdx].combo === 2) pts = 15;
                if (updatedTeams[teamIdx].combo >= 3) pts = 25;
                updatedTeams[teamIdx].score += pts;
            } else {
                // MUDANÇA: RESPOSTA ERRADA PERDE 2 PONTOS
                updatedTeams[teamIdx].score = Math.max(0, updatedTeams[teamIdx].score - 2);
                updatedTeams[teamIdx].combo = 0; 
            }
            updatedTeams[teamIdx].currentPlayerIdx = (updatedTeams[teamIdx].currentPlayerIdx + 1) % updatedTeams[teamIdx].players.length;
        }
        if (nextQ >= currentQuestions.length) {
            const scores = updatedTeams.map(t => t.score);
            if (new Set(scores).size !== scores.length) {
                update(ref(db, `rooms/${roomCode}/quizGameState`), { isSuddenDeath: true, teams: updatedTeams, lastAnswer: null, powerUsedInRound: false });
            } else {
                update(ref(db, `rooms/${roomCode}`), { status: 'quiz_finished', quizGameState: { ...current, teams: updatedTeams } });
            }
        } else {
            update(ref(db, `rooms/${roomCode}/quizGameState`), {
                currentQuestionIndex: nextQ, currentTeamIndex: (teamIdx + 1) % updatedTeams.length,
                lastAnswer: null, teams: updatedTeams, activePowerHint: false, hiddenIndices: null, forceReRender: null, powerUsedInRound: false
            });
        }
    }

    function showFinal(state) {
        document.getElementById('screen-quiz').classList.remove('active');
        document.getElementById('screen-result').classList.add('active');
        const sorted = [...state.teams].sort((a,b) => b.score - a.score);
        document.getElementById('final-stats').innerHTML = `
            <h2 style="color:var(--neon-green); margin-bottom:15px; text-shadow: 0 0 10px var(--neon-green);">${sorted[0].name} VENCEU!</h2>
            ${sorted.map(t => `
                <div style="display:flex; justify-content:space-between; margin-bottom: 8px; font-family:var(--font-data); border-bottom: 1px solid rgba(255,255,255,0.1);">
                    <span>${t.name}</span><span>${t.score} PTS</span>
                </div>
            `).join('')}
        `;
    }

    window.sendReaction = function(emoji) {
        set(ref(db, `rooms/${roomCode}/reactions`), { emoji: emoji, timestamp: Date.now() });
    }

    function spawnFloatingEmoji(emoji) {
        const container = document.getElementById('emoji-container');
        const el = document.createElement('div');
        el.className = 'floating-emoji'; el.innerText = emoji;
        el.style.left = `${Math.random() * 80 + 10}%`;
        el.style.setProperty('--random-x', `${(Math.random() - 0.5) * 200}px`);
        el.style.setProperty('--random-rotate', `${(Math.random() - 0.5) * 180}deg`);
        container.appendChild(el);
        setTimeout(() => el.remove(), 2000);
    }
</script>
</body>
