<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QUIZ - Desafio por Times PRO</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

        :root {
            --neon-purple: #8c42b3;
            --neon-blue: #2d46b9;
            --neon-green: #1ed760;
            --neon-red: #ff4646;
            --neon-gold: #ffc107;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.07);
            --font-display: 'Space Grotesk', sans-serif;
            --font-data: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: white;
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: var(--font-display);
            display: flex; align-items: center; justify-content: center;
        }

        .scanline {
            width: 100%; height: 100px; z-index: 1;
            background: linear-gradient(to bottom, transparent, rgba(140, 66, 179, 0.05), transparent);
            position: fixed; top: -100px; left: 0;
            animation: scan 8s linear infinite; pointer-events: none;
        }

        @keyframes scan { 0% { top: -100px; } 100% { top: 100%; } }
        .noise { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.06; pointer-events: none; z-index: 0; }
        
        .screen {
            position: absolute; width: 100%; height: 100%;
            display: none; flex-direction: column; padding: 20px;
            align-items: center; justify-content: center; text-align: center;
            z-index: 10;
        }
        .screen.active { display: flex; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 20px; text-transform: uppercase; text-shadow: 0 0 15px rgba(140, 66, 179, 0.5); }
        
        .card {
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 20px;
            width: 100%; max-width: 420px; box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            position: relative; overflow: hidden;
        }

        .btn { 
            background: white; color: black; border: none; padding: 14px; 
            border-radius: 18px; font-family: var(--font-display); font-weight: 800; 
            font-size: 0.85rem; width: 100%; cursor: pointer; text-transform: uppercase; 
            margin-bottom: 10px; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-purple { background: var(--neon-purple); color: white; box-shadow: 0 4px 0 #5e2a7a; }
        .btn-option { 
            background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); 
            text-align: left; justify-content: flex-start; font-weight: 400; text-transform: none;
            position: relative; margin-bottom: 10px;
        }

        .powers-row { 
            display: flex; 
            gap: 8px; 
            margin-top: 15px; 
            width: 100%; 
            justify-content: center;
            position: relative;
            z-index: 20;
        }
        .btn-power {
            flex: 1; padding: 10px 5px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(20, 20, 20, 0.9); color: white; 
            font-size: 0.65rem; font-weight: 700;
            cursor: not-allowed; transition: all 0.3s ease; 
            text-transform: uppercase;
            filter: grayscale(1); opacity: 0.3;
            pointer-events: none;
        }
        .btn-power span { display: block; font-size: 0.5rem; opacity: 0.6; margin-top: 2px; }
        
        .btn-power.unlocked {
            filter: grayscale(0); opacity: 1;
            cursor: pointer;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .btn-power.unlocked.shield { border-bottom: 4px solid var(--neon-blue); box-shadow: 0 0 15px rgba(45, 70, 185, 0.4); }
        .btn-power.unlocked.hint { border-bottom: 4px solid var(--neon-gold); box-shadow: 0 0 15px rgba(255, 193, 7, 0.4); }
        .btn-power.unlocked.mirror { border-bottom: 4px solid var(--neon-red); box-shadow: 0 0 15px rgba(255, 70, 70, 0.4); }

        .btn-power:active:not(:disabled) { transform: scale(0.95); }

        .score-board { display: flex; gap: 8px; margin-bottom: 15px; width: 100%; max-width: 440px; }
        .score-card { flex: 1; background: var(--glass); padding: 10px 5px; border-radius: 15px; border-bottom: 3px solid var(--neon-blue); position: relative; }
        .score-card.active { border-color: var(--neon-green); background: rgba(30, 215, 96, 0.1); }
        .team-n { font-size: 0.6rem; font-weight: 900; opacity: 0.8; color: var(--neon-purple); }
        .pts { font-size: 1rem; font-weight: 900; }
        
        .team-members { font-family: var(--font-data); font-size: 0.5rem; text-align: left; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 5px; }
        .member-tag.active-player { color: var(--neon-green); font-weight: 700; text-decoration: underline; }

        .timer-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); margin-bottom: 15px; border-radius: 2px; overflow: hidden; }
        .timer-fill { height: 100%; background: var(--neon-purple); width: 100%; transition: width 0.1s linear; }

        .correct { background: var(--neon-green) !important; color: black !important; font-weight: 900; }
        .wrong { background: var(--neon-red) !important; color: white !important; }
        .disabled { pointer-events: none; opacity: 0.7; }
        
        .interaction-panel { margin-top: 15px; display: flex; gap: 8px; justify-content: center; }
        .btn-react { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 8px; border-radius: 10px; cursor: pointer; }
        
        .floating-emoji {
            position: fixed; bottom: -50px; font-size: 2.5rem; z-index: 100;
            pointer-events: none; animation: floatUp 2s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-80vh) translateX(var(--random-x)) rotate(var(--random-rotate)); opacity: 0; }
        }

        .sudden-death { background: linear-gradient(45deg, #ff0000, #550000) !important; animation: shake 0.5s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 10% { transform: translate(-1px, -2px); } 20% { transform: translate(-3px, 0px); } }
    </style>
</head>
<body>

<div class="noise"></div>
<div class="scanline"></div>

<div id="screen-lobby" class="screen active">
    <h1>QUIZ TIMES</h1>
    <div class="card">
        <p style="opacity: 0.6; font-size: 0.8rem;">Jogadores na Sala:</p>
        <div id="player-count" style="font-size: 3rem; font-weight: 900; color: var(--neon-purple);">0</div>
        <p id="player-list-text" style="margin-bottom: 25px; font-size: 0.9rem; font-family: var(--font-data); color: var(--neon-green);">Conectando...</p>
        
        <div id="host-controls" style="display: none;">
            <button class="btn btn-purple" onclick="divideTeams(2)">DIVIDIR EM 2 TIMES</button>
            <button class="btn btn-purple" onclick="divideTeams(3)">DIVIDIR EM 3 TIMES</button>
        </div>
        <p id="waiting-msg">Aguardando o Host...</p>
    </div>
</div>

<div id="screen-quiz" class="screen">
    <div class="score-board" id="hud-score"></div>
    <div class="card" id="quiz-card">
        <div class="turn-indicator" id="current-turn-msg" style="font-size: 0.8rem; font-weight: 900; color: var(--neon-purple); margin-bottom: 5px;"></div>
        <div class="timer-bar"><div class="timer-fill" id="timer"></div></div>
        <div class="question-text" id="q-text" style="font-weight: 700; margin-bottom: 20px; font-size: 1.1rem;"></div>
        <div id="options-grid"></div>
        
        <div id="powers-panel" class="powers-row">
            <button id="power-shield" class="btn-power shield" onclick="window.usePower('shield')">🛡️ Escudo <span>10 pts</span></button>
            <button id="power-hint" class="btn-power hint" onclick="window.usePower('hint')">💡 50/50 <span>20 pts</span></button>
            <button id="power-mirror" class="btn-power mirror" onclick="window.usePower('mirror')">🪞 Espelho <span>30 pts</span></button>
        </div>

        <div id="interaction-panel" class="interaction-panel">
            <button class="btn-react" onclick="sendReaction('👏')">👏</button>
            <button class="btn-react" onclick="sendReaction('🔥')">🔥</button>
            <button class="btn-react" onclick="sendReaction('🤔')">🤔</button>
            <button class="btn-react" onclick="sendReaction('😂')">😂</button>
        </div>
    </div>
</div>

<div id="screen-result" class="screen">
    <h1>FIM DE JOGO</h1>
    <div class="card" id="final-stats"></div>
    <button class="btn btn-purple" style="margin-top: 20px;" onclick="location.reload()">REINICIAR</button>
</div>

<div id="emoji-container"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB1buacNarLY8ELWla6yeqTi4L0vTdloSc",
        authDomain: "wrapped-fad94.firebaseapp.com",
        databaseURL: "https://wrapped-fad94-default-rtdb.firebaseio.com",
        projectId: "wrapped-fad94",
        storageBucket: "wrapped-fad94.firebasestorage.app",
        messagingSenderId: "360236097664",
        appId: "1:360236097664:web:76777f529c18623bf1c665"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const urlParams = new URLSearchParams(window.location.search);
    const roomCode = urlParams.get('room');
    const myId = localStorage.getItem('wrapped_uid');

    let amIHost = false;
    let myName = "";
    let localQIndex = -1;
    let timerInt;
    let canClick = false;
    let currentQuestions = [];
    let displayedOptions = [];

    const originalQuestions = [
        { q: "Qual a capital da França?", options: ["Londres", "Paris", "Berlim", "Madrid"], correct: 1 },
        { q: "Quanto é 7 x 8?", options: ["54", "56", "62", "48"], correct: 1 },
        { q: "Qual o Planeta Vermelho?", options: ["Vênus", "Marte", "Saturno", "Urano"], correct: 1 },
        { q: "Qual o maior oceano do mundo?", options: ["Atlântico", "Índico", "Pacífico", "Ártico"], correct: 2 },
        { q: "Quem pintou a Mona Lisa?", options: ["Van Gogh", "Da Vinci", "Picasso", "Dalí"], correct: 1 },
        { q: "Qual elemento químico tem o símbolo 'O'?", options: ["Ouro", "Oxigênio", "Ozônio", "Osmio"], correct: 1 },
        { q: "Quantos continentes existem?", options: ["5", "6", "7", "4"], correct: 2 }
    ];

    const hardQuestion = { q: "MORTE SÚBITA: Qual a velocidade da luz aprox.?", options: ["200.000 km/s", "300.000 km/s", "150.000 km/s", "400.000 km/s"], correct: 1 };

    if (roomCode) {
        onValue(ref(db, `rooms/${roomCode}`), (snap) => {
            const data = snap.val();
            if (!data) return;

            amIHost = (data.host === myId);
            if (data.players && data.players[myId]) myName = data.players[myId].name;

            if (data.players) {
                const list = Object.values(data.players).map(p => p.name);
                document.getElementById('player-count').innerText = list.length;
                document.getElementById('player-list-text').innerText = list.join(', ');
            }
            document.getElementById('host-controls').style.display = amIHost ? 'block' : 'none';
            document.getElementById('waiting-msg').style.display = amIHost ? 'none' : 'block';

            if (data.status === 'in_quiz' && data.quizGameState) {
                currentQuestions = data.quizGameState.shuffledQuestions || originalQuestions;
                renderQuiz(data.quizGameState);
            } else if (data.status === 'quiz_finished') {
                showFinal(data.quizGameState);
            }
        });

        onValue(ref(db, `rooms/${roomCode}/reactions`), (snap) => {
            const reaction = snap.val();
            if (reaction) spawnFloatingEmoji(reaction.emoji);
        });
    }

    function renderQuiz(state) {
        document.getElementById('screen-lobby').classList.remove('active');
        document.getElementById('screen-quiz').classList.add('active');

        const isSuddenDeath = state.isSuddenDeath;
        const currentTeamIdx = state.currentTeamIndex;
        const currentTeam = state.teams[currentTeamIdx];
        const activePlayerName = isSuddenDeath ? "QUALQUER UM!" : currentTeam.players[currentTeam.currentPlayerIdx || 0];
        
        const isMyTurn = isSuddenDeath || (activePlayerName.trim() === myName.trim());
        canClick = isMyTurn && (state.lastAnswer === null || state.lastAnswer === undefined);

        if (isSuddenDeath) {
            document.getElementById('quiz-card').classList.add('sudden-death');
            document.getElementById('current-turn-msg').innerText = "🚨 MORTE SÚBITA - QUEM CLICAR GANHA!";
        } else {
            document.getElementById('quiz-card').classList.remove('sudden-death');
            document.getElementById('current-turn-msg').innerText = isMyTurn ? "🔥 SUA VEZ!" : `TURNO DE: ${activePlayerName}`;
        }

        document.getElementById('hud-score').innerHTML = state.teams.map((t, idx) => {
            const isThisTeamActive = (idx === currentTeamIdx);
            return `
                <div class="score-card ${isThisTeamActive ? 'active' : ''}">
                    <div class="team-n">${t.name} ${t.combo > 1 ? `🔥x${t.combo}` : ''}</div>
                    <div class="pts">${t.score} PTS</div>
                    <div class="team-members">
                        ${t.players.map((p, pIdx) => `<span class="member-tag ${isThisTeamActive && pIdx === (t.currentPlayerIdx || 0) ? 'active-player' : ''}">${p}</span>`).join('')}
                    </div>
                </div>
            `;
        }).join('');

        const shieldBtn = document.getElementById('power-shield');
        const hintBtn = document.getElementById('power-hint');
        const mirrorBtn = document.getElementById('power-mirror');

        const hasShieldPts = currentTeam.score >= 10;
        const hasHintPts = currentTeam.score >= 20;
        const hasMirrorPts = currentTeam.score >= 30;

        const powersAllowed = isMyTurn && !isSuddenDeath && state.lastAnswer === null && !state.activePower;

        if (hasShieldPts && powersAllowed) shieldBtn.classList.add('unlocked'); else shieldBtn.classList.remove('unlocked');
        if (hasHintPts && powersAllowed) hintBtn.classList.add('unlocked'); else hintBtn.classList.remove('unlocked');
        if (hasMirrorPts && powersAllowed) mirrorBtn.classList.add('unlocked'); else mirrorBtn.classList.remove('unlocked');

        if (localQIndex !== state.currentQuestionIndex || (state.activeHint && !displayedOptions.some(o => (state.hintIndices || []).includes(o.originalIdx)))) {
            localQIndex = state.currentQuestionIndex;
            const q = isSuddenDeath ? hardQuestion : currentQuestions[localQIndex];
            document.getElementById('q-text').innerText = q.q;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            
            let hiddenIndices = state.activeHint ? (state.hintIndices || []) : [];
            
            if (localQIndex !== state.lastRenderedQIndex) {
                displayedOptions = q.options.map((opt, idx) => ({ text: opt, originalIdx: idx }));
                displayedOptions.sort(() => Math.random() - 0.5);
                state.lastRenderedQIndex = localQIndex;
            }

            displayedOptions.forEach((optObj) => {
                if (hiddenIndices.includes(optObj.originalIdx)) return;
                const b = document.createElement('button');
                b.className = 'btn btn-option';
                b.innerText = optObj.text;
                b.onclick = () => { if (canClick) { canClick = false; handleSelect(optObj.originalIdx); } };
                grid.appendChild(b);
            });
            startTimer(isMyTurn);
        }

        if (state.lastAnswer !== null && state.lastAnswer !== undefined) {
            clearInterval(timerInt);
            const btns = document.querySelectorAll('.btn-option');
            const q = isSuddenDeath ? hardQuestion : currentQuestions[state.currentQuestionIndex];
            const correctIdx = q.correct;

            const visibleOptions = displayedOptions.filter(o => !state.activeHint || !(state.hintIndices || []).includes(o.originalIdx));
            
            visibleOptions.forEach((optObj, i) => {
                const b = btns[i];
                if (!b) return;
                b.classList.add('disabled');
                if (optObj.originalIdx === correctIdx) b.classList.add('correct');
                else if (optObj.originalIdx === state.lastAnswer) b.classList.add('wrong');
            });

            if (amIHost) {
                if (!window.nextRoundTimeout) {
                    window.nextRoundTimeout = setTimeout(() => {
                        nextRound(state);
                        window.nextRoundTimeout = null;
                    }, 2500);
                }
            }
        }
    }

    window.usePower = async function(type) {
        if (localQIndex === -1) return;

        const snap = await get(ref(db, `rooms/${roomCode}/quizGameState`));
        const current = snap.val();
        
        const teamIdx = current.currentTeamIndex;
        const currentTeam = current.teams[teamIdx];
        const activePlayerName = currentTeam.players[currentTeam.currentPlayerIdx || 0];
        
        if (activePlayerName.trim() !== myName.trim()) return;
        if (current.lastAnswer !== null || current.activePower) return;

        let cost = type === 'shield' ? 10 : (type === 'hint' ? 20 : 30);
        if (currentTeam.score < cost) return;

        let updates = {};
        updates[`rooms/${roomCode}/quizGameState/activePower`] = type;
        updates[`rooms/${roomCode}/quizGameState/teams/${teamIdx}/score`] = currentTeam.score - cost;

        if (type === 'hint') {
            const q = currentQuestions[current.currentQuestionIndex];
            let indices = [0, 1, 2, 3].filter(i => i !== q.correct);
            const toHide = indices.sort(() => Math.random() - 0.5).slice(0, 2);
            updates[`rooms/${roomCode}/quizGameState/activeHint`] = true;
            updates[`rooms/${roomCode}/quizGameState/hintIndices`] = toHide;
        }

        update(ref(db), updates);
    };

    function startTimer(active) {
        clearInterval(timerInt);
        let time = 100;
        const fill = document.getElementById('timer');
        timerInt = setInterval(() => {
            time -= 1;
            fill.style.width = time + '%';
            if (time <= 0) {
                clearInterval(timerInt);
                if (active && amIHost && canClick) handleSelect(-1);
            }
        }, 150);
    }

    function handleSelect(idx) {
        update(ref(db, `rooms/${roomCode}/quizGameState`), { 
            lastAnswer: idx,
            lastAnswerBy: myName 
        });
    }

    async function nextRound(state) {
        if (!amIHost) return;
        const snap = await get(ref(db, `rooms/${roomCode}/quizGameState`));
        const current = snap.val();
        
        if (current.isSuddenDeath) {
            update(ref(db, `rooms/${roomCode}`), { status: 'quiz_finished' });
            return;
        }

        let nextQ = current.currentQuestionIndex + 1;
        let updatedTeams = [...current.teams];
        const teamIdx = current.currentTeamIndex;
        const qData = currentQuestions[current.currentQuestionIndex];
        const isCorrect = (current.lastAnswer === qData.correct);

        if (isCorrect) {
            let pts = 10;
            updatedTeams[teamIdx].combo = (updatedTeams[teamIdx].combo || 0) + 1;
            if (updatedTeams[teamIdx].combo === 2) pts = 15;
            if (updatedTeams[teamIdx].combo >= 3) pts = 25;
            updatedTeams[teamIdx].score += pts;
            
            if (current.activePower === 'mirror') updatedTeams[teamIdx].mirrorActive = true;
        } else {
            updatedTeams[teamIdx].combo = 0;
            if (current.activePower !== 'shield') {
                const otherTeamIdx = (teamIdx + 1) % updatedTeams.length;
                if (updatedTeams[otherTeamIdx].mirrorActive) {
                    updatedTeams[teamIdx].score = Math.max(0, updatedTeams[teamIdx].score - 10);
                    updatedTeams[otherTeamIdx].score += 10;
                    updatedTeams[otherTeamIdx].mirrorActive = false;
                }
            }
        }

        updatedTeams[teamIdx].currentPlayerIdx = (updatedTeams[teamIdx].currentPlayerIdx + 1) % updatedTeams[teamIdx].players.length;

        if (nextQ >= currentQuestions.length) {
            const scores = updatedTeams.map(t => t.score);
            const isTie = new Set(scores).size !== scores.length;
            if (isTie) {
                update(ref(db, `rooms/${roomCode}/quizGameState`), { 
                    isSuddenDeath: true, 
                    teams: updatedTeams,
                    lastAnswer: null,
                    activeHint: false,
                    activePower: null 
                });
            } else {
                update(ref(db, `rooms/${roomCode}`), { status: 'quiz_finished', quizGameState: { ...current, teams: updatedTeams } });
            }
        } else {
            update(ref(db, `rooms/${roomCode}/quizGameState`), {
                currentQuestionIndex: nextQ,
                currentTeamIndex: (teamIdx + 1) % updatedTeams.length,
                lastAnswer: null,
                activePower: null,
                activeHint: false,
                hintIndices: null,
                teams: updatedTeams
            });
        }
    }

    window.divideTeams = async function(num) {
        const snap = await get(ref(db, `rooms/${roomCode}/players`));
        const players = Object.values(snap.val()).map(p => p.name);
        const shuffledQ = [...originalQuestions].sort(() => Math.random() - 0.5);
        
        let teams = [];
        for (let i = 0; i < num; i++) {
            teams.push({ 
                name: `TIME ${i+1}`, 
                players: [], 
                score: 0, 
                combo: 0,
                currentPlayerIdx: 0
            });
        }
        players.sort(() => Math.random() - 0.5).forEach((name, i) => {
            teams[i % num].players.push(name);
        });

        set(ref(db, `rooms/${roomCode}/quizGameState`), {
            teams: teams,
            shuffledQuestions: shuffledQ,
            currentQuestionIndex: 0,
            currentTeamIndex: 0,
            lastAnswer: null,
            isSuddenDeath: false
        });
        update(ref(db, `rooms/${roomCode}`), { status: 'in_quiz' });
    };

    function showFinal(state) {
        document.getElementById('screen-quiz').classList.remove('active');
        document.getElementById('screen-result').classList.add('active');
        const sorted = [...state.teams].sort((a,b) => b.score - a.score);
        const winner = sorted[0];
        
        document.getElementById('final-stats').innerHTML = `
            <h2 style="color:var(--neon-green); margin-bottom:15px; text-shadow: 0 0 10px var(--neon-green);">${winner.name} VENCEU!</h2>
            ${sorted.map(t => `
                <div style="display:flex; justify-content:space-between; margin-bottom: 8px; font-family:var(--font-data); border-bottom: 1px solid rgba(255,255,255,0.1);">
                    <span>${t.name}</span>
                    <span>${t.score} PTS</span>
                </div>
            `).join('')}
        `;
    }

    window.sendReaction = function(emoji) {
        set(ref(db, `rooms/${roomCode}/reactions`), { emoji: emoji, timestamp: Date.now() });
    }

    function spawnFloatingEmoji(emoji) {
        const container = document.getElementById('emoji-container');
        const el = document.createElement('div');
        el.className = 'floating-emoji';
        el.innerText = emoji;
        el.style.left = `${Math.random() * 80 + 10}%`;
        el.style.setProperty('--random-x', `${(Math.random() - 0.5) * 200}px`);
        el.style.setProperty('--random-rotate', `${(Math.random() - 0.5) * 180}deg`);
        container.appendChild(el);
        setTimeout(() => el.remove(), 2000);
    }
</script>
</body>
</html>
