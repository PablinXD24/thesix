<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QUIZ - Desafio por Times PRO</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

        :root {
            --neon-purple: #8c42b3;
            --neon-blue: #2d46b9;
            --neon-green: #1ed760;
            --neon-red: #ff4646;
            --neon-gold: #ffc107;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.07);
            --font-display: 'Space Grotesk', sans-serif;
            --font-data: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: white;
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: var(--font-display);
            display: flex; align-items: center; justify-content: center;
        }

        .noise { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.06; pointer-events: none; z-index: 0; }
        
        .screen {
            position: absolute; width: 100%; height: 100%;
            display: none; flex-direction: column; padding: 20px;
            align-items: center; justify-content: center; text-align: center;
            z-index: 10;
        }
        .screen.active { display: flex; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 20px; text-transform: uppercase; text-shadow: 0 0 15px rgba(140, 66, 179, 0.5); }
        
        .card {
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 25px;
            width: 100%; max-width: 420px; box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            position: relative; overflow: hidden;
        }

        .timer-bar-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 6px;
            background: rgba(255,255,255,0.05); z-index: 20;
        }
        .timer-progress {
            height: 100%; width: 100%;
            background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
            transition: width 0.1s linear, background 0.3s ease;
        }
        .timer-progress.warning {
            background: var(--neon-red);
            box-shadow: 0 0 15px var(--neon-red);
        }

        .timer-bg-number {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: var(--font-data); font-size: 10rem; font-weight: 900;
            color: rgba(255, 255, 255, 0.03); z-index: 1; pointer-events: none;
        }

        .btn { 
            background: white; color: black; border: none; padding: 14px; 
            border-radius: 18px; font-family: var(--font-display); font-weight: 800; 
            font-size: 0.85rem; width: 100%; cursor: pointer; text-transform: uppercase; 
            margin-bottom: 10px; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            position: relative; z-index: 10;
        }
        .btn-purple { background: var(--neon-purple); color: white; box-shadow: 0 4px 0 #5e2a7a; }
        .btn-option { 
            background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); 
            text-align: left; justify-content: flex-start; font-weight: 400; text-transform: none;
        }

        .score-board { display: flex; gap: 8px; margin-bottom: 15px; width: 100%; max-width: 440px; }
        .score-card { flex: 1; background: var(--glass); padding: 10px 5px; border-radius: 15px; border-bottom: 3px solid var(--neon-blue); position: relative; }
        .score-card.active { border-color: var(--neon-green); background: rgba(30, 215, 96, 0.1); }
        .team-n { font-size: 0.6rem; font-weight: 900; opacity: 0.8; color: var(--neon-purple); }
        .pts { font-size: 1rem; font-weight: 900; }
        
        .team-members { font-family: var(--font-data); font-size: 0.5rem; text-align: left; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 5px; }
        .member-tag.active-player { color: var(--neon-green); font-weight: 700; text-decoration: underline; }

        .correct { background: var(--neon-green) !important; color: black !important; font-weight: 900; }
        .wrong { background: var(--neon-red) !important; color: white !important; }
        .disabled { pointer-events: none; opacity: 0.5; }
        .hidden-opt { visibility: hidden; pointer-events: none; }
        
        .powers-container { display: flex; gap: 5px; margin-bottom: 15px; justify-content: center; width: 100%; max-width: 420px; }
        .power-btn { 
            flex: 1; padding: 8px 5px; border-radius: 12px; font-size: 0.65rem; font-weight: 900;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s;
            background: #333; color: #777;
            display: flex; flex-direction: column; align-items: center; gap: 2px;
        }
        .power-btn.available.p-skip { background: var(--neon-blue); color: white; border-color: #4a67ff; }
        .power-btn.available.p-hint { background: var(--neon-gold); color: black; border-color: #fff; }
        .power-btn.available.p-time { background: var(--neon-green); color: black; border-color: #fff; }

        .interaction-panel { margin-top: 15px; display: flex; gap: 8px; justify-content: center; position: relative; z-index: 10; }
        .btn-react { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 8px; border-radius: 10px; cursor: pointer; }
        
        .floating-emoji {
            position: fixed; bottom: -50px; font-size: 2.5rem; z-index: 100;
            pointer-events: none; animation: floatUp 2s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-80vh) translateX(var(--random-x)) rotate(var(--random-rotate)); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="noise"></div>

<div id="screen-lobby" class="screen active">
    <h1>QUIZ TIMES</h1>
    <div class="card">
        <div id="player-count" style="font-size: 3rem; font-weight: 900; color: var(--neon-purple);">0</div>
        <p id="player-list-text" style="margin-bottom: 25px; font-size: 0.9rem; font-family: var(--font-data); color: var(--neon-green);">Conectando...</p>
        <div id="host-controls" style="display: none;">
            <button class="btn btn-purple" onclick="divideTeams(2)">DIVIDIR EM 2 TIMES</button>
            <button class="btn btn-purple" onclick="divideTeams(3)">DIVIDIR EM 3 TIMES</button>
        </div>
        <p id="waiting-msg">Aguardando o Host...</p>
    </div>
</div>

<div id="screen-quiz" class="screen">
    <div class="score-board" id="hud-score"></div>
    <div class="powers-container" id="powers-row">
        <button id="p-skip" class="power-btn p-skip" onclick="usePower('skip')">
            <i class="fas fa-forward"></i> PULAR (-5)
        </button>
        <button id="p-hint" class="power-btn p-hint" onclick="usePower('hint')">
            <i class="fas fa-magic"></i> 50/50 (-5)
        </button>
        <button id="p-time" class="power-btn p-time" onclick="usePower('time')">
            <i class="fas fa-clock"></i> TEMPO (-5)
        </button>
    </div>

    <div class="card" id="quiz-card">
        <div class="timer-bar-container"><div id="timer-progress" class="timer-progress"></div></div>
        <div id="timer-bg-number" class="timer-bg-number">0</div>
        
        <div class="turn-indicator" id="current-turn-msg" style="font-size: 0.8rem; font-weight: 900; color: var(--neon-purple); margin-bottom: 10px; position: relative; z-index: 10;"></div>
        <div class="question-text" id="q-text" style="font-weight: 700; margin-bottom: 20px; font-size: 1.1rem; position: relative; z-index: 10;"></div>
        
        <div id="options-grid"></div>
        <div id="interaction-panel" class="interaction-panel">
            <button class="btn-react" onclick="sendReaction('👏')">👏</button>
            <button class="btn-react" onclick="sendReaction('🔥')">🔥</button>
            <button class="btn-react" onclick="sendReaction('🤔')">🤔</button>
            <button class="btn-react" onclick="sendReaction('😂')">😂</button>
        </div>
    </div>
</div>

<div id="screen-result" class="screen">
    <h1>FIM DE JOGO</h1>
    <div class="card" id="final-stats"></div>
    <button class="btn btn-purple" style="margin-top: 20px;" onclick="location.reload()">REINICIAR</button>
</div>

<div id="emoji-container"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB1buacNarLY8ELWla6yeqTi4L0vTdloSc",
        authDomain: "wrapped-fad94.firebaseapp.com",
        databaseURL: "https://wrapped-fad94-default-rtdb.firebaseio.com",
        projectId: "wrapped-fad94",
        storageBucket: "wrapped-fad94.firebasestorage.app",
        messagingSenderId: "360236097664",
        appId: "1:360236097664:web:76777f529c18623bf1c665"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const urlParams = new URLSearchParams(window.location.search);
    const roomCode = urlParams.get('room');
    const myId = localStorage.getItem('wrapped_uid');

    let amIHost = false;
    let myName = "";
    let localQIndex = -1;
    let timerInt;
    let canClick = false;
    let currentQuestions = [];
    const TOTAL_TIME = 7;

    const originalQuestions = [
        { q: "Qual a capital da França?", options: ["Londres", "Paris", "Berlim", "Madrid"], correct: 1 },
        { q: "Quanto é 7 x 8?", options: ["54", "56", "62", "48"], correct: 1 },
        { q: "Qual o Planeta Vermelho?", options: ["Vênus", "Marte", "Saturno", "Urano"], correct: 1 },
        { q: "Qual o maior oceano do mundo?", options: ["Atlântico", "Índico", "Pacífico", "Ártico"], correct: 2 },
        { q: "Quem pintou a Mona Lisa?", options: ["Van Gogh", "Da Vinci", "Picasso", "Dalí"], correct: 1 }
    ];

    // INICIALIZAÇÃO
    if (!roomCode) {
        alert("Sala não encontrada!");
        window.location.href = "index.html";
    }

    onValue(ref(db, `rooms/${roomCode}/host`), (s) => {
        if (s.val() === myId) {
            amIHost = true;
            document.getElementById('host-controls').style.display = 'block';
            document.getElementById('waiting-msg').style.display = 'none';
        }
    });

    onValue(ref(db, `rooms/${roomCode}/players`), (s) => {
        const players = s.val() || {};
        const list = Object.values(players);
        document.getElementById('player-count').innerText = list.length;
        document.getElementById('player-list-text').innerText = list.map(p => p.name).join(', ');
        if (players[myId]) myName = players[myId].name;
    });

    // REAÇÕES (CORREÇÃO DO BUG)
    window.sendReaction = function(emoji) {
        // Usamos update em vez de set para não apagar outros dados da sala acidentalmente
        update(ref(db, `rooms/${roomCode}/reactions`), {
            emoji: emoji,
            sender: myName || "Anônimo",
            timestamp: Date.now()
        });
    }

    onValue(ref(db, `rooms/${roomCode}/reactions`), (s) => {
        const data = s.val();
        if (data && data.emoji) {
            spawnFloatingEmoji(data.emoji);
        }
    });

    function spawnFloatingEmoji(emoji) {
        const container = document.getElementById('emoji-container');
        if(!container) return;
        const el = document.createElement('div');
        el.className = 'floating-emoji'; 
        el.innerText = emoji;
        el.style.left = `${Math.random() * 80 + 10}%`;
        el.style.setProperty('--random-x', `${(Math.random() - 0.5) * 200}px`);
        el.style.setProperty('--random-rotate', `${(Math.random() - 0.5) * 90}deg`);
        container.appendChild(el);
        setTimeout(() => el.remove(), 2000);
    }

    // LÓGICA DE TIMES E JOGO
    window.divideTeams = async function(num) {
        const s = await get(ref(db, `rooms/${roomCode}/players`));
        const players = Object.entries(s.val() || {});
        players.sort(() => Math.random() - 0.5);
        
        const teams = [];
        for(let i=0; i<num; i++) {
            teams.push({ name: `TIME ${i+1}`, score: 0, members: [] });
        }
        
        players.forEach(([id, p], idx) => {
            teams[idx % num].members.push({ id, name: p.name });
        });

        const shuffledQ = [...originalQuestions].sort(() => Math.random() - 0.5).slice(0, 15);

        set(ref(db, `rooms/${roomCode}/gameState`), {
            status: 'playing',
            teams: teams,
            currentQIndex: 0,
            turnTeamIdx: 0,
            turnPlayerIdx: 0,
            questions: shuffledQ,
            timer: TOTAL_TIME,
            lastUpdate: Date.now()
        });
    }

    onValue(ref(db, `rooms/${roomCode}/gameState`), (s) => {
        const state = s.val();
        if (!state) return;

        if (state.status === 'playing') {
            document.getElementById('screen-lobby').classList.remove('active');
            document.getElementById('screen-quiz').classList.add('active');
            renderGame(state);
        } else if (state.status === 'finished') {
            showFinal(state);
        }
    });

    function renderGame(state) {
        const team = state.teams[state.turnTeamIdx];
        const player = team.members[state.turnPlayerIdx];
        const isMyTurn = player.id === myId;
        
        // HUD
        const hud = document.getElementById('hud-score');
        hud.innerHTML = state.teams.map((t, idx) => `
            <div class="score-card ${idx === state.turnTeamIdx ? 'active' : ''}">
                <div class="team-n">${t.name}</div>
                <div class="pts">${t.score} PTS</div>
                <div class="team-members">
                    ${t.members.map(m => `<span class="member-tag ${m.id === player.id ? 'active-player' : ''}">${m.name}</span>`).join(' ')}
                </div>
            </div>
        `).join('');

        // Questão
        if (state.currentQIndex !== localQIndex) {
            localQIndex = state.currentQIndex;
            const q = state.questions[localQIndex];
            document.getElementById('q-text').innerText = q.q;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const b = document.createElement('button');
                b.className = 'btn btn-option';
                b.innerText = opt;
                b.onclick = () => handleAnswer(idx);
                grid.appendChild(b);
            });
            canClick = true;
        }

        document.getElementById('current-turn-msg').innerText = isMyTurn ? "SUA VEZ!" : `VEZ DE: ${player.name}`;
        
        // Timer
        updateTimerUI(state.timer);
        
        // Habilitar cliques apenas para o jogador da vez
        const options = document.querySelectorAll('.btn-option');
        options.forEach(opt => {
            if (isMyTurn && canClick) opt.classList.remove('disabled');
            else opt.classList.add('disabled');
        });

        // Power Buttons
        const pRow = document.getElementById('powers-row');
        if (isMyTurn && canClick) pRow.style.opacity = '1';
        else pRow.style.opacity = '0.3';
    }

    function updateTimerUI(seconds) {
        const bar = document.getElementById('timer-progress');
        const num = document.getElementById('timer-bg-number');
        const perc = (seconds / TOTAL_TIME) * 100;
        bar.style.width = `${perc}%`;
        num.innerText = seconds;
        if(seconds <= 3) bar.classList.add('warning');
        else bar.classList.remove('warning');
    }

    async function handleAnswer(idx) {
        if (!canClick) return;
        canClick = false;

        const s = await get(ref(db, `rooms/${roomCode}/gameState`));
        const state = s.val();
        const q = state.questions[state.currentQIndex];
        const isCorrect = idx === q.correct;

        const opts = document.querySelectorAll('.btn-option');
        opts[idx].classList.add(isCorrect ? 'correct' : 'wrong');
        if(!isCorrect) opts[q.correct].classList.add('correct');

        setTimeout(() => {
            nextTurn(isCorrect ? 10 : 0);
        }, 1500);
    }

    window.usePower = async function(type) {
        if (!canClick) return;
        const s = await get(ref(db, `rooms/${roomCode}/gameState`));
        let state = s.val();
        
        if (state.teams[state.turnTeamIdx].score < 5) return;
        state.teams[state.turnTeamIdx].score -= 5;

        if (type === 'skip') {
            nextTurn(0);
        } else if (type === 'hint') {
            const q = state.questions[state.currentQIndex];
            const opts = document.querySelectorAll('.btn-option');
            let hidden = 0;
            opts.forEach((btn, i) => {
                if (i !== q.correct && hidden < 2) {
                    btn.classList.add('hidden-opt');
                    hidden++;
                }
            });
            update(ref(db, `rooms/${roomCode}/gameState`), state);
        } else if (type === 'time') {
            state.timer = Math.min(state.timer + 5, TOTAL_TIME);
            update(ref(db, `rooms/${roomCode}/gameState`), state);
        }
    }

    async function nextTurn(points) {
        const s = await get(ref(db, `rooms/${roomCode}/gameState`));
        let state = s.val();
        
        state.teams[state.turnTeamIdx].score += points;
        
        // Próximo Jogador/Time
        state.turnPlayerIdx++;
        if (state.turnPlayerIdx >= state.teams[state.turnTeamIdx].members.length) {
            state.turnPlayerIdx = 0;
            state.turnTeamIdx = (state.turnTeamIdx + 1) % state.teams.length;
        }

        state.currentQIndex++;
        state.timer = TOTAL_TIME;

        if (state.currentQIndex >= state.questions.length) {
            state.status = 'finished';
        }

        update(ref(db, `rooms/${roomCode}/gameState`), state);
    }

    // Loop do Timer (Apenas Host controla)
    setInterval(async () => {
        if (!amIHost) return;
        const s = await get(ref(db, `rooms/${roomCode}/gameState`));
        const state = s.val();
        if (!state || state.status !== 'playing') return;

        if (state.timer > 0) {
            update(ref(db, `rooms/${roomCode}/gameState`), { timer: state.timer - 1 });
        } else {
            nextTurn(0);
        }
    }, 1000);

    function showFinal(state) {
        document.getElementById('screen-quiz').classList.remove('active');
        document.getElementById('screen-result').classList.add('active');
        const sorted = [...state.teams].sort((a,b) => b.score - a.score);
        document.getElementById('final-stats').innerHTML = `
            <h2 style="color:var(--neon-green); margin-bottom:15px;">${sorted[0].name} VENCEU!</h2>
            ${sorted.map(t => `
                <div style="display:flex; justify-content:space-between; margin-bottom: 8px; font-family:var(--font-data);">
                    <span>${t.name}</span><span>${t.score} PTS</span>
                </div>
            `).join('')}
        `;
    }
</script>
</body>
</html>
