<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QUIZ NEXUS - Edição Pro</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

        @property --p { syntax: '<percentage>'; inherits: false; initial-value: 100%; }

        :root {
            --accent: #8c42b3;
            --accent-glow: rgba(140, 66, 179, 0.4);
            --neon-blue: #00d2ff;
            --neon-green: #00ff88;
            --neon-red: #ff3e3e;
            --bg-dark: #030303;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(140, 66, 179, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(45, 70, 185, 0.15) 0%, transparent 40%);
            color: white;
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
            display: flex; align-items: center; justify-content: center;
        }

        /* Scanline & Noise */
        .overlay { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
        .scanline { width: 100%; height: 4px; background: rgba(140, 66, 179, 0.1); position: absolute; animation: moveScan 4s linear infinite; }
        @keyframes moveScan { from { top: 0; } to { top: 100%; } }

        /* Screens */
        .screen {
            position: absolute; width: 90%; max-width: 480px;
            display: none; flex-direction: column; opacity: 0; transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .screen.active { display: flex; opacity: 1; transform: translateY(0); }

        /* Typography */
        h1 { font-size: 2.5rem; font-weight: 900; text-align: center; margin-bottom: 30px; letter-spacing: -2px; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Card System */
        .card {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 32px; padding: 30px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); position: relative;
        }

        #quiz-card::before {
            content: ''; position: absolute; inset: -2px; border-radius: 34px;
            padding: 2px; background: conic-gradient(var(--accent) var(--p), transparent 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude; z-index: 1;
        }

        /* Buttons & Interactions */
        .btn {
            padding: 18px; border-radius: 20px; border: none; font-weight: 700;
            text-transform: uppercase; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 0.9rem;
        }
        .btn-main { background: var(--accent); color: white; box-shadow: 0 10px 20px var(--accent-glow); }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 15px 25px var(--accent-glow); }

        .btn-option {
            background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.8);
            border: 1px solid var(--glass-border); text-align: left; justify-content: flex-start;
            margin-bottom: 12px; font-weight: 400; font-family: 'JetBrains Mono', monospace;
        }
        .btn-option:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }

        /* Scores HUD */
        .score-hud { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; margin-bottom: 20px; width: 100%; }
        .score-box { 
            background: var(--glass); border-radius: 16px; padding: 12px; text-align: center;
            border-bottom: 4px solid transparent; transition: 0.3s;
        }
        .score-box.active { border-color: var(--accent); background: rgba(140, 66, 179, 0.1); transform: scale(1.05); }
        .score-val { font-size: 1.2rem; font-weight: 900; }
        .score-label { font-size: 0.6rem; text-transform: uppercase; opacity: 0.6; }

        /* Powers */
        .power-bar { display: flex; gap: 8px; margin-bottom: 15px; }
        .p-btn {
            flex: 1; padding: 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 700;
            border: 1px solid var(--glass-border); background: #111; color: #444; opacity: 0.5;
        }
        .p-btn.ready { opacity: 1; color: white; cursor: pointer; }
        .p-btn.ready.skip { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0,210,255,0.2); }
        .p-btn.ready.hint { border-color: var(--neon-green); box-shadow: 0 0 10px rgba(0,255,136,0.2); }

        /* States */
        .correct { background: var(--neon-green) !important; color: #000 !important; font-weight: 900; }
        .wrong { background: var(--neon-red) !important; color: #fff !important; }
        .disabled { pointer-events: none; }
        
        .sudden-death-anim { animation: glitch 0.2s infinite; border: 2px solid var(--neon-red) !important; }
        @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 40% { transform: translate(-2px, -2px); } 60% { transform: translate(2px, 2px); } 80% { transform: translate(2px, -2px); } 100% { transform: translate(0); } }

    </style>
</head>
<body>

<div class="overlay"><div class="scanline"></div></div>

<div id="screen-lobby" class="screen active">
    <h1>NEXUS <span style="font-weight: 300;">QUIZ</span></h1>
    <div class="card">
        <div style="text-align: center; margin-bottom: 20px;">
            <div id="p-count" style="font-size: 4rem; font-weight: 900; line-height: 1;">0</div>
            <div class="score-label">Jogadores Conectados</div>
        </div>
        <div id="p-list" style="font-family: 'JetBrains Mono'; font-size: 0.8rem; color: var(--neon-green); text-align: center; margin-bottom: 30px; min-height: 40px;"></div>
        
        <div id="host-zone" style="display: none;">
            <button class="btn btn-main" onclick="startGame(2)" style="margin-bottom: 10px; width: 100%;">DUAS EQUIPES</button>
            <button class="btn btn-main" onclick="startGame(3)" style="width: 100%; opacity: 0.8;">TRÊS EQUIPES</button>
        </div>
        <p id="guest-msg" style="text-align: center; font-size: 0.8rem; opacity: 0.5;">Aguardando o mestre da sala...</p>
    </div>
</div>

<div id="screen-game" class="screen">
    <div class="score-hud" id="hud-teams"></div>
    <div class="power-bar" id="power-bar"></div>

    <div class="card" id="quiz-card" style="--p: 100%;">
        <div id="turn-txt" style="font-size: 0.7rem; letter-spacing: 2px; font-weight: 700; color: var(--accent); margin-bottom: 10px; text-transform: uppercase;"></div>
        <div id="question-txt" style="font-size: 1.2rem; font-weight: 700; margin-bottom: 25px; min-height: 60px;"></div>
        <div id="options-box"></div>
    </div>
</div>

<div id="screen-results" class="screen">
    <h1>RESULTADOS</h1>
    <div class="card" id="podium"></div>
    <button class="btn btn-main" style="margin-top: 20px; width: 100%;" onclick="location.reload()">NOVA PARTIDA</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Configuração Firebase (Mantida)
    const firebaseConfig = {
        apiKey: "AIzaSyB1buacNarLY8ELWla6yeqTi4L0vTdloSc",
        authDomain: "wrapped-fad94.firebaseapp.com",
        databaseURL: "https://wrapped-fad94-default-rtdb.firebaseio.com",
        projectId: "wrapped-fad94"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const urlParams = new URLSearchParams(window.location.search);
    const roomCode = urlParams.get('room');
    const myId = localStorage.getItem('wrapped_uid');

    let amIHost = false;
    let myName = "";
    let localQIdx = -1;
    let timerId;
    let isTransitioning = false;

    const questions = [
        { q: "Qual linguagem é a 'alma' da web moderna?", options: ["Java", "JavaScript", "Python", "C++"], correct: 1 },
        { q: "O que significa a sigla UI?", options: ["User Interface", "User Internal", "Unique Idea", "Universal Int."], correct: 0 },
        { q: "Qual empresa criou o framework React?", options: ["Google", "Microsoft", "Meta", "Apple"], correct: 2 },
        { q: "Qual desses é um banco de dados NoSQL?", options: ["MySQL", "PostgreSQL", "MongoDB", "Oracle"], correct: 2 }
    ];

    if (roomCode) {
        onValue(ref(db, `rooms/${roomCode}`), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            amIHost = (data.host === myId);
            if (data.players && data.players[myId]) myName = data.players[myId].name;

            // Update Lobby
            if (data.players) {
                const names = Object.values(data.players).map(p => p.name);
                document.getElementById('p-count').innerText = names.length;
                document.getElementById('p-list').innerText = names.join(' • ');
            }
            document.getElementById('host-zone').style.display = amIHost ? 'block' : 'none';
            document.getElementById('guest-msg').style.display = amIHost ? 'none' : 'block';

            // Game State Controller
            if (data.status === 'in_quiz' && data.quizGameState) {
                switchScreen('screen-game');
                renderGame(data.quizGameState);
            } else if (data.status === 'finished') {
                switchScreen('screen-results');
                renderResults(data.quizGameState);
            }
        });
    }

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function renderGame(state) {
        const team = state.teams[state.currentTeamIdx];
        const activeP = state.isSuddenDeath ? "TODOS" : team.players[team.currentPlayerIdx];
        const isMyTurn = state.isSuddenDeath || activeP === myName;

        // HUD Teams
        const hud = document.getElementById('hud-teams');
        hud.innerHTML = state.teams.map((t, i) => `
            <div class="score-box ${i === state.currentTeamIdx ? 'active' : ''}">
                <div class="score-val">${t.score}</div>
                <div class="score-label">${t.name}</div>
            </div>
        `).join('');

        // Powers UI
        const pBar = document.getElementById('power-bar');
        const canUse = isMyTurn && team.score >= 10 && !state.powerUsed;
        pBar.innerHTML = `
            <button class="p-btn skip ${canUse ? 'ready' : ''}" onclick="usePower('skip')">PULAR</button>
            <button class="p-btn hint ${canUse ? 'ready' : ''}" onclick="usePower('hint')">50/50</button>
        `;

        // Question & Timer
        const q = questions[state.currentQuestionIdx];
        document.getElementById('turn-txt').innerText = isMyTurn ? "Sua vez de brilhar!" : `Aguardando ${activeP}`;
        document.getElementById('question-txt').innerText = q.q;

        if (localQIdx !== state.currentQuestionIdx || state.forceReset) {
            localQIdx = state.currentQuestionIdx;
            startTimerVisual();
            renderOptions(q, state, isMyTurn);
        }

        // Show Results of Answer
        if (state.lastAnswer !== null) {
            clearInterval(timerId);
            revealAnswer(q.correct, state.lastAnswer);
            if (amIHost && !isTransitioning) {
                isTransitioning = true;
                setTimeout(() => { moveNext(state); isTransitioning = false; }, 2000);
            }
        }
    }

    function renderOptions(q, state, isMyTurn) {
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        q.options.forEach((opt, i) => {
            if (state.hiddenIdx && state.hiddenIdx.includes(i)) return;
            const b = document.createElement('button');
            b.className = 'btn btn-option';
            b.innerText = opt;
            b.onclick = () => { if (isMyTurn && state.lastAnswer === null) submitAnswer(i); };
            box.appendChild(b);
        });
    }

    function startTimerVisual() {
        clearInterval(timerId);
        let p = 100;
        const el = document.getElementById('quiz-card');
        timerId = setInterval(() => {
            p -= 0.5;
            el.style.setProperty('--p', p + '%');
            if (p <= 0) {
                clearInterval(timerId);
                if (amIHost) submitAnswer(-1);
            }
        }, 50); // 10 Segundos total aprox
    }

    function revealAnswer(correct, userAns) {
        const btns = document.querySelectorAll('.btn-option');
        btns.forEach((b, i) => {
            b.classList.add('disabled');
            if (i === correct) b.classList.add('correct');
            else if (i === userAns) b.classList.add('wrong');
        });
    }

    async function submitAnswer(idx) {
        await update(ref(db, `rooms/${roomCode}/quizGameState`), { lastAnswer: idx });
    }

    window.startGame = async (numTeams) => {
        const snap = await get(ref(db, `rooms/${roomCode}/players`));
        const players = Object.values(snap.val()).map(p => p.name).sort(() => Math.random() - 0.5);
        
        let teams = Array.from({length: numTeams}, (_, i) => ({
            name: `Equipe ${i+1}`,
            players: [],
            score: 0,
            currentPlayerIdx: 0
        }));

        players.forEach((p, i) => teams[i % numTeams].players.push(p));

        set(ref(db, `rooms/${roomCode}/quizGameState`), {
            teams,
            currentQuestionIdx: 0,
            currentTeamIdx: 0,
            lastAnswer: null,
            powerUsed: false
        });
        update(ref(db, `rooms/${roomCode}`), { status: 'in_quiz' });
    };

    async function moveNext(state) {
        let nextIdx = state.currentQuestionIdx + 1;
        let teams = [...state.teams];
        const correct = questions[state.currentQuestionIdx].correct;

        if (state.lastAnswer === correct) teams[state.currentTeamIdx].score += 10;
        
        teams[state.currentTeamIdx].currentPlayerIdx = (teams[state.currentTeamIdx].currentPlayerIdx + 1) % teams[state.currentTeamIdx].players.length;

        if (nextIdx >= questions.length) {
            update(ref(db, `rooms/${roomCode}`), { status: 'finished' });
        } else {
            update(ref(db, `rooms/${roomCode}/quizGameState`), {
                currentQuestionIdx: nextIdx,
                currentTeamIdx: (state.currentTeamIdx + 1) % teams.length,
                lastAnswer: null,
                teams: teams,
                hiddenIdx: null,
                powerUsed: false,
                forceReset: Date.now()
            });
        }
    }

    function renderResults(state) {
        const winner = [...state.teams].sort((a,b) => b.score - a.score)[0];
        document.getElementById('podium').innerHTML = `
            <h2 style="color: var(--neon-green); text-align:center;">🏆 ${winner.name}</h2>
            <p style="text-align:center; opacity: 0.7; margin-bottom: 20px;">Dominou o Nexus com ${winner.score} pontos!</p>
        `;
    }

    window.usePower = async (type) => {
        const snap = await get(ref(db, `rooms/${roomCode}/quizGameState`));
        const state = snap.val();
        if (state.powerUsed) return;

        let upd = { powerUsed: true };
        if (type === 'skip') {
            moveNext(state);
            return;
        } else if (type === 'hint') {
            const q = questions[state.currentQuestionIdx];
            const wrongIdxs = [0,1,2,3].filter(i => i !== q.correct).sort(() => Math.random() - 0.5);
            upd.hiddenIdx = [wrongIdxs[0], wrongIdxs[1]];
        }
        
        const teams = [...state.teams];
        teams[state.currentTeamIdx].score -= 5;
        upd.teams = teams;
        update(ref(db, `rooms/${roomCode}/quizGameState`), upd);
    };
</script>
</body>
</html>
