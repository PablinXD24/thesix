<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NO MERCY - Red Edition</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --neon-red: #ff0000;
            --dark-red: #4d0000;
            --bg-dark: #020202;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-display: 'Space Grotesk', sans-serif;
            --font-data: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% -20%, var(--dark-red) 0%, transparent 50%);
            color: white;
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: var(--font-display);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        /* Estética Liquid Glass Aprimorada */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8), 
                        inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        .noise { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.08; pointer-events: none; z-index: 1; }
        
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; padding: 30px;
            align-items: center; justify-content: center; text-align: center;
            z-index: 10;
        }
        .screen.active { display: flex; animation: fadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 3.8rem; font-weight: 900; line-height: 0.85; text-transform: uppercase; margin-bottom: 20px; color: white; text-shadow: 0 0 20px rgba(255,0,0,0.5); letter-spacing: -2px; }
        h2 { text-transform: uppercase; letter-spacing: 3px; font-weight: 700; }
        p { font-family: var(--font-data); opacity: 0.6; margin-bottom: 20px; font-size: 0.9rem; }

        .btn { 
            background: white; color: black; border: none; padding: 22px; 
            border-radius: 18px; font-family: var(--font-display); font-weight: 900; 
            font-size: 1rem; width: 100%; cursor: pointer; text-transform: uppercase; 
            margin-bottom: 15px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 1px;
        }
        .btn:active { transform: scale(0.95); background: #eee; }

        .card { padding: 35px; width: 100%; margin-bottom: 25px; position: relative; z-index: 2; }

        .strikes-container { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; }
        .strike-dot { width: 30px; height: 6px; border-radius: 3px; background: #1a1a1a; transition: 0.5s; }
        .strike-dot.active { background: var(--neon-red); box-shadow: 0 0 25px var(--neon-red); transform: scaleX(1.1); }

        .vote-row { display: flex; gap: 12px; width: 100%; margin-top: 10px; }
        .btn-fail { background: rgba(255, 0, 0, 0.1); border: 1px solid var(--neon-red); color: var(--neon-red); }
        .btn-pass { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.2); color: white; }

        .pulse-text { animation: pulse 2s infinite; color: var(--neon-red); font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        .flash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 99; transition: background 0.1s; }
        
        /* Modificadores de Estado */
        .strike-bg { background-color: #600 !important; animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        .safe-bg { background-color: #111 !important; }
        .safe-bg h1 { color: #fff !important; text-shadow: 0 0 20px rgba(255,255,255,0.3); }

        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }

        .punishment-box { background: rgba(255, 0, 0, 0.1); border-left: 4px solid var(--neon-red); padding: 20px; border-radius: 0 15px 15px 0; margin-top: 25px; text-align: left; }

        .target-badge { background: var(--neon-red); color: white; font-family: var(--font-display); font-weight: 900; padding: 6px 16px; border-radius: 6px; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 15px; display: none; box-shadow: 0 0 30px rgba(255,0,0,0.6); }

        #target-player-display { font-family: var(--font-data); font-weight: 400; font-size: 1rem; color: #fff; opacity: 0.5; margin-bottom: 15px; }
        
        .streak-info { font-size: 0.7rem; color: #aaa; font-family: var(--font-data); margin-bottom: 10px; display: none; text-transform: uppercase; letter-spacing: 1px; }

        .target-pulse { animation: targetBg 1.5s infinite !important; }
        @keyframes targetBg { 0% { background-color: #020202; } 50% { background-color: #1a0000; } 100% { background-color: #020202; } }
    </style>
</head>
<body>

<div class="noise"></div>
<div id="flash-layer" class="flash-overlay"></div>

<div id="screen-lobby" class="screen active">
    <h1>NO<br>MERCY</h1>
    <p id="lobby-text" style="letter-spacing: 3px;">INITIALIZING PROTOCOL</p>
    <div id="loading" style="color: var(--neon-red);"><i class="fa-solid fa-circle-notch fa-spin"></i></div>
</div>

<div id="screen-game" class="screen">
    <div id="target-badge" class="target-badge">ALVO MARCADO</div>
    <div id="streak-info" class="streak-info">SHIELD: 1/2 ROUNDS</div>
    
    <div style="opacity: 0.4; font-family: var(--font-data); letter-spacing: 4px; font-size: 0.7rem;">EXECUTOR</div>
    <div id="current-player-name" style="font-size: 2.8rem; font-weight: 900; margin-bottom: 5px; color: white;">...</div>
    <div id="target-player-display"></div>
    
    <div class="strikes-container" id="game-strikes-display">
        <div class="strike-dot" id="s1"></div>
        <div class="strike-dot" id="s2"></div>
        <div class="strike-dot" id="s3"></div>
    </div>
    
    <div class="card glass-panel">
        <h3 style="opacity: 0.4; font-size: 0.7rem; margin-bottom: 15px; color: var(--neon-red); letter-spacing: 2px; font-family: var(--font-data);">MISSION_OBJECTIVE</h3>
        <div id="challenge-text" style="font-size: 1.5rem; font-weight: 700; line-height: 1.3;">...</div>
    </div>

    <div id="controls-area" style="width: 100%; margin-top: 10px;"></div>
    <p id="wait-msg" class="pulse-text" style="margin-top:20px; display:none;"></p>
</div>

<div id="screen-roulette" class="screen" style="background: black;">
    <div class="glass-panel" style="padding: 50px;">
        <i class="fa-solid fa-skull" style="font-size: 5rem; color: var(--neon-red); margin-bottom: 20px; filter: drop-shadow(0 0 15px red);"></i>
        <h2 style="color: white; font-size: 1.2rem;">CALCULATING<br>PUNISHMENT</h2>
    </div>
</div>

<div id="screen-result" class="screen">
    <div id="result-content" style="width: 100%;"></div>
</div>

<div id="screen-winner" class="screen">
    <div class="glass-panel" style="padding: 40px; border-color: var(--neon-red);">
        <i class="fa-solid fa-crown" style="font-size: 5rem; margin-bottom: 20px; color: gold;"></i>
        <h1>SURVIVOR</h1>
        <h2 id="winner-name" style="font-size: 2.5rem; color: white;">NOME</h2>
        <button class="btn" style="margin-top: 30px;" onclick="window.location.href='index.html'">REBOOT SYSTEM</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB1buacNarLY8ELWla6yeqTi4L0vTdloSc",
        authDomain: "wrapped-fad94.firebaseapp.com",
        databaseURL: "https://wrapped-fad94-default-rtdb.firebaseio.com",
        projectId: "wrapped-fad94",
        storageBucket: "wrapped-fad94.firebasestorage.app",
        messagingSenderId: "360236097664",
        appId: "1:360236097664:web:76777f529c18623bf1c665"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const database = {
        "punishments": ["VIRE 1 DOSE DE TEQUILA/CACHAÇA", "BEBA 2 DOSES DE ALGO FORTE", "ESCOLHA ALGUÉM PARA BEBER COM VOCÊ", "TOME UM COPO DE ÁGUA COM SAL", "FALE O RESTO DA RODADA COM SOTAQUE ESTRANGEIRO", "DÊ 5 VOLTAS EM TORNO DE SI MESMO E TENTE ANDAR EM LINHA RETA", "DEIXE ALGUÉM POSTAR UM STATUS NO SEU WHATSAPP", "MOSTRE A ÚLTIMA FOTO DA SUA GALERIA", "BEBA SEM USAR AS MÃOS", "PAGUE 10 FLEXÕES"],
        "challenges": ["Dê um beijo no pescoço de {target} e dê uma leve mordida.", "Sente no colo de {target} por uma rodada inteira.", "Faça uma massagem sensual nos ombros de {target}.", "Sussurre algo picante no ouvido de {target}.", "Dê um selinho em {target}.", "Deixe {target} dar um tapa na sua bunda.", "Tire uma peça de roupa (exceto íntima).", "Fique encarando {target} nos olhos por 30 segundos sem rir.", "Tente adivinhar a cor da peça íntima de {target}.", "Mande um emoji de 'foguinho' para a terceira pessoa do seu direct.", "Deixe que {target} escolha uma música para você dançar sensualmente.", "Fique de mãos dadas com {target} até a sua próxima vez.", "Tire uma selfie abraçado com {target} e guarde na galeria.", "Faça um elogio genuíno e 'quente' para {target}.", "Descreva o que mais te atrai fisicamente em {target}.", "Beba um gole de uma bebida diretamente do copo de {target}.", "Deixe {target} desenhar algo no seu braço com uma caneta.", "Conte qual foi o seu sonho mais estranho ou ousado recentemente.", "Faça um 'carinho' na perna de {target} por 20 segundos.", "Deixe {target} ver as suas notificações recentes."],
        "extremeChallenges": ["ALVO MARCADO: Deixe {target} tirar sua calça/saia e fique apenas de roupa íntima.", "ALVO MARCADO: Dê um beijo de língua em {target} por 15 segundos.", "ALVO MARCADO: Tire a sua camisa/blusa e jogue o resto da partida assim.", "ALVO MARCADO: Deixe {target} tirar uma peça de roupa sua usando apenas os dentes.", "ALVO MARCADO: Faça um body shot no corpo de {target}.", "ALVO MARCADO: Fique apenas de roupa íntima até o final da próxima rodada.", "ALVO MARCADO: Deixe o grupo escolher uma foto sua para postar nos Stories agora.", "ALVO MARCADO: Simule uma posição de RPG (quente) com {target} por 10 segundos.", "ALVO MARCADO: Receba 3 palmadas fortes de cada jogador do sexo oposto.", "ALVO MARCADO: Deixe {target} lamber uma parte do seu pescoço ou orelha."]
    };

    const urlParams = new URLSearchParams(window.location.search);
    const roomCode = urlParams.get('room');
    const myId = localStorage.getItem('wrapped_uid');
    
    let amIHost = false;
    let rouletteInterval = null;
    let isUpdating = false;

    if(!roomCode || !myId) {
        window.location.href = 'index.html';
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => {
            s.classList.remove('active');
            s.style.display = 'none';
        });
        const target = document.getElementById(id);
        if(target) {
            target.style.display = 'flex';
            setTimeout(() => target.classList.add('active'), 10);
        }
        document.body.className = '';
        document.body.classList.remove('target-pulse');
        document.getElementById('flash-layer').style.background = 'transparent';
        if(rouletteInterval) { clearInterval(rouletteInterval); rouletteInterval = null; }
    }

    function initGameLoop() {
        const roomRef = ref(db, `rooms/${roomCode}`);
        
        onValue(roomRef, (snap) => {
            const data = snap.val();
            if(!data) return; 

            document.getElementById('loading').style.display = 'none';
            if(data.host === myId) amIHost = true;
            
            if(data.nomercy_status === 'game_over') {
                showScreen('screen-winner');
                document.getElementById('winner-name').innerText = data.winnerName;
            }
            else if(data.nomercy_status === 'round') {
                showScreen('screen-game');
                renderGameRound(data);
                if(amIHost) checkVotes(data);
            }
            else if(data.nomercy_status === 'roulette_spin') {
                showScreen('screen-roulette');
                if(!rouletteInterval) {
                    rouletteInterval = setInterval(() => {
                        const flash = document.getElementById('flash-layer');
                        flash.style.background = Math.random() > 0.7 ? 'rgba(255, 0, 0, 0.2)' : 'transparent';
                    }, 100);
                }
            }
            else if(data.nomercy_status === 'round_result_fail') {
                showScreen('screen-result');
                document.body.classList.add('strike-bg');
                const pid = data.roundPlayer;
                const strikes = data.players[pid]?.strikes || 0;
                document.getElementById('result-content').innerHTML = `
                    <div class="glass-panel" style="padding:40px; width:90%; margin:auto;">
                        <i class="fa-solid fa-skull-crossbones" style="font-size:4rem; margin-bottom:20px; color:white;"></i>
                        <h1 style="font-size:3rem; color:white;">CRITICAL FAIL</h1>
                        <p style="font-size:1.1rem; color:white; opacity:1;">${pid === myId ? "SISTEMA COMPROMETIDO" : data.roundPlayerName.toUpperCase() + " FALHOU"}</p>
                        <div style="background:rgba(255,255,255,0.1); padding:8px 20px; border-radius:10px; margin-top:10px; display:inline-block; font-family:var(--font-data);">${strikes} / 3 STRIKES</div>
                        <div class="punishment-box">
                            <h3 style="color:var(--neon-red); margin-bottom:5px; font-size:0.7rem; letter-spacing:2px;">PUNIÇÃO_EXECUTADA</h3>
                            <p style="font-size:1.3rem; font-weight:bold; color:white;">${data.currentPunishment || "BEBA!"}</p>
                        </div>
                    </div>
                `;
            }
            else if(data.nomercy_status === 'round_result_safe') {
                showScreen('screen-result');
                document.body.classList.add('safe-bg');
                document.getElementById('result-content').innerHTML = `
                    <div class="glass-panel" style="padding:40px; width:90%; margin:auto; border-color: rgba(255,255,255,0.2);">
                        <i class="fa-solid fa-shield-halved" style="font-size:4rem; margin-bottom:20px; color:white;"></i>
                        <h1 style="font-size:4rem; color:white;">CLEARED</h1>
                        <p style="color:white; opacity:0.6; font-family:var(--font-data);">PROTOCOLO CONCLUÍDO</p>
                    </div>
                `;
            }
            else {
                if(amIHost && !isUpdating) startNewRound(data);
            }
        });
    }

    function renderGameRound(data) {
        const pid = data.roundPlayer;
        const strikes = data.players[pid]?.strikes || 0;
        const streak = data.players[pid]?.safeStreak || 0;

        document.getElementById('current-player-name').innerText = data.roundPlayerName;
        document.getElementById('challenge-text').innerText = data.roundChallenge.replace(/{target}/g, data.roundTarget || "ALGUÉM");
        
        document.getElementById('s1').className = strikes >= 1 ? 'strike-dot active' : 'strike-dot';
        document.getElementById('s2').className = strikes >= 2 ? 'strike-dot active' : 'strike-dot';
        document.getElementById('s3').className = strikes >= 3 ? 'strike-dot active' : 'strike-dot';

        if(strikes >= 3) {
            document.getElementById('target-badge').style.display = 'inline-block';
            document.body.classList.add('target-pulse');
            document.getElementById('streak-info').style.display = 'block';
            document.getElementById('streak-info').innerText = `SOBREVIVA: ${streak}/2 RODADAS PARA LIMPAR`;
        } else {
            document.getElementById('target-badge').style.display = 'none';
            document.getElementById('streak-info').style.display = 'none';
        }

        const controls = document.getElementById('controls-area');
        if(pid === myId) {
            controls.innerHTML = `<p class="pulse-text">VOCÊ ESTÁ SOB ANÁLISE...</p>`;
        } else {
            const myVote = data.roundVotes?.[myId];
            if(myVote) {
                controls.innerHTML = `<p style="opacity:0.4; font-family:var(--font-data); font-size:0.7rem;">STATUS ENVIADO: ${myVote === 'pass' ? 'SUCESSO' : 'FALHA'}</p>`;
            } else {
                controls.innerHTML = `
                    <div class="vote-row">
                        <button class="btn btn-fail" onclick="castVote('fail')">FALHOU 👎</button>
                        <button class="btn btn-pass" onclick="castVote('pass')">CUMPRIU 👍</button>
                    </div>`;
            }
        }
    }

    window.castVote = (vote) => set(ref(db, `rooms/${roomCode}/roundVotes/${myId}`), vote);

    async function startNewRound(roomData) {
        if (isUpdating) return;
        isUpdating = true;
        const players = roomData.players;
        const activeIds = Object.keys(players).sort();
        let nextIndex = (activeIds.indexOf(roomData.roundPlayer) + 1) % activeIds.length;
        const nextId = activeIds[nextIndex];
        
        const otherPlayers = activeIds.filter(id => id !== nextId);
        const randomTarget = otherPlayers.length > 0 ? players[otherPlayers[Math.floor(Math.random() * otherPlayers.length)]].name : "ALGUÉM";

        const isExtreme = (players[nextId].strikes || 0) >= 3;
        const pool = isExtreme ? database.extremeChallenges : database.challenges;
        const rndChall = pool[Math.floor(Math.random() * pool.length)];

        await update(ref(db, `rooms/${roomCode}`), {
            nomercy_status: 'round',
            roundPlayer: nextId,
            roundPlayerName: players[nextId].name,
            roundTarget: randomTarget,
            roundChallenge: rndChall,
            roundVotes: null,
            votesProcessed: null
        });
        isUpdating = false;
    }

    async function checkVotes(data) {
        if(data.votesProcessed || isUpdating) return;
        const votes = data.roundVotes || {};
        const required = Object.keys(data.players).length - 1;
        if(Object.keys(votes).length >= required && required > 0) {
            isUpdating = true;
            await update(ref(db, `rooms/${roomCode}`), { votesProcessed: true });
            let fails = Object.values(votes).filter(v => v === 'fail').length;
            const pid = data.roundPlayer;
            const pData = data.players[pid];

            if(fails > (Object.keys(votes).length / 2)) {
                const rndPunish = database.punishments[Math.floor(Math.random() * database.punishments.length)];
                await update(ref(db, `rooms/${roomCode}`), { nomercy_status: 'roulette_spin', currentPunishment: rndPunish });
                setTimeout(async () => {
                    await update(ref(db, `rooms/${roomCode}/players/${pid}`), { strikes: (pData.strikes || 0) + 1, safeStreak: 0 });
                    await update(ref(db, `rooms/${roomCode}`), { nomercy_status: 'round_result_fail' });
                    setTimeout(() => { isUpdating = false; startNewRound(data); }, 5000);
                }, 3000);
            } else {
                let newStreak = (pData.safeStreak || 0) + 1;
                let newStrikes = pData.strikes || 0;
                if(newStrikes >= 3 && newStreak >= 2) { newStrikes = 0; newStreak = 0; }
                await update(ref(db, `rooms/${roomCode}/players/${pid}`), { strikes: newStrikes, safeStreak: newStreak });
                await update(ref(db, `rooms/${roomCode}`), { nomercy_status: 'round_result_safe' });
                setTimeout(() => { isUpdating = false; startNewRound(data); }, 3000);
            }
        }
    }

    initGameLoop();
</script>
</body>
</html>
