<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NO MERCY - Alvo Marcado</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --neon-red: #ff1a1a;
            --deep-red: #8b0000;
            --neon-green: #1ed760;
            --neon-yellow: #f2e205;
            --bg-dark: #080101;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-display: 'Space Grotesk', sans-serif;
            --font-data: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: white;
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: var(--font-display);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: background 0.5s ease;
        }

        body::before {
            content: '';
            position: fixed;
            top: 50%; left: 50%;
            width: 150%; height: 150%;
            background: radial-gradient(circle, rgba(255, 26, 26, 0.08) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        .noise { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('https://grainy-gradients.vercel.app/noise.svg'); 
            opacity: 0.12; pointer-events: none; z-index: 1; 
        }
        
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; padding: 30px;
            align-items: center; justify-content: center; text-align: center;
            z-index: 10;
        }
        .screen.active { display: flex; animation: fadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px) scale(0.98); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        h1 { 
            font-size: 3.5rem; font-weight: 900; line-height: 0.85; 
            text-transform: uppercase; margin-bottom: 25px; 
            color: var(--neon-red);
            text-shadow: 0 0 30px rgba(255, 26, 26, 0.4);
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 32px; 
            padding: 40px 30px;
            width: 100%; max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7),
                        inset 0 0 20px rgba(255, 255, 255, 0.02);
            position: relative; z-index: 2;
        }

        .btn { 
            background: white; color: black; border: none; padding: 22px; 
            border-radius: 100px; font-family: var(--font-display); font-weight: 800; 
            font-size: 1.1rem; width: 100%; cursor: pointer; text-transform: uppercase; 
            margin-bottom: 15px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 1px;
        }
        .btn:active { transform: scale(0.94); box-shadow: 0 5px 15px rgba(255,255,255,0.2); }

        /* Modified: Skulls instead of dots */
        .strikes-container { display: flex; gap: 25px; justify-content: center; margin-bottom: 25px; }
        .strike-skull { 
            font-size: 1.8rem;
            color: #1a0505; 
            filter: drop-shadow(0 0 2px rgba(255, 26, 26, 0.1));
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .strike-skull.active { 
            color: var(--neon-red); 
            filter: drop-shadow(0 0 15px var(--neon-red)); 
            transform: scale(1.3) rotate(-5deg); 
        }

        .vote-row { display: flex; gap: 12px; width: 100%; margin-top: 25px; }
        .btn-fail { background: rgba(255, 26, 26, 0.1); border: 2.5px solid var(--neon-red); color: var(--neon-red); }
        .btn-pass { background: rgba(30, 215, 96, 0.1); border: 2.5px solid var(--neon-green); color: var(--neon-green); }

        .flash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 99; transition: background 0.1s; }
        
        .strike-bg { background-color: #300 !important; animation: shake 0.4s ease-in-out; }
        .safe-bg { background-color: var(--neon-green) !important; color: black; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        .target-badge { 
            background: var(--neon-red); color: white; font-weight: 900; 
            padding: 6px 16px; border-radius: 8px; font-size: 0.85rem; 
            letter-spacing: 2px; margin-bottom: 12px; display: none; 
            animation: pulse 1s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }

        #target-player-display { color: var(--neon-yellow); font-weight: 700; margin-bottom: 15px; }
        .streak-info { font-size: 0.8rem; color: var(--neon-yellow); font-family: var(--font-data); margin-bottom: 10px; display: none; }
        
        .punishment-box { 
            background: rgba(0,0,0,0.6); border: 2px dashed rgba(255,255,255,0.4); 
            padding: 25px; border-radius: 20px; margin-top: 25px; 
        }
    </style>
</head>
<body>

<div class="noise"></div>
<div id="flash-layer" class="flash-overlay"></div>

<audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="snd-strike" src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3"></audio>
<audio id="snd-safe" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
<audio id="snd-roulette" src="https://assets.mixkit.co/active_storage/sfx/123/123-preview.mp3" loop></audio>

<div id="screen-lobby" class="screen active">
    <div style="margin-bottom: 20px; opacity: 0.5; letter-spacing: 5px;">SISTEMA</div>
    <h1>NO MERCY</h1>
    <p id="lobby-text">Sincronizando banco de dados...</p>
    <div id="loading"><i class="fa-solid fa-spinner fa-spin" style="font-size: 2.5rem; color: var(--neon-red);"></i></div>
</div>

<div id="screen-game" class="screen">
    <div id="target-badge" class="target-badge">⚠️ ALVO MARCADO ⚠️</div>
    <div id="streak-info" class="streak-info">SOBREVIVEU 1/2 RODADAS</div>
    
    <div style="opacity: 0.5; font-family: var(--font-data); letter-spacing: 3px; font-size: 0.7rem; margin-bottom: 5px;">EXECUTOR ATUAL</div>
    <div id="current-player-name" style="font-size: 2.8rem; font-weight: 900; margin-bottom: 5px; color: white;">...</div>
    <div id="target-player-display"></div>
    
    <div class="strikes-container" id="game-strikes-display">
        <i class="fa-solid fa-skull strike-skull" id="s1"></i>
        <i class="fa-solid fa-skull strike-skull" id="s2"></i>
        <i class="fa-solid fa-skull strike-skull" id="s3"></i>
    </div>
    
    <div class="card">
        <h3 style="opacity: 0.5; font-size: 0.8rem; margin-bottom: 20px; color: var(--neon-red); letter-spacing: 2px; text-transform: uppercase;">Protocolo de Desafio</h3>
        <div id="challenge-text" style="font-size: 1.6rem; font-weight: 700; line-height: 1.3;">...</div>
    </div>

    <div id="controls-area" style="width: 100%; max-width: 400px; margin-top: 10px;"></div>
    <p id="wait-msg" class="pulse-text" style="margin-top:20px; display:none; font-family: var(--font-data); font-size: 0.8rem; opacity: 0.6;"></p>
</div>

<div id="screen-roulette" class="screen" style="background: black;">
    <i class="fa-solid fa-skull-crossbones" style="font-size: 7rem; color: var(--neon-red); margin-bottom: 30px; filter: drop-shadow(0 0 20px var(--neon-red));"></i>
    <h2 style="color: white; letter-spacing: 3px;">SORTEANDO<br>PUNIÇÃO</h2>
</div>

<div id="screen-result" class="screen">
    <div id="result-content" style="width: 100%; max-width: 450px;"></div>
</div>

<div id="screen-winner" class="screen" style="background: var(--neon-green); color: black;">
    <i class="fa-solid fa-trophy" style="font-size: 6rem; margin-bottom: 25px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));"></i>
    <h1 style="color: black;">SOBREVIVENTE</h1>
    <h2 id="winner-name" style="font-size: 3.5rem; font-weight: 900; text-transform: uppercase;">NOME</h2>
    <button class="btn" style="background: black; color: white; margin-top: 40px; width: 80%;" onclick="window.location.href='index.html'">FINALIZAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB1buacNarLY8ELWla6yeqTi4L0vTdloSc",
        authDomain: "wrapped-fad94.firebaseapp.com",
        databaseURL: "https://wrapped-fad94-default-rtdb.firebaseio.com",
        projectId: "wrapped-fad94",
        storageBucket: "wrapped-fad94.firebasestorage.app",
        messagingSenderId: "360236097664",
        appId: "1:360236097664:web:76777f529c18623bf1c665"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Sound Controller
    const playSound = (id) => {
        const audio = document.getElementById(id);
        if(audio) {
            audio.currentTime = 0;
            audio.play().catch(e => console.log("Som bloqueado pelo navegador"));
        }
    }

    const stopSound = (id) => {
        const audio = document.getElementById(id);
        if(audio) { audio.pause(); audio.currentTime = 0; }
    }

    const database = {
        "punishments": ["VIRE 1 DOSE DE TEQUILA/CACHAÇA", "BEBA 2 DOSES DE ALGO FORTE", "ESCOLHA ALGUÉM PARA BEBER COM VOCÊ", "TOME UM COPO DE ÁGUA COM SAL", "FALE O RESTO DA RODADA COM SOTAQUE ESTRANGEIRO", "DÊ 5 VOLTAS EM TORNO DE SI MESMO E TENTE ANDAR EM LINHA RETA", "DEIXE ALGUÉM POSTAR UM STATUS NO SEU WHATSAPP", "MOSTRE A ÚLTIMA FOTO DA SUA GALERIA", "BEBA SEM USAR AS MÃOS", "PAGUE 10 FLEXÕES"],
        "challenges": ["Dê um beijo no pescoço de {target} e dê uma leve mordida.", "Sente no colo de {target} por uma rodada inteira.", "Faça uma massagem sensual nos ombros de {target}.", "Sussurre algo picante no ouvido de {target}.", "Dê um selinho em {target}.", "Deixe {target} dar um tapa na sua bunda.", "Tire uma peça de roupa (exceto íntima).", "Fique encarando {target} nos olhos por 30 segundos sem rir.", "Tente adivinhar a cor da peça íntima de {target}.", "Mande um emoji de 'foguinho' para a terceira pessoa do seu direct.", "Deixe que {target} escolha uma música para você dançar sensualmente.", "Fique de mãos dadas com {target} até a sua próxima vez.", "Tire uma selfie abraçado com {target} e guarde na galeria.", "Faça um elogio genuíno e 'quente' para {target}.", "Descreva o que mais te atrai fisicamente em {target}.", "Beba um gole de uma bebida diretamente do copo de {target}.", "Deixe {target} desenhar algo no seu braço com uma caneta.", "Conte qual foi o seu sonho mais estranho ou ousado recentemente.", "Faça um 'carinho' na perna de {target} por 20 segundos.", "Deixe {target} ver as suas notificações recentes."],
        "extremeChallenges": ["ALVO MARCADO: Deixe {target} tirar sua calça/saia e fique apenas de roupa íntima.", "ALVO MARCADO: Dê um beijo de língua em {target} por 15 segundos.", "ALVO MARCADO: Tire a sua camisa/blusa e jogue o resto da partida assim.", "ALVO MARCADO: Deixe {target} tirar uma peça de roupa sua usando apenas os dentes.", "ALVO MARCADO: Faça um body shot no corpo de {target}.", "ALVO MARCADO: Fique apenas de roupa íntima até o final da próxima rodada.", "ALVO MARCADO: Deixe o grupo escolher uma foto sua para postar nos Stories agora.", "ALVO MARCADO: Simule uma posição de RPG (quente) com {target} por 10 segundos.", "ALVO MARCADO: Receba 3 palmadas fortes de cada jogador do sexo oposto.", "ALVO MARCADO: Deixe {target} lamber uma parte do seu pescoço ou orelha."]
    };

    const urlParams = new URLSearchParams(window.location.search);
    const roomCode = urlParams.get('room');
    const myId = localStorage.getItem('wrapped_uid');
    
    let amIHost = false;
    let rouletteInterval = null;
    let isUpdating = false;

    if(!roomCode || !myId) {
        alert("Erro: Entre pelo Wrapped.");
        window.location.href = 'index.html';
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => {
            s.classList.remove('active');
            s.style.display = 'none';
        });
        const target = document.getElementById(id);
        if(target) {
            target.style.display = 'flex';
            setTimeout(() => target.classList.add('active'), 10);
        }
        document.body.className = '';
        document.getElementById('flash-layer').style.background = 'transparent';
        if(rouletteInterval) { clearInterval(rouletteInterval); rouletteInterval = null; stopSound('snd-roulette'); }
    }

    function initGameLoop() {
        const roomRef = ref(db, `rooms/${roomCode}`);
        onValue(roomRef, (snap) => {
            const data = snap.val();
            if(!data) return; 

            document.getElementById('loading').style.display = 'none';
            if(data.host === myId) amIHost = true;
            
            if(data.nomercy_status === 'game_over') {
                showScreen('screen-winner');
                document.getElementById('winner-name').innerText = data.winnerName;
            }
            else if(data.nomercy_status === 'round') {
                showScreen('screen-game');
                renderGameRound(data);
                if(amIHost) checkVotes(data);
            }
            else if(data.nomercy_status === 'roulette_spin') {
                showScreen('screen-roulette');
                playSound('snd-roulette');
                if(!rouletteInterval) {
                    rouletteInterval = setInterval(() => {
                        const flash = document.getElementById('flash-layer');
                        flash.style.background = Math.random() > 0.7 ? 'rgba(255, 0, 0, 0.5)' : 'transparent';
                    }, 100);
                }
            }
            else if(data.nomercy_status === 'round_result_fail') {
                showScreen('screen-result');
                playSound('snd-strike');
                document.body.classList.add('strike-bg');
                const pid = data.roundPlayer;
                const strikes = data.players[pid]?.strikes || 0;
                document.getElementById('result-content').innerHTML = `
                    <i class="fa-solid fa-skull-crossbones" style="font-size:5rem; color:var(--neon-red); margin-bottom:20px;"></i>
                    <h1 style="font-size:3.5rem;">CRITICAL!</h1>
                    <p style="font-size:1.5rem; font-weight:bold;">${pid === myId ? "VOCÊ FALHOU" : data.roundPlayerName + " FALHOU"}</p>
                    <div style="background:white; color:black; padding:8px 25px; font-weight:900; border-radius:10px; margin-top:15px; display:inline-block;">${strikes} STRIKES</div>
                    <div class="punishment-box">
                        <h3 style="color:var(--neon-red); margin-bottom:10px; font-size: 0.9rem; letter-spacing: 2px;">CONSEQUÊNCIA</h3>
                        <p style="font-size:1.4rem; font-weight:bold; color:white;">${data.currentPunishment || "BEBA!"}</p>
                    </div>
                `;
            }
            else if(data.nomercy_status === 'round_result_safe') {
                showScreen('screen-result');
                playSound('snd-safe');
                document.body.classList.add('safe-bg');
                document.getElementById('result-content').innerHTML = `
                    <i class="fa-solid fa-check-circle" style="font-size:6rem; color:black; margin-bottom:20px;"></i>
                    <h1 style="font-size:4.5rem; color:black;">SAFE</h1>
                    <p style="color:black; font-weight:900; letter-spacing: 1px;">MISSÃO CONCLUÍDA</p>
                `;
            }
            else {
                if(amIHost && !isUpdating) startNewRound(data);
            }
        });
    }

    function renderGameRound(data) {
        const pid = data.roundPlayer;
        const strikes = data.players[pid]?.strikes || 0;
        const streak = data.players[pid]?.safeStreak || 0;

        document.getElementById('current-player-name').innerText = data.roundPlayerName;
        document.getElementById('challenge-text').innerText = data.roundChallenge.replace(/{target}/g, data.roundTarget || "ALGUÉM");
        
        // Updated logic for Skull visual
        document.getElementById('s1').className = strikes >= 1 ? 'fa-solid fa-skull strike-skull active' : 'fa-solid fa-skull strike-skull';
        document.getElementById('s2').className = strikes >= 2 ? 'fa-solid fa-skull strike-skull active' : 'fa-solid fa-skull strike-skull';
        document.getElementById('s3').className = strikes >= 3 ? 'fa-solid fa-skull strike-skull active' : 'fa-solid fa-skull strike-skull';

        if(strikes >= 3) {
            document.getElementById('target-badge').style.display = 'inline-block';
            document.getElementById('streak-info').style.display = 'block';
            document.getElementById('streak-info').innerText = `SOBREVIVÊNCIA: ${streak}/2 RODADAS`;
        } else {
            document.getElementById('target-badge').style.display = 'none';
            document.getElementById('streak-info').style.display = 'none';
        }

        const controls = document.getElementById('controls-area');
        if(pid === myId) {
            controls.innerHTML = `<p class="pulse-text" style="color: var(--neon-green); font-weight: 800; font-size: 1.1rem; border: 1px solid rgba(30,215,96,0.3); padding: 15px; border-radius: 15px; background: rgba(30,215,96,0.05);">VOCÊ ESTÁ SOB O OLHAR DO GRUPO</p>`;
        } else {
            const myVote = data.roundVotes?.[myId];
            if(myVote) {
                controls.innerHTML = `<div style="background: var(--glass-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--glass-border); opacity:0.8;">Veredito: ${myVote === 'pass' ? '<b style="color:var(--neon-green)">CUMPRIU</b>' : '<b style="color:var(--neon-red)">NEGADO</b>'}</div>`;
            } else {
                controls.innerHTML = `<div class="vote-row"><button class="btn btn-fail" onclick="castVote('fail')">NÃO FEZ</button><button class="btn btn-pass" onclick="castVote('pass')">FEZ</button></div>`;
            }
        }
    }

    window.castVote = (vote) => {
        playSound('snd-click');
        set(ref(db, `rooms/${roomCode}/roundVotes/${myId}`), vote);
    }

    async function startNewRound(roomData) {
        if (isUpdating) return;
        isUpdating = true;
        const players = roomData.players;
        const activeIds = Object.keys(players).sort();
        let nextIndex = (activeIds.indexOf(roomData.roundPlayer) + 1) % activeIds.length;
        const nextId = activeIds[nextIndex];
        
        const otherPlayers = activeIds.filter(id => id !== nextId);
        const randomTarget = otherPlayers.length > 0 ? players[otherPlayers[Math.floor(Math.random() * otherPlayers.length)]].name : "ALGUÉM";

        const isExtreme = (players[nextId].strikes || 0) >= 3;
        const pool = isExtreme ? database.extremeChallenges : database.challenges;
        const rndChall = pool[Math.floor(Math.random() * pool.length)];

        await update(ref(db, `rooms/${roomCode}`), {
            nomercy_status: 'round',
            roundPlayer: nextId,
            roundPlayerName: players[nextId].name,
            roundTarget: randomTarget,
            roundChallenge: rndChall,
            roundVotes: null,
            votesProcessed: null
        });
        isUpdating = false;
    }

    async function checkVotes(data) {
        if(data.votesProcessed || isUpdating) return;
        const votes = data.roundVotes || {};
        const required = Object.keys(data.players).length - 1;
        if(Object.keys(votes).length >= required && required > 0) {
            isUpdating = true;
            await update(ref(db, `rooms/${roomCode}`), { votesProcessed: true });
            let fails = Object.values(votes).filter(v => v === 'fail').length;
            const pid = data.roundPlayer;
            const pData = data.players[pid];

            if(fails > (Object.keys(votes).length / 2)) {
                const rndPunish = database.punishments[Math.floor(Math.random() * database.punishments.length)];
                await update(ref(db, `rooms/${roomCode}`), { nomercy_status: 'roulette_spin', currentPunishment: rndPunish });
                setTimeout(async () => {
                    await update(ref(db, `rooms/${roomCode}/players/${pid}`), { strikes: (pData.strikes || 0) + 1, safeStreak: 0 });
                    await update(ref(db, `rooms/${roomCode}`), { nomercy_status: 'round_result_fail' });
                    setTimeout(() => { isUpdating = false; startNewRound(data); }, 5000);
                }, 3000);
            } else {
                let newStreak = (pData.safeStreak || 0) + 1;
                let newStrikes = pData.strikes || 0;
                if(newStrikes >= 3 && newStreak >= 2) { newStrikes = 0; newStreak = 0; }
                await update(ref(db, `rooms/${roomCode}/players/${pid}`), { strikes: newStrikes, safeStreak: newStreak });
                await update(ref(db, `rooms/${roomCode}`), { nomercy_status: 'round_result_safe' });
                setTimeout(() => { isUpdating = false; startNewRound(data); }, 3000);
            }
        }
    }

    initGameLoop();
</script>
</body>
</html>
