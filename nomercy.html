<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NO MERCY - Alvo Marcado</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --neon-green: #1ed760;
            --neon-red: #ff3333;
            --neon-yellow: #f2e205;
            --bg-dark: #050505;
            --font-display: 'Space Grotesk', sans-serif;
            --font-data: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: white;
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: var(--font-display);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: background 0.3s;
        }

        .noise { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.06; pointer-events: none; z-index: 0; }
        
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; padding: 30px;
            align-items: center; justify-content: center; text-align: center;
            z-index: 10;
        }
        .screen.active { display: flex; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        h1 { font-size: 3.5rem; font-weight: 900; line-height: 0.9; text-transform: uppercase; margin-bottom: 20px; color: var(--neon-red); }
        h2 { text-transform: uppercase; letter-spacing: 2px; }
        p { font-family: var(--font-data); opacity: 0.7; margin-bottom: 20px; line-height: 1.5;}

        .btn { 
            background: white; color: black; border: none; padding: 20px; 
            border-radius: 50px; font-family: var(--font-display); font-weight: 800; 
            font-size: 1.1rem; width: 100%; cursor: pointer; text-transform: uppercase; 
            margin-bottom: 15px; box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        .btn:active { transform: scale(0.96); }

        .card {
            background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 30px;
            width: 100%; margin-bottom: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: relative; z-index: 2;
        }

        .strikes-container { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; }
        .strike-dot { width: 25px; height: 25px; border-radius: 50%; background: #222; border: 2px solid #444; transition: 0.3s; }
        .strike-dot.active { background: var(--neon-red); box-shadow: 0 0 20px var(--neon-red); border-color: white; transform: scale(1.2); }

        .vote-row { display: flex; gap: 15px; width: 100%; margin-top: 20px; }
        .btn-fail { background: rgba(255, 50, 50, 0.15); border: 2px solid var(--neon-red); color: var(--neon-red); transition: 0.2s; }
        .btn-pass { background: rgba(30, 215, 96, 0.15); border: 2px solid var(--neon-green); color: var(--neon-green); transition: 0.2s; }
        .btn-fail:active, .btn-pass:active { transform: scale(0.95); opacity: 0.8; }

        .pulse-text { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .roulette-mode { background-color: black !important; }
        .flash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 99; transition: background 0.1s; }
        
        .strike-bg { background-color: var(--neon-red) !important; animation: shake 0.5s; }
        .safe-bg { background-color: var(--neon-green) !important; color: black; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 40% { transform: translate(1px, -1px) rotate(1deg); } 60% { transform: translate(-3px, 1px) rotate(0deg); } 80% { transform: translate(-1px, -1px) rotate(1deg); } 100% { transform: translate(0, 0) rotate(0); } }

        .punishment-box { background: rgba(0,0,0,0.4); border: 2px dashed white; padding: 20px; border-radius: 15px; margin-top: 30px; width: 100%; }

        .target-badge { background: var(--neon-red); color: white; font-family: var(--font-display); font-weight: 900; padding: 5px 15px; border-radius: 4px; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 2px; margin-bottom: 10px; display: none; animation: pulse 0.8s infinite; box-shadow: 0 0 15px var(--neon-red); }

        #target-player-display { font-family: var(--font-display); font-weight: 800; font-size: 1.2rem; color: var(--neon-yellow); text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        
        .streak-info { font-size: 0.8rem; color: var(--neon-yellow); font-family: var(--font-data); margin-bottom: 5px; display: none; }

        .target-pulse { animation: targetBg 2s infinite !important; }
        @keyframes targetBg { 0% { box-shadow: inset 0 0 0 black; } 50% { box-shadow: inset 0 0 100px rgba(255, 50, 50, 0.4); border: 2px solid var(--neon-red); } 100% { box-shadow: inset 0 0 0 black; } }

    </style>
</head>
<body>

<div class="noise"></div>
<div id="flash-layer" class="flash-overlay"></div>

<div id="screen-lobby" class="screen active">
    <h1>NO MERCY</h1>
    <p id="lobby-text">Carregando desafios...</p>
    <div id="loading" style="font-size: 2rem;"><i class="fa-solid fa-spinner fa-spin"></i></div>
</div>

<div id="screen-game" class="screen">
    <div id="target-badge" class="target-badge">⚠️ ALVO MARCADO ⚠️</div>
    <div id="streak-info" class="streak-info">SOBREVIVEU 1/2 RODADAS</div>
    
    <div style="opacity: 0.6; font-family: var(--font-data); letter-spacing: 2px;">VEZ DE</div>
    <div id="current-player-name" style="font-size: 2.5rem; font-weight: 900; margin-bottom: 5px; color: white;">...</div>
    <div id="target-player-display"></div>
    
    <div class="strikes-container" id="game-strikes-display">
        <div class="strike-dot" id="s1"></div>
        <div class="strike-dot" id="s2"></div>
        <div class="strike-dot" id="s3"></div>
    </div>
    
    <div class="card">
        <h3 style="opacity: 0.5; font-size: 0.9rem; margin-bottom: 15px; color: var(--neon-red);">O DESAFIO</h3>
        <div id="challenge-text" style="font-size: 1.6rem; font-weight: 700; line-height: 1.2;">...</div>
    </div>

    <div id="controls-area" style="width: 100%; margin-top: 20px;"></div>
    <p id="wait-msg" class="pulse-text" style="margin-top:20px; display:none; font-family: var(--font-data); font-size: 0.8rem;"></p>
</div>

<div id="screen-roulette" class="screen" style="background: black;">
    <i class="fa-solid fa-skull-crossbones" style="font-size: 6rem; color: #333; margin-bottom: 20px;"></i>
    <h2 style="color: #333;">SORTEANDO<br>PUNIÇÃO</h2>
</div>

<div id="screen-result" class="screen">
    <div id="result-content" style="width: 100%;"></div>
</div>

<div id="screen-winner" class="screen" style="background: var(--neon-green); color: black;">
    <i class="fa-solid fa-trophy" style="font-size: 5rem; margin-bottom: 20px;"></i>
    <h1>SOBREVIVENTE</h1>
    <h2 id="winner-name" style="font-size: 3rem;">NOME</h2>
    <button class="btn" style="background: black; color: white; margin-top: 30px;" onclick="window.location.href='index.html'">VOLTAR AO INÍCIO</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB1buacNarLY8ELWla6yeqTi4L0vTdloSc",
        authDomain: "wrapped-fad94.firebaseapp.com",
        databaseURL: "https://wrapped-fad94-default-rtdb.firebaseio.com",
        projectId: "wrapped-fad94",
        storageBucket: "wrapped-fad94.firebasestorage.app",
        messagingSenderId: "360236097664",
        appId: "1:360236097664:web:76777f529c18623bf1c665"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Variáveis para armazenar os dados do JSON
    let punishments = [];
    let challenges = [];
    let extremeChallenges = [];

    const urlParams = new URLSearchParams(window.location.search);
    const roomCode = urlParams.get('room');
    const myId = localStorage.getItem('wrapped_uid');
    
    let myName = "Player";
    let amIHost = false;
    let rouletteInterval = null;
    let isUpdating = false;

    if(!roomCode || !myId) {
        alert("Erro: Entre pelo Wrapped.");
        window.location.href = 'index.html';
    }

    // FUNÇÃO PARA CARREGAR DESAFIOS DO GITHUB
    async function loadData() {
        try {
            // SUBSTITUA PELA SUA URL RAW DO GITHUB
            const response = await fetch('desafios.json'); 
            const data = await response.json();
            punishments = data.punishments;
            challenges = data.challenges;
            extremeChallenges = data.extremeChallenges;
            
            document.getElementById('lobby-text').innerText = "Conectando à sala...";
            initGameLoop();
        } catch (error) {
            console.error("Erro ao carregar desafios:", error);
            document.getElementById('lobby-text').innerText = "Erro ao carregar base de dados.";
        }
    }

    // Inicializa o carregamento
    loadData();

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => {
            s.classList.remove('active');
            s.style.display = 'none';
        });
        const target = document.getElementById(id);
        if(target) {
            target.style.display = 'flex';
            setTimeout(() => target.classList.add('active'), 10);
        }
        document.body.className = '';
        document.body.classList.remove('target-pulse');
        document.getElementById('flash-layer').style.background = 'transparent';
        if(rouletteInterval) {
            clearInterval(rouletteInterval);
            rouletteInterval = null;
        }
    }

    function initGameLoop() {
        const roomRef = ref(db, `rooms/${roomCode}`);
        
        get(ref(db, `rooms/${roomCode}/players/${myId}`)).then(snap => {
            if(snap.exists()) {
                myName = snap.val().name;
                update(ref(db, `rooms/${roomCode}/players/${myId}`), { 
                    strikes: snap.val().strikes || 0 
                });
            }
        });

        onValue(roomRef, (snap) => {
            const data = snap.val();
            if(!data) return; 

            document.getElementById('loading').style.display = 'none';
            if(data.host === myId) amIHost = true;
            
            if(data.nomercy_status === 'game_over') {
                showScreen('screen-winner');
                document.getElementById('winner-name').innerText = data.winnerName;
            }
            else if(data.nomercy_status === 'round') {
                showScreen('screen-game');
                renderGameRound(data);
                if(amIHost) checkVotes(data);
            }
            else if(data.nomercy_status === 'roulette_spin') {
                showScreen('screen-roulette');
                document.body.classList.add('roulette-mode');
                
                if(!rouletteInterval) {
                    rouletteInterval = setInterval(() => {
                        const flash = document.getElementById('flash-layer');
                        if(Math.random() > 0.7) flash.style.background = 'rgba(255, 0, 0, 0.4)';
                        else flash.style.background = 'transparent';
                    }, 100);
                }
            }
            else if(data.nomercy_status === 'round_result_fail') {
                showScreen('screen-result');
                document.body.classList.add('strike-bg');
                
                const pid = data.roundPlayer;
                const pData = data.players ? data.players[pid] : null;
                const isVictim = (pid === myId);
                const strikes = pData ? pData.strikes : 0;
                const extraPunishment = data.currentPunishment || "SORTE";

                let titleText = "STRIKE!";
                if(strikes >= 3) titleText = "ALVO MARCADO!";

                document.getElementById('result-content').innerHTML = `
                    <i class="fa-solid fa-triangle-exclamation" style="font-size:5rem; margin-bottom:20px;"></i>
                    <h1 style="font-size:3.5rem;">${titleText}</h1>
                    <p style="font-size:1.5rem; font-weight:bold;">${isVictim ? "VOCÊ FALHOU" : data.roundPlayerName + " FALHOU"}</p>
                    <div style="background:black; padding:10px 20px; border-radius:20px; margin-top:10px; display:inline-block;">
                        ${strikes} STRIKES
                    </div>
                    
                    <div class="punishment-box">
                        <h3 style="color:white; margin-bottom:10px;">PUNIÇÃO EXTRA</h3>
                        <p style="font-size:1.2rem; font-weight:bold; color:var(--neon-yellow); text-transform:uppercase;">${extraPunishment}</p>
                    </div>
                `;
            }
            else if(data.nomercy_status === 'round_result_safe') {
                showScreen('screen-result');
                document.body.classList.add('safe-bg');
                
                const pid = data.roundPlayer;
                const pData = data.players ? data.players[pid] : null;
                const streak = pData ? (pData.safeStreak || 0) : 0;
                let subtext = "O DESAFIO FOI CUMPRIDO";
                
                if (pData && (pData.strikes || 0) >= 3 && streak > 0) {
                    subtext = `SOBREVIVEU ${streak}/2 RODADAS NA ZONA DE PERIGO`;
                }

                document.getElementById('result-content').innerHTML = `
                    <i class="fa-solid fa-check-circle" style="font-size:5rem; margin-bottom:20px;"></i>
                    <h1 style="font-size:4rem; color:black;">SAFE</h1>
                    <p style="color:black; font-weight:bold;">${subtext}</p>
                `;
            }
            else {
                if(amIHost && !isUpdating) {
                    if(data.players && Object.keys(data.players).length > 0) {
                        startNewRound(data); 
                    }
                } 
                else if (!amIHost) document.getElementById('screen-lobby').innerHTML = "<h1>AGUARDE...</h1>";
            }
        });
    }

    function renderGameRound(data) {
        const currentPlayerId = data.roundPlayer;
        const isMyTurn = (currentPlayerId === myId);
        const pData = data.players ? data.players[currentPlayerId] : null;
        const playerStrikes = pData ? (pData.strikes || 0) : 0;
        const playerStreak = pData ? (pData.safeStreak || 0) : 0;

        document.getElementById('current-player-name').innerText = data.roundPlayerName;
        
        const targetDisplay = document.getElementById('target-player-display');
        if(data.roundTarget) {
            targetDisplay.innerText = `PARA: ${data.roundTarget}`;
            targetDisplay.style.display = "block";
        } else {
            targetDisplay.style.display = "none";
        }

        document.getElementById('challenge-text').innerText = data.roundChallenge.replace(/{target}/g, "");
        
        document.getElementById('s1').className = playerStrikes >= 1 ? 'strike-dot active' : 'strike-dot';
        document.getElementById('s2').className = playerStrikes >= 2 ? 'strike-dot active' : 'strike-dot';
        document.getElementById('s3').className = playerStrikes >= 3 ? 'strike-dot active' : 'strike-dot';

        const targetBadge = document.getElementById('target-badge');
        const streakInfo = document.getElementById('streak-info');
        
        if (playerStrikes >= 3) {
            targetBadge.style.display = 'inline-block';
            document.body.classList.add('target-pulse');
            if (playerStreak > 0) {
                streakInfo.innerText = `SOBREVIVEU ${playerStreak}/2 RODADAS`;
                streakInfo.style.display = 'block';
            } else {
                streakInfo.style.display = 'none';
            }
        } else {
            targetBadge.style.display = 'none';
            streakInfo.style.display = 'none';
            document.body.classList.remove('target-pulse');
        }

        const controls = document.getElementById('controls-area');
        const waitMsg = document.getElementById('wait-msg');
        waitMsg.style.display = 'none';

        if(isMyTurn) {
            controls.innerHTML = `<div style="width:100%;"><p class="pulse-text" style="color: var(--neon-green);">Cumpra o desafio!</p><p style="font-size: 0.8rem; opacity: 0.6; margin-top: 10px;">O grupo está votando...</p></div>`;
        } else {
            const myVote = data.roundVotes ? data.roundVotes[myId] : null;
            if(myVote) {
                controls.innerHTML = "";
                waitMsg.innerText = `Voto registrado: ${myVote === 'pass' ? 'FEZ 👍' : 'NÃO FEZ 👎'}`;
                waitMsg.style.display = 'block';
            } else {
                controls.innerHTML = `<div style="width:100%;"><p>O desafio foi cumprido?</p><div class="vote-row"><button class="btn btn-fail" onclick="castVote('fail')">NÃO FEZ 👎</button><button class="btn btn-pass" onclick="castVote('pass')">FEZ 👍</button></div></div>`;
            }
        }
    }

    window.castVote = function(vote) {
        set(ref(db, `rooms/${roomCode}/roundVotes/${myId}`), vote);
    }

    async function startNewRound(roomData) {
        if (isUpdating) return;
        isUpdating = true;

        const players = roomData.players;
        const lastPlayerId = roomData.roundPlayer;
        const activeIds = Object.keys(players);

        if(activeIds.length === 0) {
            isUpdating = false;
            return;
        }
        
        activeIds.sort();
        let nextIndex = 0;
        if(lastPlayerId) {
            const currIdx = activeIds.indexOf(lastPlayerId);
            if(currIdx !== -1) nextIndex = (currIdx + 1) % activeIds.length;
        }
        
        const nextId = activeIds[nextIndex];
        const pData = players[nextId];
        const nextName = pData.name;

        const otherPlayerIds = activeIds.filter(id => id !== nextId);
        let randomTargetName = "";
        if(otherPlayerIds.length > 0) {
            const randomId = otherPlayerIds[Math.floor(Math.random() * otherPlayerIds.length)];
            randomTargetName = players[randomId].name.toUpperCase();
        }

        let rndChall = "";
        if ((pData.strikes || 0) >= 3) {
            rndChall = extremeChallenges[Math.floor(Math.random() * extremeChallenges.length)];
        } else {
            let usedIndices = roomData.usedChallenges || []; 
            let availableIndices = challenges.map((_, i) => i).filter(i => !usedIndices.includes(i));

            if(availableIndices.length === 0) {
                availableIndices = challenges.map((_, i) => i);
                usedIndices = [];
            }

            const selectedIndex = availableIndices[Math.floor(Math.random() * availableIndices.length)];
            rndChall = challenges[selectedIndex];
            usedIndices.push(selectedIndex);
            await update(ref(db, `rooms/${roomCode}`), { usedChallenges: usedIndices });
        }

        const targetToSave = rndChall.includes("{target}") ? randomTargetName : null;

        await update(ref(db, `rooms/${roomCode}`), {
            nomercy_status: 'round',
            roundPlayer: nextId,
            roundPlayerName: nextName,
            roundTarget: targetToSave,
            roundChallenge: rndChall,
            roundVotes: null,
            votesProcessed: null
        });

        isUpdating = false;
    }

    async function checkVotes(data) {
        if(data.votesProcessed || isUpdating) return;
        const votes = data.roundVotes || {};
        const voters = Object.keys(data.players).length - 1;
        if(Object.keys(votes).length >= voters && voters > 0) {
            isUpdating = true;
            await update(ref(db, `rooms/${roomCode}`), { votesProcessed: true });

            let fails = 0;
            Object.values(votes).forEach(v => { if(v==='fail') fails++; });

            const pid = data.roundPlayer;
            const pData = data.players[pid];
            
            if(fails > (Object.keys(votes).length - fails)) {
                const rndPunish = punishments[Math.floor(Math.random() * punishments.length)];
                await update(ref(db, `rooms/${roomCode}`), { nomercy_status: 'roulette_spin', currentPunishment: rndPunish });
                setTimeout(async () => {
                    const currentStrikes = (pData.strikes || 0) + 1;
                    await update(ref(db, `rooms/${roomCode}/players/${pid}`), { strikes: currentStrikes, safeStreak: 0 });
                    await update(ref(db, `rooms/${roomCode}`), { nomercy_status: 'round_result_fail' });
                    setTimeout(() => { isUpdating = false; startNewRound(data); }, 6000);
                }, 4000);
            } else {
                if (pData.strikes >= 3) {
                    const streak = (pData.safeStreak || 0) + 1;
                    if (streak >= 2) await update(ref(db, `rooms/${roomCode}/players/${pid}`), { strikes: 0, safeStreak: 0 });
                    else await update(ref(db, `rooms/${roomCode}/players/${pid}`), { safeStreak: streak });
                }
                await update(ref(db, `rooms/${roomCode}`), { nomercy_status: 'round_result_safe' });
                setTimeout(() => { isUpdating = false; startNewRound(data); }, 2000);
            }
        }
    }
    
    window.castVote = castVote;
</script>
</body>
</html>
