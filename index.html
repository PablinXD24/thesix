<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THE SIX - Game Hub</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --neon-green: #1ed760;
            --neon-purple: #a33df2;
            --neon-blue: #3d5af2;
            --neon-pink: #f573a0;
            --neon-yellow: #f2e205;
            --neon-red: #ff3e3e;
            --bg-dark: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-display: 'Space Grotesk', sans-serif;
            --font-data: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: white;
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: var(--font-display);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        /* Camadas de Fundo */
        .noise { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.04; pointer-events: none; z-index: 999; }
        .ambilight-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.4; filter: blur(120px); background: radial-gradient(circle at 50% 50%, #1ed76022, #000); transition: all 1s ease; }
        
        .app-container { 
            position: relative; width: 100%; height: 100%; max-width: 450px; z-index: 10; 
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; padding: 40px 25px;
            overflow-y: auto; justify-content: center;
        }
        .screen.active { display: flex; animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px) scale(0.95); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        /* Tipografia */
        h1 { font-size: clamp(3rem, 10vw, 4rem); font-weight: 900; line-height: 0.85; letter-spacing: -3px; margin-bottom: 15px; text-transform: uppercase; }
        p { font-size: 0.9rem; opacity: 0.6; margin-bottom: 30px; font-family: var(--font-data); letter-spacing: 1px; }

        /* Inputs e Botões Premium */
        input { 
            width: 100%; background: var(--glass-bg); 
            border: 1px solid var(--glass-border); 
            color: white; padding: 22px; border-radius: 18px; 
            font-family: var(--font-data); font-size: 1.1rem; outline: none; 
            margin-bottom: 15px; text-align: center; text-transform: uppercase;
            backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        input:focus { border-color: var(--neon-green); background: rgba(255,255,255,0.08); box-shadow: 0 0 20px rgba(30, 215, 96, 0.2); }

        .btn { 
            background: var(--neon-green); color: black; border: none; 
            padding: 20px; border-radius: 18px; font-family: var(--font-display); 
            font-weight: 900; font-size: 1rem; width: 100%; cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            text-transform: uppercase; margin-bottom: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .btn:active { transform: scale(0.95); }
        .btn-outline { background: transparent; border: 1px solid var(--glass-border); color: white; backdrop-filter: blur(5px); }

        /* Lobby */
        .room-code { 
            font-size: 3.5rem; font-weight: 900; letter-spacing: 6px; 
            color: var(--neon-green); background: rgba(255,255,255,0.03); 
            padding: 20px; border-radius: 24px; margin: 25px 0; 
            border: 1px solid var(--glass-border);
            text-shadow: 0 0 15px rgba(30, 215, 96, 0.4);
        }
        .chip { 
            background: var(--glass-bg); padding: 10px 18px; border-radius: 14px; 
            margin: 5px; display: inline-block; font-weight: bold; font-size: 0.85rem;
            border: 1px solid var(--glass-border); color: #ccc;
        }

        /* Nova Estética dos Cards dos Jogos - THE SIX Evolution */
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; margin-top: 20px; }

        .game-card {
            position: relative;
            background: linear-gradient(165deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        /* Brilho interno do card */
        .game-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            opacity: 0; transition: 0.5s;
        }

        .game-card:hover::before { opacity: 1; }

        .game-card i {
            font-size: 2.2rem;
            margin-bottom: 12px;
            transition: all 0.4s ease;
            filter: drop-shadow(0 0 8px currentColor);
        }

        .game-card span {
            font-size: 0.7rem;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-family: var(--font-display);
            color: rgba(255, 255, 255, 0.8);
        }

        /* Variações de Cores Evoluídas */
        .card-yellow { border-bottom: 3px solid var(--neon-yellow); }
        .card-yellow i { color: var(--neon-yellow); }
        .card-purple { border-bottom: 3px solid var(--neon-purple); }
        .card-purple i { color: var(--neon-purple); }
        .card-blue { border-bottom: 3px solid var(--neon-blue); }
        .card-blue i { color: var(--neon-blue); }
        .card-red { border-bottom: 3px solid var(--neon-red); }
        .card-red i { color: var(--neon-red); }

        .game-card:active { transform: scale(0.92); filter: brightness(1.2); }

        #msg-waiting-host { margin-top: 30px; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 20px; }

    </style>
</head>
<body>

<div class="noise"></div>
<div class="ambilight-bg" id="ambilight"></div>

<div class="app-container">
    <div id="screen-home" class="screen active">
        <div style="width: 100%; text-align: center;">
            <h1 style="color: var(--neon-green);">THE<br>SIX</h1>
            <p>ENTER THE HUB</p>
            <input type="text" id="my-name" placeholder="DIGITE SEU NOME" spellcheck="false">
            <button class="btn" onclick="goToMenu()">ACESSAR HUB</button>
        </div>
    </div>

    <div id="screen-menu" class="screen">
        <div style="width: 100%; text-align: center;">
            <p style="margin-bottom: 5px;">BEM-VINDO AO THE SIX</p>
            <h1>OLÁ, <span id="display-name" style="color: var(--neon-green);"></span></h1>
            <div style="margin-top: 40px;">
                <button class="btn" onclick="createRoomReal()">CRIAR NOVA SALA</button>
                <button class="btn btn-outline" onclick="showJoinInput()">ENTRAR EM UMA SALA</button>
                
                <div id="join-area" style="display: none; margin-top: 25px; animation: slideUp 0.4s ease;">
                    <input type="text" id="room-code-input" placeholder="CÓDIGO DE 4 DÍGITOS" maxlength="4">
                    <button class="btn" style="background: white; color: black;" onclick="joinRoomReal()">CONECTAR AGORA</button>
                </div>
            </div>
        </div>
    </div>

    <div id="screen-lobby" class="screen" style="text-align: center; justify-content: flex-start;">
        <p style="margin-bottom: 5px; opacity: 0.5;">THE SIX HUB</p>
        <div class="room-code" id="lobby-code">----</div>
        
        <div style="margin: 20px 0;">
            <p style="margin-bottom: 10px;">PLAYERS READY</p>
            <div id="lobby-list" style="min-height: 60px;"></div>
        </div>
        
        <div id="host-controls" style="display: none; width: 100%; margin-top: auto; padding-bottom: 20px;">
            <p style="color: var(--neon-green); font-weight: 900; margin-bottom: 15px; font-family: var(--font-display);">ESCOLHA O MODO</p>
            <div class="mode-grid">
                <div class="game-card card-yellow" onclick="redirectAll('quiz')">
                    <i class="fa-solid fa-circle-question"></i>
                    <span>MEGA QUIZ</span>
                </div>
                <div class="game-card card-purple" onclick="redirectAll('fdp')">
                    <i class="fa-solid fa-masks-theater"></i>
                    <span>MODE FDP</span>
                </div>
                <div class="game-card card-blue" onclick="redirectAll('family')">
                    <i class="fa-solid fa-users"></i>
                    <span>FAMÍLIA</span>
                </div>
                <div class="game-card card-red" onclick="redirectAll('nomercy')">
                    <i class="fa-solid fa-skull"></i>
                    <span>NO MERCY</span>
                </div>
            </div>
        </div>

        <div id="msg-waiting-host" style="display:none; margin-top: auto; margin-bottom: 40px;">
            <i class="fa-solid fa-circle-notch fa-spin" style="color: var(--neon-green); font-size: 1.5rem; margin-bottom: 10px;"></i>
            <p style="margin-bottom: 0;">AGUARDANDO O HOST<br>INICIAR A PARTIDA...</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB1buacNarLY8ELWla6yeqTi4L0vTdloSc",
        authDomain: "wrapped-fad94.firebaseapp.com",
        databaseURL: "https://wrapped-fad94-default-rtdb.firebaseio.com",
        projectId: "wrapped-fad94",
        storageBucket: "wrapped-fad94.firebasestorage.app",
        messagingSenderId: "360236097664",
        appId: "1:360236097664:web:76777f529c18623bf1c665"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myId = localStorage.getItem('wrapped_uid') || Math.random().toString(36).substr(2, 9);
    localStorage.setItem('wrapped_uid', myId);
    
    let myName = "";
    let roomCode = "";
    let roomRef = null;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => { 
            s.classList.remove('active'); 
            s.style.display = 'none'; 
        });
        const target = document.getElementById(id);
        if(target) { 
            target.style.display = 'flex'; 
            setTimeout(() => target.classList.add('active'), 10); 
        }
    }

    window.goToMenu = function() {
        const val = document.getElementById('my-name').value.trim();
        if(!val) return;
        myName = val.toUpperCase();
        document.getElementById('display-name').innerText = myName;
        showScreen('screen-menu');
    }

    window.showJoinInput = () => {
        document.getElementById('join-area').style.display = 'block';
        document.getElementById('room-code-input').focus();
    };

    window.createRoomReal = function() {
        roomCode = Math.random().toString(36).substring(2, 6).toUpperCase();
        roomRef = ref(db, 'rooms/' + roomCode);
        set(roomRef, { 
            status: 'lobby', 
            host: myId, 
            players: { [myId]: { name: myName } } 
        });
        enterLobby();
    }

    window.joinRoomReal = function() {
        const code = document.getElementById('room-code-input').value.toUpperCase();
        if(code.length !== 4) return alert("Código inválido");
        roomRef = ref(db, 'rooms/' + code);
        get(roomRef).then(snap => {
            if(snap.exists()) {
                roomCode = code;
                update(ref(db, `rooms/${code}/players/${myId}`), { name: myName });
                enterLobby();
            } else alert("Sala não encontrada!");
        });
    }

    function enterLobby() {
        document.getElementById('lobby-code').innerText = roomCode;
        showScreen('screen-lobby');

        onValue(roomRef, (snap) => {
            const data = snap.val();
            if(!data) return;

            if(data.status.startsWith('redirecting_to_')) {
                const target = data.status.replace('redirecting_to_', '');
                window.location.href = `${target}.html?room=${roomCode}`;
                return;
            }

            const list = document.getElementById('lobby-list');
            list.innerHTML = '';
            const playerNames = [];
            if(data.players) {
                Object.values(data.players).forEach(p => {
                    playerNames.push(p.name);
                    list.innerHTML += `<div class="chip">${p.name}</div>`;
                });
            }
            
            localStorage.setItem('quiz_players', JSON.stringify(playerNames));

            const isHost = data.host === myId;
            document.getElementById('host-controls').style.display = isHost ? 'block' : 'none';
            document.getElementById('msg-waiting-host').style.display = isHost ? 'none' : 'block';
        });
    }

    window.redirectAll = function(gameFile) {
        update(roomRef, { status: `redirecting_to_${gameFile}` });
    }
</script>
</body>
</html>
