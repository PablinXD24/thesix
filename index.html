<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hub de Jogos - J&J</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --neon-green: #1ed760;
            --neon-purple: #a349f5;
            --neon-blue: #3d5af1;
            --neon-pink: #ff2e63;
            --neon-yellow: #ffee10;
            --neon-red: #ff4646;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --font-display: 'Space Grotesk', sans-serif;
            --font-data: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: white;
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: var(--font-display);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        /* Efeitos de Fundo */
        .noise { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.07; pointer-events: none; z-index: 999; }
        .ambilight-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.4; filter: blur(120px); background: radial-gradient(circle at 50% 50%, #1ed76022, #000); transition: background 0.8s ease; }
        
        .app-container { 
            position: relative; width: 100%; height: 100%; max-width: 480px; z-index: 10; 
            display: flex; justify-content: center; align-items: center; 
        }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; padding: 40px 25px;
            overflow-y: auto;
        }
        .screen.active { display: flex; animation: fadeInScreen 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes fadeInScreen { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Tipografia */
        h1 { font-size: clamp(3rem, 10vw, 4rem); font-weight: 900; line-height: 0.85; letter-spacing: -3px; margin-bottom: 20px; text-transform: uppercase; }
        p { font-size: 1rem; opacity: 0.6; margin-bottom: 30px; font-family: var(--font-data); letter-spacing: 1px; }

        /* Inputs e Botões Padrão */
        input { 
            width: 100%; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); 
            color: white; padding: 22px; border-radius: 16px; font-family: var(--font-data); 
            font-size: 1.1rem; outline: none; margin-bottom: 20px; text-align: center; 
            text-transform: uppercase; transition: 0.3s;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        input:focus { border-color: var(--neon-green); box-shadow: 0 0 20px rgba(30, 215, 96, 0.2); }

        .btn { 
            background: var(--neon-green); color: black; border: none; padding: 20px; 
            border-radius: 100px; font-family: var(--font-display); font-weight: 900; 
            font-size: 1rem; width: 100%; cursor: pointer; transition: all 0.3s ease; 
            text-transform: uppercase; margin-bottom: 12px;
            box-shadow: 0 10px 25px rgba(30, 215, 96, 0.3);
        }
        .btn:active { transform: scale(0.95); filter: brightness(1.2); }
        .btn-outline { background: transparent; border: 2px solid rgba(255,255,255,0.1); color: white; box-shadow: none; }

        /* Lobby UI */
        .room-code { 
            font-size: 3.5rem; font-weight: 900; letter-spacing: 8px; color: var(--neon-green); 
            background: rgba(255,255,255,0.02); padding: 25px; border-radius: 24px; 
            margin: 25px 0; border: 1px solid rgba(30, 215, 96, 0.3);
            text-shadow: 0 0 15px rgba(30, 215, 96, 0.5);
        }
        .chip { background: var(--glass); padding: 10px 20px; border-radius: 100px; margin: 6px; display: inline-block; font-weight: bold; border: 1px solid rgba(255,255,255,0.05); }

        /* Grid de Jogos e Liquid Glass */
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; width: 100%; margin-top: auto; }

        .liquid-btn {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.9); font-family: var(--font-display); font-weight: 800; font-size: 0.8rem;
            text-transform: uppercase; padding: 25px 15px; height: 150px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 0 15px rgba(255,255,255,0.02);
            position: relative; overflow: hidden;
        }

        .liquid-btn i { display: block; font-size: 2.8rem; margin-bottom: 12px; transition: 0.3s; }
        .liquid-btn:hover { background: rgba(255, 255, 255, 0.07); transform: translateY(-5px); }
        .liquid-btn:active { transform: scale(0.92); }

        /* Cores dos Games */
        .neon-yellow i { color: var(--neon-yellow); filter: drop-shadow(0 0 10px var(--neon-yellow)); }
        .neon-purple i { color: var(--neon-purple); filter: drop-shadow(0 0 10px var(--neon-purple)); }
        .neon-blue i { color: var(--neon-blue); filter: drop-shadow(0 0 10px var(--neon-blue)); }
        .neon-red i { color: var(--neon-red); filter: drop-shadow(0 0 10px var(--neon-red)); }

    </style>
</head>
<body>

<div class="noise"></div>
<div class="ambilight-bg" id="ambilight"></div>

<div class="app-container">
    <div id="screen-home" class="screen active">
        <div style="width: 100%; text-align: center; margin-top: auto; margin-bottom: auto;">
            <h1 style="color: var(--neon-green); text-shadow: 0 0 30px rgba(30, 215, 96, 0.4);">GAME<br>HUB</h1>
            <p>CONECTE-SE PARA JOGAR</p>
            <input type="text" id="my-name" placeholder="DIGITE SEU NOME" spellcheck="false">
            <button class="btn" onclick="goToMenu()">ENTRAR NO HUB</button>
        </div>
    </div>

    <div id="screen-menu" class="screen">
        <div style="width: 100%; text-align: center; margin-top: auto; margin-bottom: auto;">
            <h2 style="font-size: 1.2rem; opacity: 0.5; margin-bottom: 5px;">BEM-VINDO,</h2>
            <h1 id="display-name" style="color: var(--neon-pink); margin-bottom: 40px;">USER</h1>
            
            <button class="btn" onclick="createRoomReal()">CRIAR NOVA SALA</button>
            <button class="btn btn-outline" onclick="showJoinInput()">ENTRAR EM SALA</button>
            
            <div id="join-area" style="display: none; margin-top: 30px; animation: fadeInScreen 0.4s ease;">
                <input type="text" id="room-code-input" placeholder="CÓDIGO" maxlength="4">
                <button class="btn" style="background: var(--neon-blue); color: white; box-shadow: 0 10px 20px rgba(61, 90, 241, 0.3);" onclick="joinRoomReal()">CONFIRMAR ENTRADA</button>
            </div>
        </div>
    </div>

    <div id="screen-lobby" class="screen" style="text-align: center;">
        <h2 style="opacity: 0.5; font-size: 0.8rem; letter-spacing: 4px; text-transform: uppercase;">ID DA SESSÃO</h2>
        <div class="room-code" id="lobby-code">----</div>
        
        <p style="margin-bottom: 15px;"><i class="fa-solid fa-users"></i> JOGADORES CONECTADOS:</p>
        <div id="lobby-list" style="min-height: 80px; margin-bottom: 30px; display: flex; flex-wrap: wrap; justify-content: center;"></div>
        
        <div id="host-controls" style="display: none; width: 100%; margin-top: auto;">
            <p style="color: var(--neon-green); font-weight: 900; margin-bottom: 20px; font-size: 0.9rem;">SELECIONE A EXPERIÊNCIA:</p>
            <div class="mode-grid">
                <button class="liquid-btn neon-yellow" onclick="redirectAll('quiz')">
                    <i class="fa-solid fa-bolt-lightning"></i> MEGA QUIZ
                </button>
                <button class="liquid-btn neon-purple" onclick="redirectAll('fdp')">
                    <i class="fa-solid fa-masks-theater"></i> MODE FDP
                </button>
                <button class="liquid-btn neon-blue" onclick="redirectAll('family')">
                    <i class="fa-solid fa-house-chimney-user"></i> FAMÍLIA
                </button>
                <button class="liquid-btn neon-red" onclick="redirectAll('nomercy')">
                    <i class="fa-solid fa-skull-crossbones"></i> NO MERCY
                </button>
            </div>
        </div>

        <div id="msg-waiting-host" style="display:none; margin-top: auto; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 20px;">
            <i class="fa-solid fa-circle-notch fa-spin" style="color: var(--neon-green); margin-bottom: 10px; font-size: 1.5rem;"></i>
            <p style="margin-bottom: 0; font-size: 0.9rem;">AGUARDANDO O HOST INICIAR A PARTIDA...</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB1buacNarLY8ELWla6yeqTi4L0vTdloSc",
        authDomain: "wrapped-fad94.firebaseapp.com",
        databaseURL: "https://wrapped-fad94-default-rtdb.firebaseio.com",
        projectId: "wrapped-fad94",
        storageBucket: "wrapped-fad94.firebasestorage.app",
        messagingSenderId: "360236097664",
        appId: "1:360236097664:web:76777f529c18623bf1c665"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myId = localStorage.getItem('wrapped_uid') || Math.random().toString(36).substr(2, 9);
    localStorage.setItem('wrapped_uid', myId);
    
    let myName = "";
    let roomCode = "";
    let roomRef = null;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => { s.classList.remove('active'); s.style.display = 'none'; });
        const target = document.getElementById(id);
        if(target) { target.style.display = 'flex'; setTimeout(() => target.classList.add('active'), 10); }
    }

    window.goToMenu = function() {
        const val = document.getElementById('my-name').value.trim();
        if(!val) return;
        myName = val.toUpperCase();
        document.getElementById('display-name').innerText = myName;
        showScreen('screen-menu');
    }

    window.showJoinInput = () => {
        document.getElementById('join-area').style.display = 'block';
    }

    window.createRoomReal = function() {
        roomCode = Math.random().toString(36).substring(2, 6).toUpperCase();
        roomRef = ref(db, 'rooms/' + roomCode);
        set(roomRef, { 
            status: 'lobby', 
            host: myId, 
            players: { [myId]: { name: myName } } 
        });
        enterLobby();
    }

    window.joinRoomReal = function() {
        const code = document.getElementById('room-code-input').value.toUpperCase();
        if(code.length !== 4) return alert("Código inválido");
        roomRef = ref(db, 'rooms/' + code);
        get(roomRef).then(snap => {
            if(snap.exists()) {
                roomCode = code;
                update(ref(db, `rooms/${code}/players/${myId}`), { name: myName });
                enterLobby();
            } else alert("Sala não encontrada!");
        });
    }

    function enterLobby() {
        document.getElementById('lobby-code').innerText = roomCode;
        showScreen('screen-lobby');

        onValue(roomRef, (snap) => {
            const data = snap.val();
            if(!data) return;

            if(data.status.startsWith('redirecting_to_')) {
                const target = data.status.replace('redirecting_to_', '');
                window.location.href = `${target}.html?room=${roomCode}`;
                return;
            }

            const list = document.getElementById('lobby-list');
            list.innerHTML = '';
            const playerNames = [];
            if(data.players) {
                Object.values(data.players).forEach(p => {
                    playerNames.push(p.name);
                    list.innerHTML += `<div class="chip">${p.name}</div>`;
                });
            }
            
            localStorage.setItem('quiz_players', JSON.stringify(playerNames));

            const isHost = data.host === myId;
            document.getElementById('host-controls').style.display = isHost ? 'block' : 'none';
            document.getElementById('msg-waiting-host').style.display = isHost ? 'none' : 'block';
        });
    }

    window.redirectAll = function(gameFile) {
        update(roomRef, { status: `redirecting_to_${gameFile}` });
    }
</script>
</body>
</html>
