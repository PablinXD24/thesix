<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mega Quiz - Liquid Edition</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

        :root {
            --neon-green: #1ed760;
            --neon-blue: #2d46b9;
            --neon-purple: #8c42b3;
            --neon-yellow: #f2e205;
            --neon-red: #ff4646;
            --bg-dark: #080808;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --font-display: 'Space Grotesk', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: white;
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: var(--font-display);
            display: flex; align-items: center; justify-content: center;
        }

        .noise { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.05; pointer-events: none; z-index: 999; }
        
        .ambilight-bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.3; 
            filter: blur(80px); background: radial-gradient(circle at 50% 50%, #1ed760, #000); 
            transition: all 0.8s ease;
        }

        .app-container { 
            position: relative; width: 100%; height: 100%; max-width: 480px; z-index: 10; 
            display: flex; flex-direction: column; padding: 20px;
        }

        .screen { display: none; flex-direction: column; width: 100%; height: 100%; animation: fadeIn 0.4s ease; }
        .screen.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* HEADER & PROGRESS */
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .timer-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
        .timer-fill { height: 100%; background: var(--neon-green); width: 100%; transition: width 0.1s linear; }

        /* TEXT STYLES */
        h1 { font-size: 2rem; font-weight: 900; text-transform: uppercase; line-height: 1; margin-bottom: 10px; }
        .question-text { font-size: 1.5rem; font-weight: 700; margin-bottom: 30px; text-align: center; min-height: 80px; }

        /* LIQUID GLASS BUTTONS (Alternativas) */
        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        
        .option-btn {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 18px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex; align-items: center; gap: 15px;
        }

        .option-btn:active { transform: scale(0.97); }
        .option-btn.selected { background: white; color: black; border-color: white; }
        .option-btn.correct { background: var(--neon-green); color: black; border-color: var(--neon-green); }
        .option-btn.wrong { background: var(--neon-red); color: white; border-color: var(--neon-red); }

        .opt-letter { 
            width: 30px; height: 30px; border-radius: 8px; background: rgba(255,255,255,0.1); 
            display: flex; align-items: center; justify-content: center; font-family: 'Space Mono'; font-size: 0.9rem;
        }

        /* LEADERBOARD STYLES */
        .ranking-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .rank-item {
            background: var(--glass); padding: 15px 20px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid var(--neon-blue);
        }
        .rank-item.top { border-left-color: var(--neon-yellow); background: rgba(242, 226, 5, 0.1); }

        .btn-primary {
            background: white; color: black; border: none; padding: 20px; border-radius: 50px;
            font-weight: 900; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-top: auto;
        }
    </style>
</head>
<body>

<div class="noise"></div>
<div class="ambilight-bg" id="ambilight"></div>

<div class="app-container">
    
    <div id="screen-loading" class="screen active" style="text-align: center; justify-content: center;">
        <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 3rem; color: var(--neon-green); margin-bottom: 20px;"></i>
        <h1>Sincronizando Quiz...</h1>
    </div>

    <div id="screen-quiz" class="screen">
        <div class="quiz-header">
            <span id="q-progress" style="font-family: 'Space Mono';">01/10</span>
            <span id="score-display" style="color: var(--neon-yellow); font-weight: bold;">Score: 0</span>
        </div>
        <div class="timer-bar"><div id="timer-fill" class="timer-fill"></div></div>
        
        <div class="question-text" id="question-text">Carregando pergunta...</div>
        
        <div class="options-grid" id="options-grid">
            </div>
    </div>

    <div id="screen-feedback" class="screen" style="text-align: center; justify-content: center;">
        <div id="feedback-icon" style="font-size: 5rem; margin-bottom: 20px;"></div>
        <h1 id="feedback-title">CORRETO!</h1>
        <p id="feedback-msg" style="opacity: 0.7;">Você foi rápido.</p>
        <div id="waiting-others-msg" style="margin-top: 40px; font-size: 0.9rem; opacity: 0.5;">
            Aguardando outros jogadores...
        </div>
    </div>

    <div id="screen-ranking" class="screen">
        <h1 style="text-align: center; margin-bottom: 30px; color: var(--neon-yellow);">Ranking Final</h1>
        <div class="ranking-list" id="ranking-list">
            </div>
        <button class="btn-primary" onclick="window.location.href='index.html'">Voltar ao Início</button>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Mesma configuração do seu index.html
    const firebaseConfig = {
        apiKey: "AIzaSyB1buacNarLY8ELWla6yeqTi4L0vTdloSc",
        authDomain: "wrapped-fad94.firebaseapp.com",
        databaseURL: "https://wrapped-fad94-default-rtdb.firebaseio.com",
        projectId: "wrapped-fad94",
        storageBucket: "wrapped-fad94.firebasestorage.app",
        messagingSenderId: "360236097664",
        appId: "1:360236097664:web:76777f529c18623bf1c665"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(window.location.search);
    const roomCode = urlParams.get('room');
    const myId = localStorage.getItem('wrapped_uid');
    
    let currentQuizData = null;
    let myScore = 0;
    let timerInterval;
    let timeLeft = 100;

    const quizQuestions = [
        { q: "Qual a principal função de um Gerente de TI?", a: ["Codar o dia todo", "Gerir recursos e alinhar TI ao negócio", "Consertar impressoras", "Formatar PCs"], correct: 1 },
        { q: "O que significa a sigla UI em Design?", a: ["User Interface", "Universal Integration", "User Internal", "Unique Idea"], correct: 0 },
        { q: "Firebase é um serviço de qual empresa?", a: ["Microsoft", "Amazon", "Google", "Oracle"], correct: 2 },
        { q: "Qual cor representa o sucesso em UI (padrão)?", a: ["Azul", "Vermelho", "Verde", "Roxo"], correct: 2 },
        { q: "Qual método é usado para salvar dados no Firebase Realtime?", a: ["save()", "push() ou set()", "upload()", "store()"], correct: 1 }
    ];

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    if (!roomCode) {
        alert("Sala não encontrada!");
        window.location.href = 'index.html';
    } else {
        initQuiz();
    }

    function initQuiz() {
        const roomRef = ref(db, `rooms/${roomCode}`);
        
        onValue(roomRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            currentQuizData = data;

            // Lógica de Sincronização de Rodadas
            if (data.quizStatus === 'active') {
                const round = data.currentRound || 0;
                if (data.quizAnswers && data.quizAnswers[round] && data.quizAnswers[round][myId]) {
                    showScreen('screen-feedback');
                } else {
                    startRoundUI(round);
                }
            } else if (data.quizStatus === 'finished') {
                showRanking(data.players);
            } else if (data.host === myId && !data.quizStatus) {
                // Se sou o host e o quiz ainda não começou, eu inicio
                update(roomRef, { quizStatus: 'active', currentRound: 0 });
            }
        });
    }

    function startRoundUI(roundIdx) {
        const q = quizQuestions[roundIdx];
        if (!q) return;

        showScreen('screen-quiz');
        document.getElementById('q-progress').innerText = `${roundIdx + 1}/${quizQuestions.length}`;
        document.getElementById('question-text').innerText = q.q;
        
        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        
        q.a.forEach((opt, i) => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerHTML = `<div class="opt-letter">${String.fromCharCode(65 + i)}</div> <span>${opt}</span>`;
            btn.onclick = () => submitAnswer(roundIdx, i);
            grid.appendChild(btn);
        });

        resetTimer();
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timeLeft = 100;
        const bar = document.getElementById('timer-fill');
        timerInterval = setInterval(() => {
            timeLeft -= 0.5; // Aproximadamente 20 segundos de tempo
            bar.style.width = timeLeft + "%";
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                submitAnswer(currentQuizData.currentRound, -1); // Time out
            }
        }, 100);
    }

    function submitAnswer(roundIdx, answerIdx) {
        clearInterval(timerInterval);
        const correct = quizQuestions[roundIdx].correct;
        const isCorrect = answerIdx === correct;
        
        // Cálculo de pontos (mais pontos se for mais rápido)
        const points = isCorrect ? Math.round(timeLeft) : 0;
        myScore += points;
        document.getElementById('score-display').innerText = `Score: ${myScore}`;

        // Feedback Visual Imediato
        const btns = document.querySelectorAll('.option-btn');
        if(answerIdx !== -1) btns[answerIdx].classList.add(isCorrect ? 'correct' : 'wrong');

        // Salva no Firebase
        update(ref(db, `rooms/${roomCode}/quizAnswers/${roundIdx}`), { [myId]: answerIdx });
        update(ref(db, `rooms/${roomCode}/players/${myId}`), { score: myScore });

        setTimeout(() => {
            document.getElementById('feedback-title').innerText = isCorrect ? "CORRETO!" : "ERROU!";
            document.getElementById('feedback-icon').innerHTML = isCorrect ? 
                '<i class="fa-solid fa-circle-check" style="color: var(--neon-green);"></i>' : 
                '<i class="fa-solid fa-circle-xmark" style="color: var(--neon-red);"></i>';
            showScreen('screen-feedback');
            
            if (currentQuizData.host === myId) {
                checkRoundEnd(roundIdx);
            }
        }, 1000);
    }

    function checkRoundEnd(roundIdx) {
        const roomRef = ref(db, `rooms/${roomCode}`);
        get(roomRef).then(snap => {
            const data = snap.val();
            const numPlayers = Object.keys(data.players).length;
            const numAnswers = Object.keys(data.quizAnswers[roundIdx] || {}).length;

            if (numAnswers >= numPlayers) {
                setTimeout(() => {
                    if (roundIdx + 1 < quizQuestions.length) {
                        update(roomRef, { currentRound: roundIdx + 1 });
                    } else {
                        update(roomRef, { quizStatus: 'finished' });
                    }
                }, 2000);
            }
        });
    }

    function showRanking(players) {
        showScreen('screen-ranking');
        const list = document.getElementById('ranking-list');
        list.innerHTML = '';
        
        const sorted = Object.values(players).sort((a, b) => (b.score || 0) - (a.score || 0));
        
        sorted.forEach((p, i) => {
            const item = document.createElement('div');
            item.className = `rank-item ${i === 0 ? 'top' : ''}`;
            item.innerHTML = `
                <span><strong>#${i + 1}</strong> ${p.name}</span>
                <span style="font-family: 'Space Mono';">${p.score || 0} pts</span>
            `;
            list.appendChild(item);
        });
        document.getElementById('ambilight').style.background = 'radial-gradient(circle at 50% 50%, #f2e205, #000)';
    }

</script>
</body>
</html>
