<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Game Hub - Premium</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --neon-green: #1ed760;
            --neon-purple: #8c42b3;
            --neon-blue: #2d46b9;
            --neon-pink: #f573a0;
            --neon-yellow: #f2e205;
            --bg-dark: #080808;
            --font-display: 'Space Grotesk', sans-serif;
            --font-data: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: white;
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: var(--font-display);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        .noise { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.05; pointer-events: none; z-index: 999; }
        .ambilight-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.3; filter: blur(90px); background: radial-gradient(circle at 50% 50%, #333, #000); transition: background 0.8s ease; }
        
        .app-container { 
            position: relative; width: 100%; height: 100%; max-width: 480px; z-index: 10; 
            display: flex; justify-content: center; align-items: center; 
        }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; padding: 30px 20px;
            overflow-y: auto;
        }
        .screen.active { display: flex; animation: fadeInScreen 0.5s ease-out; }
        @keyframes fadeInScreen { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        h1 { font-size: clamp(2rem, 8vw, 3.5rem); font-weight: 900; line-height: 0.95; letter-spacing: -2px; margin-bottom: 20px; text-transform: uppercase; }
        p { font-size: clamp(0.9rem, 4vw, 1.1rem); opacity: 0.8; margin-bottom: 30px; }

        input { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 20px; border-radius: 12px; font-family: var(--font-data); font-size: 1.2rem; outline: none; margin-bottom: 20px; text-align: center; text-transform: uppercase; }
        
        .btn { background: white; color: black; border: none; padding: 18px; border-radius: 50px; font-weight: 700; width: 100%; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        .btn-outline { background: transparent; border: 2px solid rgba(255,255,255,0.3); color: white; }

        .room-code { font-size: 3.5rem; font-weight: 900; letter-spacing: 8px; color: var(--neon-green); background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px; margin: 20px 0; border: 2px dashed rgba(255,255,255,0.2); }
        .chip { background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 50px; margin: 5px; display: inline-block; font-weight: bold; }

        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin-top: auto; }

        .liquid-btn {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.05); border-top: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.9); font-weight: 700; font-size: 0.85rem; text-transform: uppercase;
            padding: 24px 12px; height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.4s;
        }
        .liquid-btn i { font-size: 2.5rem; margin-bottom: 12px; }
        .liquid-btn.neon-green { color: var(--neon-green); }
        .liquid-btn.neon-blue { color: #4a90e2; }
        .liquid-btn.neon-purple { color: var(--neon-purple); }
        .liquid-btn.neon-red { color: var(--neon-red); }
        .liquid-btn.neon-yellow { color: var(--neon-yellow); }
    </style>
</head>
<body>

<div class="noise"></div>
<div class="ambilight-bg" id="ambilight"></div>

<div class="app-container">
    <div id="screen-home" class="screen active">
        <div style="width: 100%; text-align: center;">
            <h1 style="color: var(--neon-green);">GAME<br>HUB</h1>
            <p>Selecione seu destino.</p>
            <input type="text" id="my-name" placeholder="SEU NOME">
            <button class="btn" onclick="goToMenu()">Continuar</button>
        </div>
    </div>

    <div id="screen-menu" class="screen">
        <div style="width: 100%; text-align: center;">
            <h1>OLÁ, <span id="display-name" style="color: var(--neon-pink);"></span></h1>
            <button class="btn" onclick="createRoomReal()">Criar Sala</button>
            <button class="btn btn-outline" onclick="showJoinInput()">Entrar em Sala</button>
            <div id="join-area" style="display: none; margin-top: 20px;">
                <input type="text" id="room-code-input" placeholder="CÓDIGO" maxlength="4">
                <button class="btn" style="background: var(--neon-blue); color: white;" onclick="joinRoomReal()">Entrar</button>
            </div>
        </div>
    </div>

    <div id="screen-lobby" class="screen" style="text-align: center;">
        <h2 style="opacity: 0.7;">CÓDIGO:</h2>
        <div class="room-code" id="lobby-code">ABCD</div>
        <div id="lobby-list" style="margin-bottom: 20px;"></div>
        
        <div class="mode-grid">
            <button id="btn-start-quiz" class="liquid-btn neon-yellow" style="display:none;" onclick="redirectMode('quiz')">
                <i class="fa-solid fa-circle-question"></i> QUIZ
            </button>
            <button id="btn-start-family" class="liquid-btn neon-blue" style="display:none;" onclick="redirectMode('family')">
                <i class="fa-solid fa-users"></i> FAMÍLIA
            </button>
            <button id="btn-start-fdp" class="liquid-btn neon-purple" style="display:none;" onclick="redirectMode('fdp')">
                <i class="fa-solid fa-masks-theater"></i> MODE FDP
            </button>
            <button id="btn-start-nomercy" class="liquid-btn neon-red" style="display:none;" onclick="redirectMode('nomercy')">
                <i class="fa-solid fa-skull"></i> NO MERCY
            </button>
        </div>
        <div id="msg-waiting-host" style="display:none; color: #666; margin-top: 20px;">Aguardando o anfitrião escolher o jogo...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB1buacNarLY8ELWla6yeqTi4L0vTdloSc",
        authDomain: "wrapped-fad94.firebaseapp.com",
        databaseURL: "https://wrapped-fad94-default-rtdb.firebaseio.com",
        projectId: "wrapped-fad94",
        storageBucket: "wrapped-fad94.firebasestorage.app",
        messagingSenderId: "360236097664",
        appId: "1:360236097664:web:76777f529c18623bf1c665"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myId = localStorage.getItem('wrapped_uid') || Math.random().toString(36).substr(2, 9);
    localStorage.setItem('wrapped_uid', myId);
    let myName = "";
    let roomCode = "";
    let amIHost = false;

    window.goToMenu = function() {
        const val = document.getElementById('my-name').value.trim();
        if(!val) return alert("Nome obrigatório");
        myName = val.toUpperCase();
        document.getElementById('display-name').innerText = myName;
        showScreen('screen-menu');
    };

    window.showJoinInput = () => document.getElementById('join-area').style.display = 'block';

    window.createRoomReal = function() {
        roomCode = Math.random().toString(36).substring(2, 6).toUpperCase();
        amIHost = true;
        const roomRef = ref(db, 'rooms/' + roomCode);
        set(roomRef, { status: 'lobby', host: myId, players: { [myId]: { name: myName } } });
        enterLobby();
    };

    window.joinRoomReal = function() {
        roomCode = document.getElementById('room-code-input').value.toUpperCase();
        if(roomCode.length !== 4) return alert("Código inválido");
        const roomRef = ref(db, 'rooms/' + roomCode);
        get(roomRef).then(snap => {
            if(snap.exists()) {
                update(ref(db, `rooms/${roomCode}/players/${myId}`), { name: myName });
                enterLobby();
            } else alert("Sala não encontrada");
        });
    };

    function enterLobby() {
        document.getElementById('lobby-code').innerText = roomCode;
        showScreen('screen-lobby');
        const roomRef = ref(db, 'rooms/' + roomCode);

        onValue(roomRef, (snap) => {
            const data = snap.val();
            if(!data) return;

            // Redirecionamento Automático
            if(data.status.startsWith('redirecting_to_')) {
                const mode = data.status.replace('redirecting_to_', '');
                window.location.href = `${mode}.html?room=${roomCode}&user=${myId}`;
                return;
            }

            // Atualiza Lista de Jogadores
            const list = document.getElementById('lobby-list');
            list.innerHTML = '';
            Object.values(data.players).forEach(p => {
                list.innerHTML += `<div class="chip">${p.name}</div>`;
            });

            // Controle do Host
            const isHost = data.host === myId;
            const buttons = ['btn-start-quiz', 'btn-start-family', 'btn-start-fdp', 'btn-start-nomercy'];
            buttons.forEach(id => document.getElementById(id).style.display = isHost ? 'flex' : 'none');
            document.getElementById('msg-waiting-host').style.display = isHost ? 'none' : 'block';
        });
    }

    window.redirectMode = function(mode) {
        update(ref(db, 'rooms/' + roomCode), { status: `redirecting_to_${mode}` });
    };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => { s.classList.remove('active'); s.style.display = 'none'; });
        const target = document.getElementById(id);
        target.style.display = 'flex';
        setTimeout(() => target.classList.add('active'), 10);
    }
</script>
</body>
</html>
