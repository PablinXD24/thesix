<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THE SIX - Game Hub</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --neon-green: #1ed760;
            --neon-purple: #a33df2;
            --neon-blue: #3d5af2;
            --neon-pink: #f573a0;
            --neon-yellow: #f2e205;
            --neon-red: #ff3e3e;
            --bg-dark: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Ilha Dinâmica */
        .island-container {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: auto; min-width: 120px; height: 35px;
            background: black; border-radius: 20px; border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            padding: 0 15px; gap: 10px; transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .island-expanded { height: 60px; border-radius: 30px; padding: 0 25px; }
        .island-label { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--neon-green); letter-spacing: 2px; }
        .island-val { font-weight: 900; font-size: 0.9rem; text-transform: uppercase; }

        .container { padding: 80px 20px 40px; width: 100%; max-width: 500px; margin: 0 auto; flex: 1; }

        /* Login */
        .login-card { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 30px; border-radius: 24px; text-align: center; backdrop-filter: blur(10px); }
        .login-card h1 { font-weight: 900; font-size: 2.5rem; letter-spacing: -2px; margin-bottom: 5px; }
        .login-card p { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: #666; margin-bottom: 25px; }

        input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            padding: 18px; border-radius: 15px; color: white; font-family: 'Space Mono', monospace;
            text-align: center; font-size: 1rem; margin-bottom: 15px; outline: none;
        }

        .btn-main {
            width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: 900;
            font-size: 1rem; cursor: pointer; transition: transform 0.2s;
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* Lobby */
        .game-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 30px; }
        
        .game-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            padding: 20px; border-radius: 20px; display: flex; align-items: center; gap: 20px;
            cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden;
        }

        .game-card i { font-size: 1.5rem; width: 50px; height: 50px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; border-radius: 12px; }
        .game-card h3 { font-weight: 900; font-size: 1.1rem; }
        .game-card p { font-size: 0.7rem; opacity: 0.5; font-family: 'Space Mono', monospace; }

        /* Estilos dos Jogos */
        .card-fdp { border-left: 4px solid var(--neon-red); }
        .card-fdp i { color: var(--neon-red); }
        
        /* NOVO JOGO: DEDO NO GATILHO */
        .card-gatilho { border-left: 4px solid var(--neon-green); }
        .card-gatilho i { color: var(--neon-green); }

        .lobby-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
        .chip { background: var(--glass-bg); padding: 6px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; border: 1px solid var(--glass-border); }

    </style>
</head>
<body>

<div class="island-container" id="island">
    <i class="fa-solid fa-gamepad" id="island-icon" style="color: var(--neon-green);"></i>
    <div style="display: flex; flex-direction: column;">
        <span class="island-label" id="island-label">THE SIX</span>
        <span class="island-val" id="island-val">HUB</span>
    </div>
</div>

<div class="container">
    <div id="view-login" class="login-card">
        <h1>THE SIX</h1>
        <p>CONECTE-SE PARA JOGAR</p>
        <input type="text" id="my-name" placeholder="SEU NOME" maxlength="12">
        <input type="text" id="room-code" placeholder="CÓDIGO DA SALA" maxlength="6">
        <button class="btn-main" style="background: var(--neon-green); color: black;" onclick="joinRoom()">ENTRAR NA SALA</button>
    </div>

    <div id="view-lobby" style="display: none;">
        <div class="login-card">
            <h2 id="room-display" style="font-weight: 900; letter-spacing: -1px;">SALA: ----</h2>
            <div class="lobby-list" id="lobby-list"></div>
            <p id="msg-waiting-host" style="margin-top: 15px; font-size: 0.7rem; color: var(--neon-yellow); display: none;">AGUARDANDO O HOST...</p>
        </div>

        <div id="host-controls" style="display: none;">
            <div class="game-grid">
                <div class="game-card card-fdp" onclick="redirectAll('fdp')">
                    <i class="fa-solid fa-skull"></i>
                    <div>
                        <h3>F.D.P</h3>
                        <p>CARTAS CONTRA A HUMANIDADE</p>
                    </div>
                </div>

                <div class="game-card card-gatilho" onclick="redirectAll('gatilho')">
                    <i class="fa-solid fa-fingerprint"></i>
                    <div>
                        <h3>DEDO NO GATILHO</h3>
                        <p>QUEM SOLTAR POR ÚLTIMO BEBE</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, push, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyB1buacNarLY8ELWla6yeqTi4L0vTdloSc", 
        authDomain: "wrapped-fad94.firebaseapp.com", 
        databaseURL: "https://wrapped-fad94-default-rtdb.firebaseio.com", 
        projectId: "wrapped-fad94", 
        storageBucket: "wrapped-fad94.firebasestorage.app", 
        messagingSenderId: "360236097664", 
        appId: "1:360236097664:web:76777f529c18623bf1c665" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myId = localStorage.getItem('wrapped_uid') || 'u' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('wrapped_uid', myId);

    let roomCode = "";
    let roomRef = null;
    let playerCount = 0;

    function notifyIsland(label, val, iconClass) {
        const island = document.getElementById('island');
        island.classList.add('island-expanded');
        document.getElementById('island-label').innerText = label;
        document.getElementById('island-val').innerText = val;
        document.getElementById('island-icon').className = `fa-solid ${iconClass}`;
        setTimeout(() => island.classList.remove('island-expanded'), 3000);
    }

    window.joinRoom = async function() {
        const name = document.getElementById('my-name').value.trim().toUpperCase();
        roomCode = document.getElementById('room-code').value.trim().toUpperCase();

        if(!name || !roomCode) return alert("Preencha tudo!");

        localStorage.setItem('wrapped_name', name);
        roomRef = ref(db, `rooms/${roomCode}`);
        
        onValue(roomRef, (snapshot) => {
            const data = snapshot.val();
            if(!data) {
                set(roomRef, { host: myId, status: 'lobby', created: Date.now() });
                return;
            }

            document.getElementById('view-login').style.display = 'none';
            document.getElementById('view-lobby').style.display = 'block';
            document.getElementById('room-display').innerText = "SALA: " + roomCode;

            update(ref(db, `rooms/${roomCode}/players/${myId}`), { name: name, active: true });
            onDisconnect(ref(db, `rooms/${roomCode}/players/${myId}`)).remove();

            const count = Object.keys(data.players || {}).length;
            if(count > playerCount) {
                const players = Object.values(data.players);
                const newPlayerName = players[players.length - 1].name;
                notifyIsland("ENTROU", newPlayerName, "fa-user-plus");
            }
            playerCount = count;

            if(data.status.startsWith('redirecting_to_')) {
                const target = data.status.replace('redirecting_to_', '');
                notifyIsland("START", target.toUpperCase(), "fa-rocket");
                setTimeout(() => window.location.href = `${target}.html?room=${roomCode}`, 1200);
                return;
            }

            const list = document.getElementById('lobby-list');
            list.innerHTML = '';
            if(data.players) {
                Object.values(data.players).forEach(p => {
                    list.innerHTML += `<div class="chip">${p.name}</div>`;
                });
            }
            
            const isHost = data.host === myId;
            document.getElementById('host-controls').style.display = isHost ? 'block' : 'none';
            document.getElementById('msg-waiting-host').style.display = isHost ? 'none' : 'block';
        });
    }

    window.redirectAll = (gameFile) => {
        update(roomRef, { status: `redirecting_to_${gameFile}` });
    };

    document.getElementById('my-name').addEventListener('input', (e) => {
        e.target.value = e.target.value.toUpperCase();
    });
</script>
</body>
</html>
